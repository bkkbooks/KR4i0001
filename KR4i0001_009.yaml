body:
  text: 卷九指瑕第四十一管仲有言無翼而飛者聲也無根而固者情也然則聲不假翼其飛甚易情不待根其固匪難以之垂文可不慎歟古來文才異世爭驅或逸才以爽迅或精思以纖密而慮動難圓鮮無瑕病陳思之文群才之俊也而武帝誄云尊靈永蟄明帝頌云聖體浮輕浮輕有似於蝴蝶永蟄頗疑於昆蟲施之尊極豈其當乎左思七諷說孝而不從反道若斯餘不足觀矣潘嶽為才善於哀文然悲內兄則云感口澤傷弱子則云心如疑禮文在尊極而施之下流辭雖足哀義斯替矣若夫君子擬人必於其倫而崔瑗之誄李公比行於黃虞向秀之賦嵇生方罪於李斯與其失也雖寧僭無濫然高厚之詩不類甚矣凡巧言易摽拙辭難隱斯言之玷實深白圭繁例難載故略舉四條若夫立文之道惟字與義字以訓正義以理宣而晉末篇章依俙其旨始有賞際奇至之言終有撫叩酬即之語每單舉一字指以為情夫賞訓錫賚豈關心解撫訓執握何預情理雅頌未聞漢魏莫用懸領似如可辨課文了不成義斯實情訛之所變文澆之致斃而宋來才英未之或改舊染成俗非一朝也近代辭人率多猜忌至乃比語求蚩反音取瑕雖不屑於古而有擇於今焉又製同他文理宜刪革若排人美辭以為己力寶玉大弓終非其有全寫則揭篋傍採則探囊然世遠者太輕時同者為尤矣若夫注解為書所以明正事理然謬於研求或率意而斷西京賦稱中黃育獲之疇而薛綜謬注謂之閹尹是不聞執雕虎之人也又周禮井賦舊有匹馬而應劭釋匹或量首數蹄斯豈辨物之要哉原夫古之正名車兩而馬匹匹兩稱目以並耦為用蓋車二佐乘馬儷驂服服乘不隻故名號必雙名號一正則雖單為匹矣匹夫匹婦亦配義也夫車馬小義而歷代莫悟辭賦近事而千里致差況鑽灼經典能不謬哉夫辨言而數首蹄選勇而驅閹尹失理太甚故舉以為戒丹青初炳而後渝文章歲久而彌光若能檃括於一朝可以無慚於千載也贊曰羿氏舛射東野敗駕雖有雋才謬則多謝斯言一玷千載弗化令章靡疚亦善之亞養氣第四十二昔王充著述制養氣之篇驗己而作豈虛造哉夫耳目鼻口生之役也心慮言辭神之用也率志委和則理融而情暢鑽礪過分則神疲而氣衰此性情之數也夫三皇辭質心絶於道華帝世始文言貴於敷奏三代春秋雖沿世彌縟並適分胸臆非牽課才外也戰代枝詐攻奇飾說漢世迄今辭務日新爭光鬻采慮亦竭矣故淳言以比澆辭文質懸乎千載率志以方竭情勞逸差於萬里古人所以餘裕後進所以莫遑也凡童少鑒淺而志盛長艾識堅而氣衰志盛者思鋭以勝勞氣衰者慮密以傷神斯實中人之常資歲時之大較也若夫器分有限智用無涯或漸鳧企鶴瀝辭鐫思於是精氣內銷有似尾閭之波神志外傷同乎牛山之木怛惕之盛疾亦可推矣至如仲任置硯以綜述叔通懷筆以專業既暄之以歲序又煎之以日時是以曹公懼為文之傷命陸雲歎用思之困神非虛談也夫學業在勤故有錐股自厲志於文也則有申寫鬱滯故宜從容率情優柔適會若銷鑠精膽蹙迫和氣秉牘以驅齡灑翰以伐性豈聖賢之素心會文之直理哉且夫思有利鈍時有通塞沐則心覆且或反常神之方昏再三愈黷是以吐納文藝務在節宣清和其心調暢其氣煩而即捨勿使壅滯意得則舒懷以命筆理伏則投筆以之卷懷逍遙以針勞談笑以藥倦常弄閒於才鋒賈餘於文勇使刃發如新腠理無滯雖非胎息之萬術斯亦衛氣之一方也贊曰紛哉萬象勞矣千想玄神宜寶素氣資養水停以鑒火靜而朗無擾文慮鬱此精爽附會第四十三何謂附會謂總文理統首尾定與奪合涯際彌綸一篇使雜而不越者也若築室之須基構裁衣之待縫緝矣夫才童學文宜正體製必以情志為神明事義為骨髓辭采為肌膚宮商為聲氣然後品藻玄黃摛振金玉獻可替否以裁厥中斯綴思之常數也凡大體文章類多枝派整派者依源理枝者循幹是以附辭會義務總綱領驅萬塗於同歸貞百慮於一致使衆理雖繁而無倒置之乖群言雖多而無棼絲之亂扶陽而出條順陰而藏跡首尾周密表裏一體此附會之術也夫畫者謹髮而易貌射者儀毫而失墻鋭精細巧必疏體統故宜詘寸以信尺枉尺以直尋棄偏善之巧學具美之績此命篇之經略也夫文變無方意見浮雜約則義孤博則辭叛率故多尤需為事賊且才分不同思緒各異或製首以通尾或尺接以寸附然通製者蓋寡接附者甚衆若統緒失宗辭味必亂義脈不流則偏枯文體夫能懸識腠理然後節文自會如膠之粘木豆之合黃矣是以駟牡異力而六轡如琴馭文之法有似於此去留隨心修短在手齊其步驟總轡而已故善附者異旨如肝膽拙會者同音如胡越改章難於造篇易字艱於代句此已然之驗也昔張湯疑奏而再卻虞松草表而屢譴並理事之不明而辭旨之失調也及兒寬更草鍾會易字而漢武歎奇晉景稱善者乃理得而事明心敏而辭當也以此而觀則知附會巧拙相去遠哉若夫絶筆斷章譬乘舟之振楫克終底績寄在寫以遠送若首唱榮華而媵句憔悴則遺勢鬱湮餘風不暢此周易所謂臀無膚其行次睢也惟首尾相援則附會之體固亦無以加於此矣贊曰篇統間關情數稠疊原始要終疏條布葉道味相附懸緒自接如樂之和心聲克協總術第四十四今之常言有文有筆以為無韻者筆也有韻者文也夫文以足言理兼詩書別目兩名自近代耳顏延年以為筆之為體言之文也經典則言而非筆傳記則筆而非言請奪彼矛還攻其盾矣何者易之文言豈非言文若筆果言文不得云經典非筆矣將以立論未見其論立也豫以為發口為言屬筆曰翰常道曰經述經曰傳經傳之體出言入筆筆為言使可強可弱六經以典奧為不刊非以言筆為優劣也昔陸氏文賦號為曲盡然泛論纖悉而實體未該故知九變之貫匪窮知言之選難備矣凡精慮造文各競新麗多欲練辭莫肯研術落落之玉或亂乎石碌碌之石時似乎玉精者要約匱者亦鮮博者該贍蕪者亦繁辨者昭晢淺者亦露奧者復隱詭者亦曲或義華而聲悴或理拙而文澤知夫調鐘未易張琴實難伶人告和不必盡窕槬之中動用揮扇何必窮初終之韻魏文比篇章於音樂蓋有徵矣夫不截盤根無以驗利器不剖文奧無以辨通才才之能通必資曉術自非圓鑒區域大判條例豈能控引情源制勝文苑哉是以執術馭篇似善奕之窮數棄術任心如博塞之邀遇故博塞之文借巧儻來雖前驅有功而後援難繼少既無以相接多亦不知所刪乃多少之並惑何妍蚩之能制乎若夫善奕之文則術有恆數按部整伍以待情會因時順機動不失正數逢其極機入其巧則義味騰躍而生辭氣叢雜而至視之則錦繪聽之則絲簧味之則甘腴佩之則芬芳斷章之功於斯盛矣夫驥足雖駿纆牽忌長以萬分一纍且廢千里況文體多術共相彌綸一物攜二莫不解體所以列在一篇備總情變譬三十之輻共成一轂雖未足觀亦鄙夫之見也贊曰文場筆苑有術有門務先大體鑑必窮源乘一總萬舉要治繁思無定契理有恆存時序第四十五時運交移質文代變古今情理如可言乎昔在陶唐德盛化鈞野老吐何力之談郊童含不識之歌有虞繼作政阜民暇薰風詩於元后爛雲歌於列臣盡其美者何乃心樂而聲泰也至大禹敷土九序詠功成湯聖敬猗歟作頌逮姬文之德盛周南勤而不怨太王之化淳邠風樂而不淫幽厲昏而板蕩怒平王微而黍離哀故知歌謠文理與世推移風動於上而波震於下者也春秋以後角戰英雄六經泥蟠百家飆駭方是時也韓魏力政燕趙任權五蠹六蝨嚴於秦令唯齊楚兩國頗有文學齊開莊衢之第楚廣蘭臺之宮孟軻賓館荀卿宰邑故稷下扇其清風蘭陵鬱其茂俗鄒子以談天飛譽騶奭以雕龍馳響屈平聯藻於日月宋玉交彩於風雲觀其豔說則籠罩雅頌故知暐燁之奇意出乎縱橫之詭俗也爰至有漢運接燔書高祖尚武戲儒簡學雖禮律草創詩書未遑然大風鴻鵠之歌亦天縱之英作也施及孝惠迄于文景經術頗興而辭人勿用賈誼抑而鄒枚沉亦可知已逮孝武崇儒潤色鴻業禮樂爭輝辭藻競騖柏梁展朝宴之詩金堤製恤民之詠徵枚乘以蒲輪申主父以鼎食擢公孫之對策歎兒寬之疑奏買臣負薪而衣錦相如滌器而被繡於是史遷壽王之徒嚴終枚皋之屬應對固無方篇章亦不匱遺風餘采莫與比盛越昭及宣實繼武績馳騁石渠暇豫文會集雕篆之軼材發綺縠之高喻於是王褒之倫底祿待詔自元暨成降意圖籍美玉屑之談清金馬之路子雲鋭思於千首子政讎校於六藝亦已美矣爰自漢室迄至成哀雖世漸百齡辭人九變而大抵所歸祖述楚辭靈均餘影於是乎在自哀平陵替光武中興深懷圖讖頗略文華然杜篤獻誄以免刑班彪參奏以補令雖非旁求亦不遐棄及明章疊耀崇愛儒術肄禮璧堂講文虎觀孟堅珥筆于國史賈逵給札於瑞頌東平擅其懿文沛王振其通論帝則藩儀輝光相照矣自和安已下迄至順桓則有班傅三崔王馬張蔡磊落鴻儒才不時乏而文章之選存而不論然中興之後群才稍改前轍華實所附斟酌經辭蓋歷政講聚故漸靡儒風者也降及靈帝時好辭製造羲皇之書開鴻都之賦而樂松之徒招集淺陋故楊賜號為歡兜蔡雍比之俳優其餘風遺文蓋蔑如也自獻帝播遷文學蓬轉建安之末區宇方輯魏武以相王之尊雅愛詩章文帝以副君之重妙善辭賦陳思以公子之豪下筆琳琅並體貌英逸故俊才雲蒸仲宣委質於漢南孔璋歸命於河北偉長從宦於青土公幹徇質於海隅德璉綜其斐然之思元瑜展其翩翩之樂文蔚休伯之儔子俶德祖之侶傲雅觴豆之前雍容衽席之上灑筆以成酣歌和墨以藉談笑觀其時文雅好慷慨良由世積亂離風衰俗怨並志深而筆長故梗概而多氣也至明帝纂戎制詩度曲徵篇章之士置崇文之觀何劉群才迭相照耀少主相仍唯高貴英雅顧盻含章動言成論於時正始餘風篇體輕淡而嵇阮應繆並馳文路矣逮晉宣始基景文克構並跡沉儒雅而務深方術至武帝惟新承平受命而膠序篇章弗簡皇慮降及懷愍綴旒而已然晉雖不文人才實盛茂先搖筆而散珠太沖動墨而橫錦嶽湛曜聯璧之華機雲摽二俊之采應傅三張之徒孫摯成公之屬並結藻清英流韻綺靡前史以為運涉季世人未盡才誠哉斯談可為歎息元皇中興披文建學劉刁禮吏而寵榮景純文敏而優擢逮明帝秉哲雅好文會升儲御極孳孳講藝練情於誥策振采於辭賦庾以筆才逾親溫以文思益厚揄揚風流亦彼時之漢武也及成康促齡穆哀短祚簡文勃興淵乎清峻微言精理函滿玄席淡思醲采時灑文囿至孝武不嗣安恭已矣其文史則有袁殷之曹孫干之輩雖才或淺深圭璋足用自中朝貴玄江左稱盛因談餘氣流成文體是以世極迍邅而辭意夷泰詩必柱下之旨歸賦乃漆園之義疏故知文變染乎世情興廢繫乎時序原始以要終雖百世可知也自宋武愛文文帝彬雅秉文之德孝武多才英采雲構自明帝以下文理替矣爾其縉紳之林霞蔚而飆起王袁聯宗以龍章顏謝重葉以鳳采何范張沈之徒亦不可勝也蓋聞之於世故略舉大較暨皇齊馭寶運集休明太祖以聖武膺籙高祖以睿文纂業文帝以二離含章中宗以上哲興運並文明自天緝遐景祚今聖歷方興文思充被海嶽降神才英秀發馭飛龍於天衢駕騏驥於萬里經典禮章跨周轢漢唐虞之文其鼎盛乎鴻風懿采短筆敢陳揚言讚時請寄明哲贊曰蔚映十代辭采九變樞中所動環流無倦質文沿時崇替在選終古雖遠曖焉如面
