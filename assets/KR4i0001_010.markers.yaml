該情或明理以立體或隠義以蔵用故春秋一字以褒貶喪服舉輕以包重此簡言以達㫖也邠詩聯章以積句儒行縟說以繁辭此博文以該情也書契斷决以象夬文章昭晰以象離此明理以立體也四象精義以曲隠五例㣲辭以婉晦此隠義以蔵用也故知繁略殊形隠顯異術抑引隨時變通㑹適徴之周孔則文有師矣是以子政論文必徵於聖稚圭勸學必宗於經易稱辨物正言斷辭則備書云辭尚體要弗惟好異故知正言所以立辯體要所以成辭辭成無好異之尤辯立有斷辭之義雖精義曲隠無傷其正言㣲辭婉晦不害其體要體要與㣲辭偕通正言共精義並用聖人之文章亦可見也顔闔以為仲尼飾羽而畫徒事華辭雖欲訾聖弗可得已然則聖文之雅麗固衘華而佩實者也天道難聞猶或鑽仰文章可見胡寧勿思若徴聖立言則文其庶矣賛曰妙極生知睿哲惟宰精理為文秀氣成采鑒懸日月辭富山海百齡影徂千載心在宗經第三三極彞訓其書言經經也者恒久之至道不刋之鴻教也故象天地效鬼神參物序制人紀洞性靈之奥區極文章之骨髓者也皇世三墳帝代五典重以八索申以九丘歳厯綿曖條流紛糅自夫子刋述而大寳咸耀於是易張十翼書標七觀詩列四始禮正五經春秋五例義既極乎性情辭亦匠於文理故能開學養正昭明有融然而道心惟㣲聖謨卓絶墻宇重峻而吐納自深譬萬鈞之洪鍾無錚錚之細響矣夫易惟談天入神致用故繫稱㫖逺辭文言中事隠韋編三絶固哲人之驪淵也書實記言而詁訓茫昧通乎爾雅則文章曉然故子夏歎書昭昭若日月之明離離如星辰之行言昭灼也詩主言志詁訓同書摛風裁興藻辭譎喻温柔在誦故最附深𠂻矣禮以立體據事剬範章條纎曲一字見義五石六鷁以詳略成文雉門兩觀以先後顯㫖其婉章志晦諒以䆳矣尚書則覽文如詭而尋理即暢春秋則觀辭立曉而訪義方隐此聖人之殊致表裏之異體者也至根柢槃深枝葉峻茂辭約而㫖豐事近而喻逺是以往者雖舊餘味日新後進追取而非曉前脩文用而未先可謂泰山徧雨河潤千里者也故論說辭序則易統其首詔策章奏則書發其源賦頌謌讚則詩立其本銘誄箴祝則禮總其端紀傳銘檄則春秋為根並窮髙以樹表極逺以啟疆所以百家騰躍終入環内者也若禀經以製式酌雅以富言是仰山而鑄銅煑海而為鹽也故文能宗經體有六義一則情深而不詭二則風清而不雜三則事信而不誕四則義直而不回五則體約而不蕪六則文麗而不淫楊子比雕玉以作器謂五經之含文也夫文以行立行以文傳四教所先符采相濟勵徳樹聲莫不師聖而建言脩辭鮮克宗經是以楚艷漢侈流弊不還正末歸本不其懿歟賛曰三極彞道訓深稽古致化歸一分教斯五性靈鎔匠文章奥府淵哉鑠乎羣言之祖正緯第四夫神道闡幽天命㣲顯馬龍出而大易興神龜見而洪範燿故繫辭稱河出圖洛出書聖人則之斯之謂也但世夐文隠好生矯誕真雖存矣偽亦憑焉夫六經彪炳而緯候稠疊孝論昭晳而鉤䜟葳㽔按經驗緯其偽有四盖緯之成經其猶織綜絲麻不雜布帛乃成今經正緯竒倍擿千里其偽一矣經顯聖訓也緯隠神教也聖訓宜廣神教宜約而今緯多於經神理更繁其偽二矣有命自天廼稱符䜟而八十一篇皆託於孔子則是堯造緑圖昌制丹書其偽三矣商周以前圖録頻見春秋之末羣經方備先緯後經體乖織綜其偽四矣偽既倍摘則義異自明經足訓矣緯何豫焉原夫圖籙之見廼昊天休命事以瑞聖義非配經故河不出圖夫子有歎如或可造無勞喟然昔康王河圖陳於東序故知前世符命歴代寳傳仲尼所撰序録而已於是伎數之士附以詭術或說隂陽或序災異若鳥鳴似語蟲葉成字篇條滋蔓必假孔氏通儒討覈謂起哀平東序祕寳朱紫亂矣至於光武之世篤信斯術風化所靡學者比肩沛獻集緯以通經曹襃撰䜟以定禮乖道謬典亦已甚矣是以桓譚疾其虛偽尹敏戯其深瑕張衡發其僻謬荀恱明其詭誕四賢博練論之精矣若乃羲農軒皥之源山瀆鍾律之要白魚赤烏之符黄金紫玉之瑞事豐竒偉辭富膏腴無益經典而有助文章是以後来辭人採摭英華平子恐其迷學奏令禁絶仲豫惜其雜真未許煨燔前代配經故詳論焉賛曰榮河温洛是孕圖緯神寳藏用理隠文貴世厯二漢朱紫騰沸芟夷譎詭糅其雕蔚辯騷第五自風雅寢聲莫或抽緒竒文欝起其離騷哉固已軒翥詩人之後奮飛辭家之前豈去聖之未逺而楚人之多才乎昔漢武愛騷而淮南作傳以為國風好色而不滛小雅怨誹而不亂若離騷者可謂兼之蟬蛻穢濁之中浮游塵埃之外㬭然湼而不緇雖與日月爭光可也班固以為露才揚已忿懟沉江羿澆二姚與左氏不合崑崙懸圃非經義所載然其文辭麗雅為詞賦之宗雖非明哲可謂妙才王逸以為詩人提耳屈原婉順離騷之文依經立義駟虬乗翳則時乗六龍崑崙流沙則禹貢敷土名儒辭賦莫不擬其儀表所謂金相玉質百世無匹者也及漢宣嗟歎以為皆合經術揚雄諷味亦言體同詩雅四家舉以方經而孟堅謂不合傳褒貶任聲抑揚過實可謂鑒而弗精翫而未覈者也將覈其論必徴言焉故其陳堯舜之耿介稱湯武之祗敬典誥之體也譏桀紂之猖披傷羿澆之顛隕規諷之㫖也虬龍以喻君子雲蜺以譬讒邪比興之義也每一顧而淹涕歎君門之九重忠怨之辭也觀兹四事同於風雅者也至於託雲龍說迂怪豐隆求宓妃鴆鳥媒娀女詭異之辭也康回傾地夷羿彃日朩天九首土伯三目譎怪之談也依彭咸之遺則從子胥以自適狷狹之志也士女雜座亂而不分指以為樂娱酒不廢沉􅊺日夜舉以為懽荒滛之意也摘此四事異乎經典者也故論其典誥則如彼語其夸誕則如此固知楚辭者體慢於三代而風雅於戰國乃雅頌之博徒而詞賦之英傑也觀其骨鯁所樹肌膚所附雖取鎔經意亦自鑄偉辭故騷經九章朗麗以哀志九歌九辯綺靡以傷情逺遊天問瓌詭而惠巧招魂招隠耀艶而深華卜居摽放言之致漁父寄獨徃之才故能氣徃轢古辭來切今驚采絶艶難與並能矣自九懐以下遽躡其跡而屈宋逸歩莫之能追故其叙情怨則欝伊而易感述離居則愴怏而難懐論山水則循聲而得貎言節候則披文而見時是以枚賈追風以入麗馬楊㳂波而得竒其衣被詞人非一代也故才髙者菀其鴻裁中巧者獵其艶辭吟諷者衘其山川童䝉者拾其香草若能憑軾以倚雅頌懸轡以馭楚篇酌竒而不失其真翫華而不墜其實則顧盻可以驅辭力欬唾可以窮文致亦不復乞靈於長卿假寵於子淵矣賛曰不有屈原豈見離騷驚才風逸壯志烟髙山川無極情理實勞金相玉式艷溢錙毫文心雕龍巻一欽定四庫全書文心雕龍巻二梁劉勰撰明詩第六大舜云詩言志歌永言聖謀所析義已明矣是以在心為志發言為詩舒文載實其在兹乎詩者持也持人情性三百之蔽義歸無邪持之為訓有符焉尒人禀七情應物斯感感物吟志莫非自然昔葛天氏樂辭云𤣥鳥在曲黄帝雲門理不空綺至堯有大唐之歌舜造南風之詩觀其二文辭達而已及大禹成功九序惟歌太康敗徳五子咸怨順美匡惡其來乆矣自商暨周雅頌圓備四始彪炳六義環深子夏監絢素之章子貢悟琢磨之句故商賜二子可與言詩自王澤殄竭風人輟采春秋觀志諷誦舊章酬酢以為賔榮吐納而成身文逮楚國諷怨則離騷為刺秦皇滅典亦造仙詩漢初四言韋孟首唱匡諌之義繼軌周人孝武愛文栢梁列韻嚴馬之徒屬辭無方至成帝品録三百餘篇朝章國采亦云周備而辭人遺翰莫見五言所以李陵班婕妤見疑於後代也按召南行露始肇半章孺子滄浪亦有全曲暇豫優歌逺見春秋邪徑童謡近在成世閱時取證則五言久矣又古詩佳麗或稱枚叔其孤竹一篇則傳毅之詞比采而推兩漢之作乎觀其結體散文直而不野婉轉附物怊悵切情實五言之冠冕也至於張衡怨篇清典可味仙詩緩歌雅有新聲暨建安之初五言騰踴文帝陳思縱轡以騁節王徐應劉望路而爭驅並憐風月狎池苑述恩榮敘酣宴慷慨以任氣磊落以使才造懐指事不求纎宻之巧驅辭逐貎惟取昭晢之能此其所同也乃正始明道詩雜仙心何晏之徒率多浮淺惟嵇志清峻阮㫖遥深故能摽焉若乃應璩百一獨立不懼辭譎義貞亦魏之遺直也晉世羣才稍入輕綺張潘左陸比肩詩衢采縟於正始力柔於建安或㭊文以為妙或流靡以自妍此其大略也江左篇製溺乎𤣥風嗤笑徇務之志崇盛亡機之談袁孫已下雖各有雕采而辭趣一揆莫與爭雄所以景純仙篇挺拔而為俊矣宋初文詠體有因革莊老告退而山水方滋儷采百字之偶爭價一句之竒情必極貎以寫物辭必窮力而追新此近世之所競也故鋪觀列代而情變之數可監撮舉同異而綱領之要可明矣若夫四言正體雅潤為本五言流調清麗居宗華實異用惟才所安故平子得其雅叔夜含其潤茂先凝其清景陽振其麗兼善則子建仲宣偏美則太冲公幹然詩有恒裁思無定位隨性適分鮮能通圓若妙識所難其易也將至忽之為易其難也方来至於三六雜言則自出篇什離合之發則明於圖䜟回文所興則道原為始聨句共韻則栢梁餘製巨細或殊情理同致總歸詩囿故不繁云賛曰民生而志詠歌所含興發皇世風流二南神理共契政序相參英華彌縟萬代永耽樂府第七樂府者聲依永律和聲也鈞天九奏既其上帝葛天八闋爰乃皇時自咸英以降亦無得而論矣至於塗山歌於候人始為南音有娀謡乎飛燕始為北聲夏甲歎於東陽東音以發殷整思於西河西音以興音聲推移亦不一概矣匹夫庶婦謳吟土風詩官採言樂盲被律志感絲篁氣變金石是以師曠覘風於盛衰季札鑒㣲於興廢精之至也夫樂本心術故響浹肌髓先王慎焉務塞滛濫敷訓胄子必歌九徳故能情感七始化動八風自雅聲浸㣲溺音騰沸秦燔樂經漢初紹復制氏紀其鏗鏘叔孫定其容與於是武徳興乎髙祖四時廣於孝文雖摹韶夏而頗襲秦舊中和之響閴其不還暨武帝崇禮始立樂府總趙代之音撮齊楚之氣延年以曼聲恊律朱馬以騷體製歌桂華雜曲麗而不經赤鴈羣篇靡而非典河間薦雅而罕御故汲黯致譏於天馬也至宣帝雅頌詩效鹿鳴邇及元成稍廣滛樂正音乖俗其難也如此暨後郊廟惟雜雅章辭雖典文而律非夔曠至於魏之三祖氣爽才麗宰割辭調音靡節平觀其北上衆引秋風列篇或述酣宴或傷羈戍志不出於滔蕩辭不離於哀思雖三調之正聲實韶夏之鄭曲也逮於晉世則傅𤣥曉音創定雅歌以詠祖宗張華新篇亦充庭萬然杜夔調律音奏舒雅荀朂改懸聲節哀急故阮咸譏其離聲後人驗其銅尺和樂精妙固表裏而相資矣故知詩為樂心聲為樂體樂體在聲瞽師務調其器樂心在詩君子宜正其文好樂無荒晉風所以稱逺伊其相謔鄭國所以云亡故知季札觀辭不直聴聲而已若夫豔歌婉孌怨志詄絶滛辭在曲正響焉生然俗聴飛馳職競新異雅詠温恭必欠伸魚睨竒辭切至則拊髀雀躍詩聲俱鄭自此階矣凡樂辭曰詩詩聲曰歌聲來被辭辭繁難節故陳思稱李延年閑於増損古辭多者則宜減之明貴約也觀髙祖之詠大風孝武之歎來遲歌童被聲莫敢不恊子建士衡咸有佳篇並無詔伶人故事謝絲管俗稱乖調盖未思也至於斬伎鼓吹漢世鐃挽雖戎䘮殊事而並總入樂府繆襲所致亦有可筭焉昔子政品文詩與歌别故略具樂篇以標區界賛曰八音摛文樹辭為體謳吟坰野金石雲陛韶響難追鄭聲易啟豈惟觀樂於焉識禮銓賦第八詩有六義其二曰賦賦者鋪也鋪采摛文體物寫志也昔邵公稱公卿獻詩師箴賦傳云登髙能賦可為大夫詩序則同義傳說則異體總其歸塗實相枝幹劉向云明不歌而頌班固稱古詩之流也至如鄭莊之賦大隧士蒍之賦狐裘結言􅠊韻詞自巳作雖合賦體明而未融及靈均唱騷始廣聲貌然賦也者受命於詩人括宇於楚辭也於是荀况禮智宋玉風釣爰錫名號與詩畫境六義附庸蔚成大國述客主以首引極聲貎以窮文斯盖别詩之原始命賦之厥初也秦世不文頗有雜賦漢初詞人順流而作陸賈扣其端賈誼振其緒枚馬同其風王揚騁其勢臯朔巳下品物畢圖繁積於宣時校閱於成世進御之賦千有餘首討其源流信興楚而盛漢矣夫京殿苑獵述行序志並體國經野義尚光大既履端於倡敘亦歸餘於總亂序以建言首引情本亂以理篇迭致文契按那之卒章閔馬稱亂故知殷人輯頌楚人理賦斯並鴻裁之寰域雅文之樞轄也至於草區禽族庻品雜類則觸興致情因變取㑹擬諸形容則言務纎宻象其物宜則理貴側附斯又小制之區畛竒巧之機要也觀夫荀結隠語事數自環宋發巧談實始滛麗枚乗菟園舉要以㑹新相如上林繁類以成艶賈誼鵩鳥致辨於情理子淵洞簫窮變於聲貌孟堅兩都明絢以雅贍張衡二京迅拔以宏富子雲甘泉構深瑋之風延夀靈光含飛動之勢凡此十家並辭賦之流也及仲宣靡宻發端必遒偉長博通時逄壯采太冲安仁策勛於鴻規士衡子安底績於流制景純綺巧縟理有餘彦伯梗概情韻不匱亦魏晉之賦首也原夫登髙之㫖盖覩物興情情以物興故義以明雅物以情觀故詞必巧麗麗詞雅義符采相勝如組織之品朱紫畫繪之著𤣥黄文雖新而有質色雖糅而有本此立賦之大體也然逐末之儔蔑棄其本雖讀千賦愈惑體要遂使繁華損枝膏腴害骨無貴風軌莫益勸戒此楊子所以追悔雕蟲貽誚於霧縠者也賛曰賦自詩出分岐異𣲖寫物圖貎蔚似雕畫㭊滯必揚言庸無隘風歸麗則辭翦美稗頌讃第九四始之至頌居其極頌者容也所以美盛徳而述形容也昔帝嚳之世咸墨為頌以歌九韶自商巳下文理允備夫化偃一國謂之風風正四方謂之雅容告神明謂之頌風雅序人事兼變正頌主告神義必純美魯國以公旦次編商人以前王追録斯乃宗廟之正歌非饗讌之常咏也時邁一篇周公所製哲人之頌規式存焉夫民各有心勿壅惟口晉輿之稱原田魯民之刺裘鞸直言不詠短辭以諷丘明子髙並諜為誦斯則野誦之變體浸被乎人事矣及三閭橘頌情采芬芳比類寓意又覃及細物矣至於秦政刻文爰頌其徳漢之惠景亦有述容㳂世並作相繼於時矣若夫子雲之表充國孟堅之序戴侯仲武之美顯宗史岑之述熹后或擬清廟或範駉那雖深淺不同詳略各異其襃徳顯容典章一也至於班傅之北征西巡變為序引豈不襃過而謬體哉馬融之廣成上林雅而似賦何弄文而失質乎又崔瑗文學蔡邕樊渠並致美於序而簡約乎篇摯虞品藻頗為精覈至云雜以風雅而不變㫖趣徒張虚論有似黄白之偽說矣及魏晉辨頌鮮有出轍陳思所綴以皇子為摽陸機積篇惟功臣最顯其襃貶雜居固末代之訛體也原夫頌惟典雅辭必清鑠敷寫似賦而不入華侈之區敬慎如銘而異乎規戒之域揄揚以發藻汪洋以樹義惟纎曲巧致與情而變其大體所底如斯而已讃者明也助也昔虞舜之祀樂正重讃盖唱發之辭也及益讃於禹伊陟贊於巫咸並颺言以明事嗟歎以助辭也故漢置鴻臚以唱拜為讃即古之遺語也至相如屬筆始讃荆軻及遷史固書託贊襃貶約文以總録頌體以論辭又紀傳後評亦同其名而仲洽流别謬稱為述失之逺矣及景純注雅動植必讃義兼美惡亦猶頌之變耳然其為義事生奬歎所以古來篇體促而不廣必結言於四字之句盤桓乎數韻之辭約舉以盡情昭灼以送文此其體也發源雖逺而致用盖寡大抵所歸其頌家之細條乎賛曰容體底頌勲業垂讃鏤彩摛文聲理有爛年積逾逺音徽如旦降及品物炫辭作翫祝盟第十天地定位祀徧羣神六宗既禋三望咸秩甘雨和風是生黍稷兆民所仰美報興焉犧盛惟馨本於明徳祝史陳信資乎文辭昔伊耆始蜡以祭八神其辭云土反其宅水歸其壑昆蟲無作草朩歸其澤則上皇祝文爰在兹矣舜之祠田云荷此長耜耕彼南畝四海俱有利民之志頗形於言矣至於商履聖敬日躋𤣥牡告天以萬方罪已即郊禋之祠也素車禱旱以六事責躬則雩禜之文也及周之大祝掌六祀之辭是以庶物咸生陳於天地之郊旁作穆穆唱於迎日之拜夙興夜處言於祔廟之祝多福無疆布於少牢之饋宜社類禡莫不有文所以寅䖍於神祗嚴恭於宗廟也春秋巳下黷祀謟祭祝幣史辭靡神不至至於張老成室致善於歌哭之禱蒯聵臨戰獲佑於筋骨之請雖造次顛沛必於祝矣若夫楚辭招魂可謂祝辭之組纚也漢之羣祀肅其㫖禮既總碩儒之儀亦參方士之術所以秘祝移過異於成湯之心侲子敺疫同乎越巫之祝體失之漸也至如黄帝有祝邪之文東方朔有罵鬼之書於是後之譴呪務於善罵惟陳思誥咎裁以正義矣若乃禮之祭祀事止告饗而中代祭文兼讃言行祭而兼讃盖引神而作也又漢代山陵哀䇿流文周䘮盛姬内史執䇿然則策本書贈因哀而為文也是以義同於誄而文實告神誄首而哀末頌體而祝儀太史所作之讃因周之祝文也凡羣言發華而降神務實脩辭立誠在於無媿祈禱之式必誠以敬祭奠之楷宜恭且哀此其大較也班固之祀濛山祈禱之誠敬也潘岳之祭庾婦奠祭之恭哀也舉彚而求昭然可鑒矣盟者明也騂毛白馬珠盤玉敦陳辭乎方明之下祝告於神明者也在昔三王詛盟不及時有要誓結言而退周衰屢盟以及要契始之以曹沫終之以毛遂及秦昭盟夷設黄龍之詛漢祖建侯定山河之誓然義存則克終道廢則渝始崇替在人呪何預焉若夫臧洪歃辭氣截雲蜺劉琨鐵誓精貫霏霜而無補於晉漢反為仇讎故知信不由𠂻盟無益也夫盟之大體必序危機奬忠孝共存亡戮心力祈幽靈以取鑒指九天以為正感激以立誠切至以敷辭此其所同也然非辭之難處辭為難後之君子宜在殷鑒忠信可矣無恃神焉賛曰毖祀欽明祝史惟談立誠在肅脩辭必甘季代彌飾絢言朱藍神之来格所貴無慙文心雕龍巻二欽定四庫全書文心雕龍巻三梁劉勰撰銘箴第十一昔帝軒刻輿几以弼違大禹勒筍簴而招諌成湯盤盂著日新之規武王戸席題必戒之訓周公慎言於金人仲尼革容於欹器則先聖鑒戒其來乆矣故銘者名也觀器必也正名審用貴乎盛徳盖臧武仲之論銘也曰天子令徳諸侯計功大夫稱伐夏鑄九牧之金鼎周勒肅慎之楛矢令徳之事也吕望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勲於景鐘孔悝表勤於衛鼎稱伐之類也若乃飛廉有石槨之錫靈公有蒿里之謚銘發幽石吁可怪矣趙靈勒跡於畨吾秦昭刻博於華山夸誕示後吁可笑也詳觀衆例銘義見矣至於始皇勒岳政暴而文澤亦有踈通之美焉若班固燕然之勒張昶華隂之碣序亦盛矣蔡邕銘思獨冠古今橋公之鉞吐納典謨朱穆之鼎全成碑文溺所長也至如敬通雜器凖矱戒銘而事非其物繁略違中崔駰品物讃多戒少李尤積篇義儉辭碎蓍龜神物而居博奕之中衡斛嘉量而在臼杵之末曾名品之未暇何事理之能閑哉魏文九寳器利辭鈍惟張載劔閣其才清采迅足駸駸後發前至勒銘岷漢得其宜矣箴者所以攻疾防患喻鍼石也斯文之興盛於三代夏商二箴餘句頗存及周之辛甲百官箴一篇體義備焉迄至春秋㣲而未絶故魏絳諷君於后羿楚子訓民於在勤戰伐巳來棄徳務功銘辭代興箴文委絶至揚雄稽古始範虞箴作卿尹州牧二十五篇及崔胡補綴總稱百官指事配位鞶鑑可徴信所謂追清風於前古攀辛甲於後代者也至於潘朂符節要而失淺温嶠侍臣博而患繁王濟國子引廣事雜潘尼乘輿義正體蕪凡斯繼作鮮有克𠂻至於王朗雜箴乃寘巾履得其戒慎而失其所施觀其約文舉要憲章戒銘而水火井竈繁辭不已志有偏也夫箴誦於官銘題於器名目雖異而警戒實同箴全禦過故文資确切銘兼襃讃故體貴𢎞潤其取事也必覈以辨其摛文也必簡而深此其大要也然矢言之道盖闕庸器之制久淪所以箴銘異用罕施於代惟秉文君子宜酌其逺大焉賛曰銘實表器箴惟徳軌有佩於言無鑒於水秉兹貞厲敬言乎履義典則𢎞文約為美誄碑第十二周世盛徳有銘誄之文大夫之材臨䘮能誄誄者累也累其徳行旌之不朽也夏商已前其詳靡聞周雖有誄未被於士又賤不誄貴㓜不誄長在萬乗則稱天以誄之讀誄定謚其節文大矣自魯莊戰乗丘始及於士逮尼父卒哀公作誄觀其愸遺之切嗚呼之歎雖非叡作古式存焉至栁妻之誄惠子則辭哀而韻長矣暨乎漢世承流而作揚雄之誄元后文實煩穢沙麓撮其要而摯疑成篇安有累徳述尊而濶略四句乎杜篤之誄有譽前代吴誄雖工而他篇頗踈豈以見稱光武而改盻千金哉傅毅所制文體倫序孝山崔瑗辨絜相參觀其序事如傳辭靡律調固誄之才也潘岳搆意専師孝山巧於序悲易入新切所以隔代相望能徴厥聲者也至如崔駰誄趙劉陶誄黄並得憲章工在簡要陳思叨名而體實繁緩文皇誄末㫖言自陳其乖甚矣若夫殷臣誄湯追襃𤣥鳥之祚周史歌文上闡后稷之烈誄述祖宗盖詩人之則也至於序述哀情則觸類而長傅毅之誄北海云白日幽光雰霧杳㝠始序致感遂為後式景而效者彌取於工矣詳夫誄之為制盖選言録行傳體而頌文榮始而哀終論其人也曖乎若可覿道其哀也悽焉如可傷此其㫖也碑者埤也上古帝皇始號封禪樹石埤岳故曰碑也周穆紀跡於弇山之石亦古碑之意也又宗廟有碑樹之兩楹事止麗牲未勒勲績而庸器漸闕故後代用碑以石代金同乎不朽自廟徂墳猶封墓也自後漢以來碑碣雲起才鋒所斷莫髙蔡邕觀楊賜之碑骨鯁訓典陳郭二文詞無擇言周乎衆碑莫非清允其敘事也該而要其綴采也雅而澤清詞轉而不窮巧義出而卓立察其為才自然而至孔融所創有慕伯喈張陳兩文辨給足采亦其亞也及孫綽為文志在碑誄温王郤庾辭多枝雜桓彞一篇最為辨裁夫屬碑之體資乎史才其序則傳其文則銘標序盛徳必見清風之華昭紀鴻懿必見峻偉之烈此碑之制也夫碑實銘器銘實碑文因器立名事光於誄是以勒石讃勲者入銘之域樹碑述巳者同誄之區焉賛曰寫實追虛碑誄以立銘徳慕行文采允集觀風似面聽辭如泣石墨鐫華頽影豈忒哀弔第十三賦憲之謚短折曰哀哀者依也悲實依心故曰哀也以辭遣哀盖下淚之悼故不在黄髪必施夭昏昔三良殉秦百夫莫贖事均夭横黄鳥賦哀抑亦詩人之哀辭乎暨漢武封禪而霍子侯暴亡帝傷而作詩亦哀辭之類矣及後漢汝陽王亡崔瑗哀辭始變前式然履突鬼門怪而不辭駕龍乘雲仙而不哀又卒章五言頗似歌謡亦彷彿乎漢武也至於蘇慎張升並述哀文雖發其情華而未極心實建安哀辭惟偉長差善行女一篇時有惻怛及潘岳繼作實踵其美觀其慮善辭變情洞悲苦敘事如傳結言摹詩促節四言鮮有緩句故能義直而文婉體舊而趣新金鹿澤蘭莫之或繼也原夫哀辭大體情主於痛傷而辭窮乎愛惜㓜未成徳故譽止於察惠弱不勝務故悼加乎膚色隠心而結文則事愜觀文而屬心則體奢奢體為辭則雖麗不哀必使情徃㑹悲文來引泣乃其貴耳弔者至也詩云神之弔矣言神至也君子令終定謚事極理哀故賔之慰主以至到為言也壓溺乖道所以不弔又宋水鄭火行人奉辭國災民亡故同弔也及晉築虒臺齊襲燕城史趙蘇秦翻賀為弔虐民搆敵亦亡之道凡斯之例弔之所設也或驕貴而殞身狷忿以乖道或有志而無時或美才而兼累追而慰之並名為弔自賈誼浮湘發憤弔屈體同而事覈辭清而理哀盖首出之作也及相如之弔二世全為賦體桓譚以為其言惻愴讀者歎息及平章要切斷而能悲也揚雄弔屈思積功寡意深文略故辭韻沉膇班彪蔡邕並敏於致語然影附賈氏難為並驅耳胡阮之弔夷齊襃而無聞仲宣所制譏呵實工然則胡阮嘉其清王子傷其隘各志也禰衡之弔平子縟麗而輕清陸機之弔魏武序巧而文繁降斯以下未有可稱者矣夫弔雖古義而華辭未造華過韻緩則化而為賦固宜正義以䋲理昭徳而塞違割析襃貶哀而有正則無奪倫矣賛曰辭定所表在彼弱弄苗而不秀自古斯慟雖有通才迷方告控千載可傷寓言以送雜文第十四智術之子博雅之人藻溢於辭辭盈乎氣苑囿文情故日新殊致宋玉含才頗亦負俗始造對問以申其志放懐寥廓氣實使之及枚乗摛艷首製七發腴辭雲搆夸麗風駭盖七竅所發發乎嗜欲始邪末正所以戒膏梁之子也揚雄覃思文濶業深綜述碎文璅語肇為連珠其辭雖小而明潤矣凡此三者文章之枝派暇豫之末造也自對問以後東方朔效而廣之名為客難託古慰志踈而有辨楊雄解嘲雜以諧謔迴環自釋頗亦為工班固賔戯含懿采之華崔駰達㫖吐典言之裁張衡應間宻而兼雅崔實客譏整而微質蔡邕釋誨體奥而文炳景純客傲情見而采蔚雖迭相祖述然屬篇之髙者也至於陳思客問辭髙而理踈庾敳客咨意榮而文悴斯類甚衆無所取裁矣原兹文之設廼發憤以表志身挫憑乎道勝時屯寄於情泰莫不淵岳其心麟鳯其采此立本之大要也自七發以下作者繼踵觀枚氏首唱信獨拔而偉麗矣及傳毅七激㑹清要之工崔駰七依入博雅之巧張衡七辨結采綿靡崔瑗七厲植義純正陳思七啓取美於宏壯仲宣七釋致辨於事理自桓麟七說以下左思七諷以上枝附影從十有餘家或文麗而義睽或理粹而辭駁觀其大抵所歸莫不髙談宫館壯語畋獵窮瓌竒之服饌極蠱媚之聲色甘意揺骨體艷詞動魂識雖始之以淫侈而終之以居正然諷一勸百勢不自反子雲所謂先騁鄭衛之聲曲終而奏雅者也惟七厲叙賢歸以儒道雖文非拔羣而意實卓爾矣自連珠以下擬者間出杜篤賈逵之曹劉珍潘朂之輩欲穿明珠多貫魚目可謂夀陵匍匐非復邯鄲之歩里醜捧心不闗西施之嚬矣惟士衡運思理新文敏而裁章置句廣於舊篇豈慕朱仲四寸之璫乎夫文小易周思閒可贍足使義明而辭淨事圓而音澤磊磊自轉可稱珠耳詳夫漢来雜文名號多品或典誥誓問或覽略篇章或曲操弄引或吟諷謡詠總括其名並歸雜文之區甄别其義各入討論之域類聚有貫故不曲述賛曰偉矣前脩學堅多飽負文餘力飛靡弄巧技辭攅映嘒若參昴慕嚬之心於焉祗攪諧讔第十五芮良夫之詩云自有肺腸俾民卒狂夫心險如山口壅若川怨怒之情不一歡謔之言無方昔華元棄甲城者發睅目之謳臧紇䘮師國人造侏儒之歌並嗤戯形貌内怨為俳也又蠶蠏鄙諺貍首滛哇茍可箴戒載於禮典故知諧辭讔言亦無棄矣諧之言皆也辭淺㑹俗皆悦笑也昔齊威酣樂而淳于説甘酒楚襄讌集而宋玉賦好色意在㣲諷有足觀者及優旃之諷漆城優孟之諫葬馬並譎辭飾說抑止昬暴是以子長編史列傳滑稽以其辭雖傾回意歸義正也但本體不雅其流易弊於是東方枚臯餔糟啜醨無所匡正而詆嫚媟弄故其自稱為賦廼亦俳也見視如倡亦有悔矣至魏文因俳説以著笑書薛綜憑宴㑹而發嘲調雖抃推席而無益時用矣然而懿文之士未免枉轡潘岳醜婦之屬束晢賣餅之類尤而效之盖以百數魏晉滑稽盛相驅扇遂乃應瑒之鼻方於盗削卵張華之形比乎握舂杵曾是莠言有虧徳音豈非溺者之妄笑胥靡之狂歌歟讔者隠也遯辭以隠意譎譬以指事也昔還社求拯於楚師喻眢井而稱麥麴叔儀乞糧於魯人歌佩玉而呼庚癸伍舉刺荆王以大鳥齊客譏薛公以海魚莊姬託辭於龍尾臧文謬書於羊裘隠語之用被於紀傳大者興治濟身其次弼違曉惑盖意生於權譎而事出於機急與夫諧辭可相表裏者也漢世隠書十有八篇歆固編文録之歌末昔楚莊齊威性好隠語至東方曼倩尤巧辭述但謬辭詆戯無益規補自魏代巳來頗非俳優而君子嘲隠化為謎語謎也者迴互其辭使昏迷也或體目文字或圖象品物纎巧以弄思淺察以􅃷辭義欲婉而正辭欲隠而顯荀卿蠶賦巳兆其體至魏文陳思約而宻之髙貴郷公博舉品物雖有小巧用乖逺大夫觀古之為隠理周要務豈為童稚之戯謔摶髀而抃笑哉然文辭之有諧隠譬九流之有小説盖稗官所采以廣視聴若效而不已則髠袒而入室旃孟之石交乎賛曰古之嘲隠振危釋憊雖有絲麻無棄菅蒯㑹義適時頗益諷誡空戱滑稽徳音大壊文心雕龍巻三欽定四庫全書文心雕龍巻四梁劉勰撰史傳第十六開闢草昧嵗紀綿邈居今識古其載籍乎軒轅之世史有蒼頡主文之職其来久矣曲禮曰史載筆左右使之記也古者左史記事者右史記言者言經則尚書事經則春秋唐虞流于典謨商夏被于誥誓洎周命惟新姫公定法紬三正以班歴貫四時以聨事諸侯建邦各有國史彰善癉惡樹之風聲自平王微弱政不及雅憲章散紊彞倫攸斁昔者夫子閔王道之缺傷斯文之墜静居以歎鳳臨衢而泣麟於是就大師以正雅頌因魯史以修春秋舉得失以表黜陟徴存亡以摽勸戒襃見一字貴踰軒冕貶在片言誅深斧鉞然睿㫖存亡幽隠經文婉約丘明同時實得微言乃原始要終創為傳體傳者轉也轉受經㫖以授其後實聖文之羽翮記籍之冠冕也及至從横之世史職猶存秦并七王而戰國有䇿盖録而弗叙故即簡而為名也漢滅嬴項武功積年陸賈稽古作楚漢春秋爰及太史談世惟執簡子長繼志甄序帝勣比堯稱典則位雜中賢法孔題經則文非元聖故取式吕覽通號曰紀紀綱之號亦宏稱也故本紀以述皇王列傳以總侯伯八書以鋪政體十表以譜年爵雖殊古式而得事序焉爾其實録無隠之㫖博雅𢎞辨之才愛竒反經之尤條例踳落之失叔皮論之詳矣及班固述漢因循前業觀司馬遷之辭思實過半其十志該富讃序𢎞麗儒雅彬彬信有遺味至於宗經矩聖之典端緒豐贍之功遺親攘美之罪徴賄鬻筆之愆公理辨之究矣觀夫左氏綴事附經間出於文為約而氏族難明及史遷各傳人始區詳而易覽述者宗焉及孝恵委機吕后攝政班史立紀違經失實何則庖犧以来未聞女帝者也漢運所值難為後法牝雞無晨武王首誓婦無與國齊桓著盟宣后亂秦吕氏危漢豈唯政事難假亦名號宜愼矣張衡司史而惑同遷固元帝王后欲為立紀謬亦甚矣尋子𢎞雖偽要當孝惠之嗣孺子誠微實繼平帝之體二子可紀何有於二后哉至于後漢紀傳發源東觀袁張所制偏駁不倫薛謝之作踈謬少信若司馬彪之詳實華嶠之準當則其冠也及魏代三雄記傳互出陽秋魏畧之屬江表呉録之類或激抗難徴或踈闊寡要唯陳壽三志文質辨洽荀張比之於遷固非妄譽也至於晉代之書繫乎著作陸機肇始而未備王韶續末而不終干寳述紀以審正得序孫盛陽秋以約舉為能按春秋經傳舉例發凡自史漢以下莫有準的至鄧粲晉紀始立條例又擺落漢魏憲章殷周雖湘州曲學亦有心典謨及安國立例乃鄧氏之䂓焉原夫載籍之作也必貫乎百姓被之千載表徵盛衰殷鑑興廢使一代之制共日月而長存王覇之跡並天地而久大是以在漢之初史職為盛郡國文計先集太史之府欲其詳悉於體國必閱石室唘金匱抽裂帛檢殘竹欲其博練於稽古也是立義選言宜依經以樹則勸戒與奪必附聖以居宗然後銓評昭整苛濫不作矣然紀傳為式編年綴事文非泛論按實而書嵗逺則同異難密事積則起訖易踈斯固總㑹之為難也或有同歸一事而數人分功兩記則失於複重偏舉則病於不周此又銓配之未易也故張衡摘史班之舛濫傳𤣥譏後漢之尤煩皆此類也若夫追述逺代代逺多偽公羊髙云傳聞異辭荀况稱録逺畧近葢文疑則闕貴信史也然俗皆愛竒莫顧實理傳聞而欲偉其事録逺而欲詳其跡於是棄同即異穿鑿傍説舊史所無我書則傳此訛濫之本源而述逺之巨蠧也至於記編同時時同多詭雖定哀微辭而世情利害勲勞之家雖庸夫而盡餙迍敗之士雖令徳而常嗤理欲吹霜喣露寒暑筆端此又同時之枉可為歎息者也故述逺則誣矯如彼記近則回邪如此析理居正唯素臣乎若乃尊賢隠諱固尼父之聖㫖盖纖瑕不能玷瑾瑜也姦慝懲戒實良史之直筆農夫見莠其必鋤也若斯之科亦萬代一準焉至於尋繁領雜之術務信棄竒之要明白頭訖之序品酌事例之條曉其大綱則衆理可貫然史之為任乃彌綸一代負海内之責而贏是非之尤秉筆荷擔莫此之勞遷固通矣而歴詆後世若任情失正文其殆哉贊曰史肇軒黄體備周孔世歴斯編善惡偕總騰襃裁貶萬古魂動辭宗丘明直歸南董諸子第十七諸子者入道見志之書太上立德其次立言百姓之羣居苦紛雜而莫顯君子之處世疾名徳之不章唯英才特達則炳曜垂文騰其姓氏懸諸日月焉昔風后力牧伊尹咸其流也篇述者葢上古遺語而戰伐所記者也至鬻熊知道而文王諮詢餘文遺事録為鬻子子自肇始莫先於兹及伯陽識禮而仲尼訪問爰序道徳以冠百氏然則鬻惟文友李實孔師聖賢並世而經子異流矣逮及七國力政俊乂蠭起孟軻膺儒以罄折荘周述道以翺翔墨翟執儉确之教尹文課名實之符野老治國於地利騶子養政於天文申商刀鋸以制理鬼谷脣吻以䇿勲尸佼兼總於雜術青史曲綴以街談承流而枝附者不可勝算並飛辨以馳術饜禄而餘榮矣暨于暴秦烈火勢炎崐岡而烟燎之毒不及諸子逮漢成普思子政讎校於是七畧芬菲九流鱗萃殺青所編百有八十餘家矣迄至魏晉作者間出讕言兼存璅語必録類聚而求亦充箱照軫矣然繁辭雖積而本體易總述道言治枝條五經其純粹者入矩踳駁者出規禮記月令取乎吕氏之紀三年問喪寫乎荀子之書此純粹之類也若乃湯之問棘云蚊睫有雷霆之聲恵施對梁王云蝸角有伏尸之戰列子有移山跨海之談淮南有傾天折地之説此踳駁之類也是以世疾諸混洞虚誕按歸蔵之經大明迂怪乃稱羿斃十日姮娥奔月殷湯如玆况諸子乎至如商韓六虱五蠧棄孝廢仁轅藥之禍非虚至也公孫之白馬孤犢辭巧理拙魏牟比之鴞鳥非妄貶也昔東平求諸子史記而漢朝不與蓋以史記多兵謀而諸子雜詭術也然洽聞之士宜撮綱要覽華而食實棄邪而採正極睇參差亦學家之壯觀也研夫孟荀所述理懿而辭雅管晏屬篇事覈而言練列御寇之書氣偉而采竒鄒子之説心奢而辭壯墨翟随巢意顯而語質尸佼尉繚術通而文鈍鶡冠綿綿亟發深言鬼谷渺渺每環其義情辨以澤文子擅其能辭約而精尹文得其要慎到折密理之巧韓非著博喻之富吕氏鑒逺而體周淮南汎採而文麗斯則得百氏之華采而辭氣文之大畧也若夫陸賈典語賈誼新書楊雄法言劉向説苑王符潜夫崔寔正論仲長昌言杜夷幽求咸叙經典或明政術雖標論名歸乎諸子何者博明萬事為子適辨一理為論彼皆蔓延雜説故入諸子之流夫自六國以前去聖未逺故能越世髙談自開戸牖兩漢以後體勢浸弱雖眀乎坦途而類多依採此逺近之漸變也嗟夫身與時舛志共道申摽心於萬古之上而送懷於千載之下金石靡矣聲其銷乎贊曰大夫處世懐實挺秀辨雕萬物智周宇宙立徳何隠含道必授條流殊述若有區囿論説第十八聖哲彞訓曰經述經叙理曰論論者倫也倫理無爽則聖意不墜昔仲尼微言門人追記故仰其經目稱為論語蓋羣論立名始於兹矣自論語巳前經無論字六韜二論後人追題乎詳觀論體條流多品陳政則與議説合契釋經則與傳注參體辨史則與賛評齊行銓文則與叙引共紀故議者宜言説者説語傳者轉師注者主解賛者明意評者平理序者次事引者𦙍辭八名區分一揆宗論論也者彌綸羣言而研精一理者也是以荘周齊物以論為名不韋春秋六論昭列至石渠論藝白虎通講聚述聖言通經論家之正體也及班彪王命嚴尤三将敷述昭情善入史體魏之初覇術兼名法傅嘏王粲校練名理迄至正始務欲守文何晏之徒始盛𤣥論於是聃周當路與尼父争塗矣詳觀蘭石之才性仲宣之去代叔夜之辨聲太初之本元輔嗣之兩例平叔之二論並師心獨見鋒頴精密葢人倫之英也至如李康運命同論衡而過之陸機辨亡效過秦而不及然亦其美矣次及宋岱郭象銳思於機神之區夷甫裴頠交辨於有無之域並獨歩當時流聲後代然滯有者全繫於形用貴無者専守於寂寥徒銳偏解莫詣正理動極神源其般若之絶境乎逮江左羣談惟𤣥是務雖有日新而多抽前緒矣至如張衡譏世韻似排説孔融孝㢘但談嘲戯曹植辨道體同書抄言不持正論如其巳原夫論之為體所以辨正然否窮于有數追于無形迹堅求通鉤深取極乃百慮之筌蹄萬事之權衡也故其義貴圓通辭忌枝碎必使心與理合彌縫莫見其隙辭共心密敵人不知所乗斯其要也是以論如析薪貴能破理斤利者越理而横斷辭辨者反義而取通覽文雖巧而檢跡如妄唯君子能通天下之志安可以曲論哉若夫注釋為辭解散論體雜文雖異總會是同若秦延君之注堯典十餘萬字朱普之解尚書三十萬言所以通人惡煩羞學章句若毛公之訓詩安國之傳書鄭君之釋禮王弼之解易要約眀暢可謂式矣説者悦也兑為口舌故言咨悦懌過悅必偽故舜驚讒説説之善者伊尹以論味隆殷太公以辨釣興周及燭武行而紓鄭端朩出而存魯亦其美也暨戰國争雄辨士雲踊從横參謀長短角勢轉丸騁其巧辭飛鉗伏其精術一人之辨重於九鼎之寳三寸之舌强於百萬之師六印磊落以佩五都隠賑而封至漢定秦楚辨士弭節酈君既斃於齊鑊蒯子㡬入乎漢鼎雖復陸賈籍甚張釋傅㑹杜欽文辨婁䕶脣舌頡頏萬乗之階抵嘘公卿之席並順風以託勢莫能逆波而泝洄矣夫説貴撫㑹㢮張相随不専緩頰亦在刀筆范睢之言事李斯之止逐客並煩情入機動言中務雖批逆鱗而功成計合此上書之善説也至於鄒陽之説吳梁喻巧而理至故雖危而無咎矣敬通之説鮑鄧事緩而文繁所以歴聘而罕遇也凡論之樞要必使時利而義貞進有契於成務退無阻於榮身自非譎敵則唯忠與信披肝膽以獻主飛文敏以濟辭此説之本也而陸氏直稱説煒􅋫以譎誑何哉贊曰理形於言叙理成論詞深人天致逺方寸隂陽莫貳鬼神靡遯説爾飛鉗呼吸沮勸詔䇿第十九皇帝御㝢其言也神淵嘿黼扆而響盈四表唯詔策乎昔軒轅唐虞同稱為命命之為義制性之本也其在三代事兼誥誓誓以訓戎誥以敷政命喻自天故授官錫𦙍易之姤象后以施命誥四方誥命動民若天下之有風矣降及七國並稱曰令令者使也秦并天下改命曰制漢初定儀則則命有四品一曰䇿書二曰制書三曰詔書四曰戒勑勑戒州部詔誥百官制施赦命䇿封王侯䇿者簡也制者裁也詔者告也勑者正也詩云畏此簡書易稱君子以制數度禮稱明君之詔書稱勑天之命並本經典以立名目逺詔近命習秦制也記稱絲綸所以應接群后虞重納言周貴喉舌故兩漢詔誥職在尚書王言之大動入史䇿其出如綍不反若汗是以淮南有英才武帝使相如視草隴右多文士光武加意於書辭豈直取美當時亦敬慎来葉矣觀文景以前詔體浮新武帝崇儒選言𢎞奥䇿封三王文同訓典勸戒淵雅垂範後代及制誥嚴助即云厭承明廬葢寵才之恩也孝宣璽書賜太守陳遂亦故舊之厚也逮光武撥亂留意斯文而造次喜怒時或偏濫詔賜鄧禹稱司徒為堯勑責侯覇稱黄鉞一下若斯之類實乖憲章暨明帝崇學雅詔間出安和政㢮禮閣鮮才每為詔勑假手外請建安之末文理代興潘朂九錫典雅逸羣衛覬禪誥符命炳燿弗可加也自魏晉誥䇿職在中書劉放張華互管斯任施命發號洋洋盈耳魏文帝下詔辭義多偉至於作威作福其萬慮之一弊乎晉氏中興唯明帝崇才以温嶠文清故引入中書自斯以後體憲風流矣夫王言崇祕大觀在上所以百辟其刑萬邦作孚故授官選賢則義炳重離之輝優文封䇿則氣含風雨之潤勑戒恒誥則筆吐星漢之華治戎爕伐則聲有洊雷之威眚災肆赦則文有春露之滋明罰勑法則辭有秋霜之烈此詔䇿之大畧也戒勑為文實詔之切者周穆命郊父受勑憲此其事也魏武稱作勑戒當指事而語勿得依違曉治要矣及晉武勑戒備告百官勑都督以兵要戒州牧以董司警郡守以恤隠勒牙門以禦衛有訓典焉戒者慎也禹稱戒之用休君父至尊在三罔極漢髙祖之勑太子東方朔之戒子亦顧命之作也及馬援巳下各貽家戒班姫女戒足稱母師也教者效也言出而民效也契敷五教故王侯稱教昔鄭𢎞之守南陽條教為後所述乃事緒明也孔融之守北海文教麗而罕於理乃治體乖也若諸葛孔明之詳約庾稚恭之明斷並理得而辭中教之善也自教以下則又有命詩云有命在天明為重也周禮曰師氏詔王為輕命今詔重而命輕者古今之變也贊曰皇王施令寅嚴宗誥我有絲言兆民尹好輝音峻舉鴻風逺蹈騰義飛辭焕其大號檄移第二十震雷始於曜電出師先乎威聲故觀電而懼雷壮聽聲而懼兵威兵先乎聲其来巳久昔有虞始戒於國夏后初誓於軍殷誓軍門之外周將交刄而誓之故知帝世戒兵三王誓師宣訓我衆未及敵人也至周穆西征祭公謀父稱古有威讓之令令有文告之辭即檄之本源也及春秋征伐自諸侯出懼敵弗服故兵出湏名振此威風曝彼昏亂劉獻公之所謂吿之以文辭董之以師武者也齊桓征楚詰菁茅之闕晉厲伐秦責箕郜之焚管仲吕相奉辭先路詳其意義即今之檄文暨乎戰國始稱為檄檄者皦也宣露於外皦然明白也張儀檄楚書以尺二明白之文或稱露布播諸視聽也夫兵以定亂莫敢自專天子親戎則稱龔行天罰諸侯御師則云肅将王誅故分閫推轂奉辭伐罪非唯致果為毅亦且厲辭為武使聲如衡風所擊氣似攙搶所掃奮其武怒總其罪人懲其惡稔之時顯其貫盈之數揺姦宄之膽訂信愼之心使百尺之衝摧折於咫書萬雉之城顚墜於一檄者也觀隗囂之檄亡新布其三逆文不雕飾而辭切事明隴右文士得檄之體矣陳琳之檄壯有骨鯁雖姦閹擕養章密太甚發丘模金誣過其虐然抗辭書釁皦然露骨矣敢指曹公之鋒幸哉免袁黨之戮也鍾㑹檄蜀徴驗甚明桓公檄胡觀釁尤切並壮筆也凡檄之大體或述此休明或叙彼苛虐指天時審人事算强弱角權勢摽蓍龜於前驗懸鞶鑑於已然雖本國信實參兵詐譎詭以馳㫖煒􅋫以騰説凡此衆條莫或違之者也故其植義颺辭務在剛健揷羽以示迅不可使辭緩露板以宣衆不可使義隠必事昭而理辨氣盛而辭斷此其要也若曲趣密巧無所取才矣又州郡徵吏亦稱為檄固明舉之義也移者易也移風易俗令往而民随者也相如之難蜀老文曉而喻博有移檄之骨焉及劉歆之移太常辭剛而義辨文移之首也陸機之移百官言約而事顯武移之要者也故檄移為用事兼文武其在金革則逆黨用檄順命資移所以洗濯民心堅同符契意用小異而體義大同與檄參伍故不重論也贊曰三驅㢮剛九伐先話鞶鑑吉㐫蓍龜成敗推壓鯨鯤抵落蜂蠆移寳易俗草偃風邁文心雕龍巻四欽定四庫全書文心雕龍巻五梁劉勰撰封禪第二十一夫正位北辰嚮明南面所以運天樞毓黎獻者何嘗不經道緯徳以勒皇蹟者哉録圖曰潬潬噅噅棼棼雉雉萬物盡化言至徳所被也丹書曰義勝欲則從欲勝義則凶戒愼之至也則戒慎以崇其徳至徳以凝其化七十有二君所以封禪矣昔黄帝神靈克膺鴻瑞勒功喬岳鑄鼎荆山大舜廵岳顯乎虞典成康封禪聞之樂緯及齊桓之覇爰窺王跡夷吾譎諌距以怪物固知玉牒金鏤専在帝皇也然則西鶼東鰈南茅北黍空談非徴勲徳而已是史遷八書明述封禪者固禋祀之殊禮名號之祕祝祀天之壯觀矣秦皇銘岱文自李斯法家辭氣體乏𢎞潤然踈而能壮亦彼時之絶采也鋪觀兩漢隆盛孝武禪號於肅然光武廵封於梁父誦徳銘勲乃鴻筆耳觀相如封禪蔚為唱首爾其表權輿序皇王炳𤣥符鏡鴻業驅前古於當今之下騰休明於列聖之上歌之以禎瑞讃之以介丘絶筆兹文固惟新之作也及光武勒碑則文自張純首𦙍典謨末同祝辭引鈎讖叙離亂計武功述文徳事覈理舉華不足而實有餘矣凡此二家並岱宗實跡也及揚雄劇秦班固典引事非鐫石而體因紀禪觀劇秦為文影寫長卿詭言遯辭故兼包神怪然骨掣靡密辭貫圓通自稱極思無遺力矣典引所叙雅有懿乎歴鑑前作能執厥中其致義㑹文斐然餘巧故稱封禪麗而不典劇秦典而不實豈非追觀易為明循勢易為力歟至於邯鄲受命攀響前聲風末力寡輯韻成頌雖文理順序而不能奮飛陳思魏徳假論客主問答迂緩且已千言勞深勣寡飈燄缺焉兹文為用葢一代之典章也搆位之始宜明大體樹骨於訓典之區選言於宏富之路使意古而不晦於深文今而不墜於淺義吐光芒辭成亷鍔則為偉矣雖復道極數殫終然相襲而日新其采者必超前轍焉贊曰封勒帝勣對越天休逖聽髙岳聲英克彪樹石九旻泥金八幽鴻律蟠采如龍如虬章表第二十二夫設官分職髙卑聨事天子垂珠以聽諸侯鳴玉以朝敷奏以言明試以功故堯咨四岳舜命八元固辭再讓之請俞往欽哉之授並陳辭帝庭匪假書翰然則敷奏以言則章表之義也明試以功即授爵之典也至太甲既立伊尹書誡思庸歸亳又作書以讃文翰獻㬱事斯見矣周監二代文理彌盛再拜稽首對揚休命承文受册敢當丕顯雖言筆未分而陳謝可見降及七國未變古式言事於王皆稱上書秦初定制改書曰奏漢定禮儀則有四品一曰章二曰奏三曰表四曰議章以謝恩奏以按劾表以陳請議以執異章者明也詩云為章于天謂文明也其在文物赤白曰章表者標也禮有表記謂德見于儀其在器式揆景曰表章表之目葢取諸此也按七畧藝文謡詠必録章表奏議經國之樞機然闕而不纂者乃各有故事而在職司也前漢表謝遺篇寡存及後漢察舉必試章奏左雄奏議臺閣為式胡廣章奏天下第一並當時之傑筆也觀伯始謁陵之章足見其典文之美焉昔晉文受册三辭從命是以漢末讓表以三為斷曹公稱為表不必三讓又勿得浮華所以魏初表章指事造實求其靡麗則未足美矣至於文舉之薦禰衡氣揚采飛孔明之辭後主志盡文暢雖華實異㫖並表之英也琳瑀章表有譽當時孔璋稱健則其標也陳思之表獨冠羣才觀其體贍而律調辭清而志顯應物掣巧随變生趣執轡有餘故能緩急應節矣逮晉初筆札則張華為儁其三讓公封理周辭要引義比事必得其偶世珍鷦鷯莫顧章表及羊公之辭開府有譽於前談庾公之讓中書信美於往載序志顯類有文雅焉劉琨勸進張駿自序文致耿介並陳事之美表也原夫章表之為用也所以對揚王庭昭明心曲既其身文且亦國華章以造闕風矩應明表以致禁骨采宜耀循名課實以為本者也是以章式炳賁志在典謨使要而非畧明而不淺表體多包情偽屢遷必雅義以扇其風清文以馳其麗然懇惬者辭為心使浮侈者情為文使繁約得正華實相勝唇吻不滯則中律矣子貢云心以制之言以結之蓋一辭意也荀卿以為觀人美辭麗於黼黻文章亦可以喻於斯乎贊曰敷奏絳闕獻贊黼扆言必貞明義則𢎞偉肅恭節文條理首尾君子秉文辭令有斐奏唘第二十三昔唐虞之臣敷奏以言秦漢之輔上書稱奏陳政事獻典儀上急變劾僭謬總謂之奏奏者進也言敷于下情進於上也秦始立奏而法家少文觀王綰之奏勲徳辭質而義近李斯之奏驪山事畧而意逕政無膏潤形於篇章矣自漢以来奏事或稱上䟽儒雅繼踵殊采可觀若夫賈誼之務農晁錯之兵事匡衡之定郊王吉之觀禮温舒之緩獄谷永之諫仙理既切至辭亦通暢可謂識大體矣後漢羣賢嘉言罔伏楊秉耿介於災異陳蕃憤懣於尺一骨鯁得焉張衡指摘於史職蔡邕銓列於朝儀博雅明焉魏代名臣文理迭興若髙堂天文王觀教學王朗節省甄毅考課亦盡節而知治矣晉氏多難災屯流移劉頌殷勤於時務温嶠懇切於費役並體國之忠規矣夫奏之為筆固以明允篤誠為本辨析䟽通為首强志足以成務博見足以窮理酌古御今治繁總要此其體也若乃按劾之奏所以明憲清國昔周之太僕繩愆紏繆秦之御史職主文法漢置中丞總司按劾故位在摯擊砥礪其氣必使筆端振風簡上凝霜者也觀孔光之奏董賢則實其姦回路粹之奏孔融則誣其釁惡名儒之與險士固殊心焉若夫傅咸勁直而按辭堅深劉隗切正而劾文闊畧各其志也後之彈事迭相斟酌惟新日用而舊準弗差然函人欲全矢人欲傷術在紏惡勢必深峭詩刺䜛人投畀豺虎禮嫉無禮方之鸚猩墨翟非儒目以豕彘孟軻譏墨比諸禽獸詩禮儒墨既其如兹奏劾嚴文孰云能免是以世人為文競於詆訶吹毛取瑕次骨為戾復似善罵多失折衷若能闢禮門以懸規標義路以植矩然後踰垣者折肱㨗徑者滅趾何必躁言醜句詬病為切哉是以立範運衡宜明體要必使理有典刑辭有風軌總法家之式秉儒家之文不畏强禦氣流墨中無縱詭随聲動簡外乃稱絶席之雄直方之舉耳唘者開也髙宗云唘乃心沃朕心取其義也孝景諱啓故兩漢無稱至魏國箋記始云啓聞奏事之末或云謹啓自晉来盛啓用兼表奏陳政言事既奏之異條讓爵謝恩亦表之别幹必歛飭入䂓促其音節辨要輕清文而不侈亦唘之大畧也又表奏确切號為讜言讜者偏也王道有偏乖乎蕩蕩其偏故曰讜言也孝成稱班伯之讜言貴直也自漢置八儀密奏隂陽皂囊封板故曰封事晁錯受書還上便宜後代便宜多附封事慎機密也夫王臣匪躬必吐謇諤事舉人存故無待泛説也贊曰皂飭司直肅清風禁筆鋭干将墨含淳酖雖有次骨無或膚浸獻政陳宜事必任勝議對第二十四周爰諮謀是謂為議議之言宜審事宜也易之節卦君子以制度數議徳行周書曰議事以制政乃弗迷議貴節制經典之體也昔管仲稱軒轅有明臺之議則其来逺矣洪水之難堯咨四岳宅揆之舉舜疇五人三代所興詢及芻蕘春秋釋宋魯桓務議及趙靈胡服而季父争論商鞅變法而甘龍交辨雖憲章無算而同異足觀迄至有漢始立駁議駁者雜也雜議不純故曰駁也自兩漢文明楷式昭備藹藹多士發言盈庭若賈誼之遍代諸生可謂㨗於議也至如主父之駁挟弓安國之辨匈奴賈捐之之陳於朱崖劉歆之辨於祖宗雖質文不同得事要矣若乃張敏之斷輕侮郭躬之議擅誅程曉之駁校事司馬芝之議貨錢何曾蠲出女之科秦秀定賈充之諡事實允當可謂達議體矣漢世善駁則應劭為首晉代能議則傳咸為宗然仲瑗博古而銓貫以叙長虞識治而屬辭枝繁及陸機斷議亦有鋒頴而腴辭弗剪頗累文骨亦各有美風格存焉夫動先擬議明用稽疑所以敬愼羣務㢮張治術故其大體所資必樞紐經典採故實於前代觀通變於當今理不謬揺其枝字不妄舒其藻又郊祀必洞於禮戎事必練於兵佃榖先曉於農斷訟務精於律然後標以顯義約以正辭文以辨絜為能不以繁縟為巧事以明覈為美不以深隠為奇此綱領之大要也若不達政體而舞筆弄文支離構辭穿鑿㑹巧空騁其華固為事實所擯設得其理亦為逰辭所埋矣昔秦女嫁晉從文衣之媵晉人貴媵而賤女楚珠鬻鄭為薫桂之櫝鄭人買櫝而還珠若文浮於理末勝其本則秦女楚珠復在於兹矣又對䇿者應詔而陳政也射䇿者探事而獻説也言中理準譬射侯中的二名雖殊即議之别體也古之造士選事考言漢文中年始舉賢良晁錯對䇿蔚為舉首及孝武益明旁求俊乂對䇿者以第一登庸射䇿者以甲科入仕斯固選賢要術也觀晁氏之對證驗古今辭裁以辨事通而贍超升髙第信有徴矣仲舒之對祖述春秋本陰陽之化究列代之變煩而不慁者事理明也公孫之對簡而未博然總要以約文事切而情舉所以太常居下而天子擢上也杜欽之對畧而指事辭以治宣不為文作及後漢魯丕辭氣質素以儒雅中䇿以入髙第凡此五家並前代之明範也魏晉巳來稍務文麗以文紀實所失已多及其来選又稱疾不㑹雖欲求文弗可得也是以漢飲博士而雉集平堂晉䇿秀才而麏興於前無他怪也選失之異耳夫駁議偏辨各執異見對䇿揄揚大明治道使事深於政術理密於時務酌三五以鎔世而非迂緩之髙談馭權變以拯俗而非刻薄之偽論風恢恢而能逺流洋洋而不溢王庭之美對也難矣哉士之為才也或練治而寡文或工文而踈治對䇿所選實屬通才志足文逺不其鮮歟贊曰議惟疇政名實相課斷理必綱摛辭無懦對䇿王庭同時酌和洽體髙秉雅謨逺播書記第二十五大舜云書用識哉所以記時事也葢聖賢言辭總為尚書尚書之為體主言者也揚雄曰言心聲也書心畫也聲畫形君子小人可見矣故書者舒也舒布其言陳之簡牘取象乎夬貴在明决而已三代政暇文翰頗踈春秋聘繁書介彌盛繞朝贈士㑹以䇿子家與趙宣以書巫臣之遺子反子産之諫范宣詳觀四書辭若對面又子服敬叔進弔書於滕君固知行人挈辭多被翰墨矣及七國獻書詭麗輻輳漢来筆札辭氣紛紜觀史遷之報任安東方朔之難公孫楊惲之酬㑹宗子雲之答劉歆志氣槃桓各含殊采並杼軸乎尺素抑揚乎寸心逮後漢書記則崔瑗尤善魏之元瑜號稱翩翩文舉屬章半簡必録休璉好事留意辭翰抑其次也嵇康絶交實志髙而文偉矣趙至敘離廼少年之激切也至如陳遵占辭百封各意襧衡代書親踈得宜斯又尺牘之偏才也詳總書體本在盡言言以散鬰陶託風采故宜條暢以任氣優柔以懌懷文明從容亦心聲之獻酬也若夫尊貴差序則肅以節文戰國以前君臣同書秦漢立儀始有表奏王公國内亦稱奏書張敞奏書於膠后其義美矣迄至後漢稍有名品公府奏記而郡將奏牋記之言志進已志也牋者表也識表其情也崔寔奏記於公府則崇讓之徳音矣黄香奏牋於江夏亦肅恭之遺式矣公幹牋記麗而䂓益子桓弗論故世所共遺若畧名取實則有美於為詩矣劉廙謝恩喻切以至陸機自理情周而巧牋之為善者也原牋記之為式既上窺乎表亦下睨乎書使敬而不懾簡而無傲清美以恵其才彪蔚以文其響葢牋記之分也夫書記廣大衣被事體筆劄雜名古今多品是以總領黎庶則有譜籍簿録毉歴星筮則有方術占試申憲述兵則有律命法制朝市徵信則有符契劵䟽百官詢事則有闗刺解牒萬民達志則有狀列辭諺並述理於心著言於翰雖藝文之末品而政事之先務也故謂譜者普也注序世統事資周普鄭氏譜詩葢取乎此籍者借也嵗借民力條之於版春秋司籍即其事也簿者圃也草朩區别文書類聚張湯李廣為吏所簿别情偽也録者領也古史世本編以簡䇿領其名數故曰録也方者隅也醫藥攻病各有所主専精一隅故藥術稱方術者路也算歴極數見路乃明九章積微故以為術淮南萬畢皆其類也占者覘也星辰飛伏伺候乃見精觀書雲故曰占也式者則也隂陽盈虚五行消息變雖不常而稽之有則也律者中也黄鍾調起五音以正音以正法律馭民八刑克平以律為名取中正也令者命也出命申禁有若自天管仲下命如流水使民從也法者象也兵謀無方而竒正有象故曰法也制者裁也上行於下如匠之制器也符者孚也徵召防偽事資中孚三代玉瑞漢世金竹末代從省易以書翰矣契者結也上古純質結繩執契今𦍑胡徵數負販記緡其遺風歟券者束也明白約束以備情偽字形半分故周稱判書古有鐵券以堅信誓王褒髯奴則券之楷也疏者布也布置物類撮題近意故小券短書號為䟽也闗者閉也出入由門關閉由審庶務在政通塞應詳韓非云孫亶回聖相也而關於州部葢謂此也刺者達也詩人諷刺周禮三刺事叙相達若針之通結矣解者釋也解釋結滯徵事以對也牒者葉也短簡編牒如葉在枝温舒截蒲即其事也議政未定故短牒咨謀牒之尤密謂之為籖籖者籖密者也狀者貌也體貌本原取其事實先賢表諡並有行狀狀之大者也列者陳也陳列事情昭然可見也辭者舌端之文通巳於人子産有辭諸侯所賴不可已也諺者直語也喪言亦不及文故弔亦稱諺㕓路淺言有實無華鄒穆公云囊漏儲中皆其類也太誓古人有言牝雞無晨大雅云人亦有言惟憂用老並上古遺諺詩書可引者也至於陳琳諫辭稱掩目捕雀潘岳哀辭稱掌珠伉儷並引俗説而為文辭者也夫文辭鄙俚莫過於諺而聖賢詩書採以為談况踰於此豈可忽哉觀此四條並書記所總或事本相通而文意各異或全任質素或雜用文綺随事立體貴乎精要意少一字則義闕句長一言則辭妨並有司之實務而浮藻之所忽也然才冠鴻筆多踈尺牘譬九方堙之識駿足而不知毛色牝牡也言既身文信亦邦瑞翰林之士思理實焉贊曰文藻條流託在筆札既馳金相亦運朩訥萬古聲薦千里應㧞庶務紛綸因書乃察文心雕龍巻五欽定四庫全書文心雕龍巻六梁劉勰撰神思第二十六古人云形在江海之上心存魏闕之下神思之謂也文之思也其神逺矣故寂然凝慮思接千載悄焉動容視通萬里吟詠之間吐納珠玉之聲眉睫之前巻舒風雲之色其思理之致乎故思理為妙神與物㳺神居胷臆而志氣統其關鍵物㳂耳目而辭令管其樞機樞機方通則物無隠貌闗鍵將塞則神有遯心是以陶鈞文思貴在虚静疏瀹五蔵澡雪精神積學以儲寳酌理以富才硏閱以窮照馴致以繹辭然後使𤣥觧之宰尋聲律而定墨獨照之匠闚意象而運斤此盖馭文之首術謀篇之大端夫神思方運萬塗競萌規矩虚位刻鏤無形登山則情滿扵山觀海則意溢扵海我才之多少將與風雲而並驅矣方其搦翰氣倍辭前暨乎篇成半折心始何則意翻空而易竒言徴實而難巧也是以意授扵思言授扵意宻則無際疎則千里或理在方寸而求之域表或義在咫尺而思隔山河是以秉心養術無務苦慮含章司契不必勞情也人之禀才遲速異分文之制體大小殊功相如含筆而腐毫揚雄輟翰而驚夢桓譚疾感扵苦思王充氣竭扵思慮張衡研京以十年左思練都以一紀雖有巨文亦思之緩也淮南崇朝而賦騷枚皋應詔而成賦子建援牘如口誦仲宣舉筆似宿搆阮瑀據案而制書禰衡當食而草奏雖有短篇亦思之速也若夫駿發之士心總要術敏在慮前應機立斷覃思之人情饒岐路鍳在疑後研慮方定機敏故造次而成功慮疑故愈久而致績難易雖殊並資博練若學淺而空遲才疎而徒速以斯成器未之前聞是以臨篇綴慮必有二患理鬱者苦貧辭溺者傷亂然則博聞為饋貧之糧貫一為拯亂之藥博而能一亦有助乎心力矣若情數詭雜體變遷貿拙辭或孕扵巧義庸事或萌扵新意視布扵麻雖云未費杼軸獻功煥然乃珍至扵思表纎㫖文外曲致言所不追筆固知止至精而後闡其妙至變而後通其數伊摯不能言鼎輪扁不能語斤其㣲矣乎賛曰神用象通情變所孕物以貌求心以理勝刻鏤聲律萌芽比興結慮司契垂帷制勝體性第二十七夫情動而言形理發而文見盖㳂隠以至顯因内而符外者也然才有庸儁氣有剛柔學有淺深習有雅鄭並情性所爍陶染所凝是以筆區雲譎文苑波詭者矣故辭理庸儁莫能翻其才風趣剛柔寧或改其氣事義淺深未聞乖其學體式雅鄭鮮有反其習各師成心其異如面若總其歸塗則數窮八體一曰典雅二曰逺奥三曰精約四曰顯附五曰繁縟六曰壮麗七曰新竒八曰輕靡典雅者鎔式經誥方軌儒門者也逺奥者馥采典文經理𤣥宗者也精約者覈字省句剖析毫釐者也顯附者辭直義暢切理厭心者也繁縟者博喻釀采煒煜枝𣲖者也壮麗者髙論宏裁卓爍異采者也新竒者擯古競今危側趣詭者也輕靡者浮文弱植縹緲附俗者也故雅與竒反奥與顯殊繁與約舛壮與輕乖文辭根葉苑囿其中矣若夫八體屢遷功以學成才力居中肇自血氣氣以實志志以定言吐納英華莫非情性是以賈生俊發故文㓗而體清長卿傲誕故理侈而辭溢子雲沉寂故志隠而味深子政簡易故趣昭而事慱孟堅雅懿故裁宻而思靡平子淹通故慮周而藻宻仲宣躁銳故穎出而才果公幹氣褊故言壮而情駭嗣宗俶儻故響逸而調逺叔夜儁侠故興髙而采烈安仁輕敏故鋒發而韻流士衡矜重故情繁而辭隠觸類以推表裡必符豈非自然之恒資才氣之大略哉夫才有天資學慎始習斵梓染絲功在初化器成綵定難可翻移故童子雕琢必先雅製㳂根討葉思轉自圎八體雖殊㑹通合數得其環中則輻輳相成故宜摹體以定習因性以練才文之司南用此道也賛曰才性異區文體繁詭辭為膚根志實骨髓雅麗黼黻淫巧朱紫習亦凝真功㳂漸靡風骨第二十八詩總六義風冠其首斯乃化感之本源志氣之符契也是以怊悵述情必始乎風沉吟鋪辭莫先扵骨故辭之待骨如體之樹骸情之含風猶形之包氣結言端直則文骨成焉意氣駿爽則文風清焉若豐藻克贍風骨不飛則振采失鮮負聲無力是以綴慮裁篇務盈守氣剛健既實輝光乃新其為文用譬征鳥之使翼也故練扵骨者析辭必精深乎風者述情必顯捶字堅而難移結響凝而不滯此風骨之力也若瘠義肥辭繁雜失統則無骨之徴也思不環周索莫乏氣則無風之驗也昔潘朂錫魏思摹經典群才韜筆乃其骨髓峻也相如賦仙氣號凌雲蔚為辭宗迺其風力遒也能鍳斯要可以定文兹術或違無務繁采故魏文稱文以氣為主氣之清濁有體不可力强而致故其論孔融則云體氣髙妙論徐幹則云時有齊氣論劉楨則云時有逸氣公幹亦云孔氏卓卓信含異氣筆墨之性殆不可勝並重氣之㫖也夫翬翟備色翾翥百歩肌豐而力沉也鷹隼乏采翰飛戾天骨勁而氣猛也文章才力有似扵此若風骨乏采則鷙集翰林采乏風骨則雉竄文囿惟藻耀而髙翔固文筆之鳴鳯也若夫鎔冶經典之範翔集子史之術洞曉情變曲昭文體然後能莩甲新意雕畫竒辭昭體故意新而不亂曉變故辭竒而不黷若骨采未圎風辭未練而跨略舊規馳騖新作雖獲巧意危敗亦多豈空結竒字紕繆而成經矣周書云辭尚體要弗惟好異盖防文濫也然文術多門各適所好明者弗授學者弗師扵是習華随侈流遁㤀反若能確乎正式使文明以健則風清骨峻篇體光華能硏諸慮何逺之有哉賛曰情與氣偕辭共體並文明以健珪璋乃聘蔚彼風力嚴此骨鯁才鋒峻立符采克炳通變第二十九夫設文之體有常變文之數無方何以明其然耶凡詩賦書記名理相因此有常之體也文辭氣力通變則久此無方之數也名理有常體必資扵故實通變無方數必酌扵新聲故能騁無窮之路飲不竭之源然綆短者銜渇足疲者輟塗非文理之數盡乃通變之術踈耳故論文之方譬諸草木根榦麗土而同性臭味晞陽而異品矣是以九代詠歌志合文則黄歌斷竹質之至也唐歌在昔則廣扵黄世虞歌卿雲則文於唐時夏歌雕墻縟扵虞代商周篇什麗扵夏年至扵序志述時其揆一也暨楚之騷文矩式周人漢之賦頌影寫楚世魏之策制顧慕漢風晉之辭章瞻望魏采確而論之則黄唐淳而質虞夏質而辨商周麗而雅楚漢侈而艶魏晉淺而綺宋初訛而新従質及訛彌近彌澹何則競今踈古風味氣衰也今才穎之士刻意學文多略漢篇師範宋集雖古今備閱然近附而逺疎矣夫青生扵藍絳生扵蒨雖踰本色不能復化桓君山云予見新進麗文美而無採及見劉揚言辭常輙有得此其驗也故練青濯絳必歸藍蒨矯訛翻淺還宗經誥斯斟酌乎質文之間而櫽括乎雅俗之際可與言通變矣夫誇張聲貌則漢初已極自兹厥後循環相因雖軒翥出轍而終入籠内枚乗七發云通望兮東海虹洞兮蒼天相如上林云視之無端察之無涯日出東沼月生西陂馬融廣成云天地虹洞固無端涯大明出東月生西陂揚雄校獵云出入日月天與地沓張衡西京云日月扵是乎出入象扶桑扵䝉汜此並廣寓極状而五家如一諸如此類莫不相循參伍因革通變之數也是以規略文統宜宏大體先博覽以精閱總綱紀而攝契然後拓衢路置闗鍵長轡逺馭從容按節憑情以㑹通負氣以適變采如宛虹之奮鬐光若長離之振翼迺穎脫之文矣若乃齷齪扵偏觧矜激乎一致此庭間之迴驟豈萬里之逸歩哉賛曰文律運周日新其業變則其久通則不乏趨時必果乗機無怯望今制竒參古定法定勢第三十夫情致異區文變殊術莫不因情立體即體成勢也勢者乗利而為制也如機發矢直澗曲文囘自然之趣也圓者規體其勢也自轉方者矩形其勢也自安文章體勢如斯而已是以模經為式者自入典雅之懿効騷命篇者必歸豔逸之華綜意淺切者類乏醖藉斷辭辨約者率乖繁縟譬激水不漪槁朩無隂自然之勢也是以繪事圖色文辭盡情色糅而犬馬殊形情交而雅俗異勢鎔範所擬各有司匠雖無嚴郛難得踰越然淵乎文者並總羣勢竒正雖反必兼觧以俱通剛柔雖殊必随時而適用若愛典而惡華則兼通之理偏似夏人争弓矢執一不可以獨射也若雅鄭而共篇則總一之勢離是楚人鬻矛譽盾兩難得而俱售也是以括囊雜體功在銓别宫商朱紫随勢各配章表奏議則凖的乎典雅賦頌歌詩則羽儀乎清麗符檄書移則楷式扵明斷史論序注則師範扵覈要箴銘碑誄則體制扵𢎞深連珠七辭則従事扵巧艶此循體而成勢随變而立功者也雖復契㑹相參節文互雜譬五色之錦各以本采為地矣桓譚稱文家各有所慕或好浮華而不知實覈或美衆多而不見要約陳思亦云世之作者或好煩文博採深沉其㫖者或好離言辨白分毫析釐者所習不同所務各異言勢殊也劉楨云文之體指實强弱使其辭巳盡而勢有餘天下一人耳不可得也公幹所談頗亦兼氣然文之任勢勢有剛柔不必壮言慷慨乃稱勢也又陸雲自稱往日論文先辭而後情尚勢而不取恱澤及張公論文則欲宗其言夫情固先辭勢實須澤可謂先迷後能従善矣自近代辭人率好詭巧原其為體訛勢所變厭黷舊式故穿鑿取新察其訛意似難而實無他術也反正而已故文反正為乏辭反正為竒效竒之法必顛倒文句上字而抑下中辭而出外囘互不常則新色耳夫通衢夷坦而多行㨗徑者趨近故也正文明白而常務反言者適俗故也然宻㑹者以意新得巧茍異者以失體成怪舊練之才則執正以馭竒新學之銳則逐竒而失正勢流不反則文體遂弊秉兹情術可無思耶賛曰形生勢成始末相承湍廻似規矢激如澠因利騁節情采自凝枉轡學歩力止襄陵文心雕龍巻六欽定四庫全書文心雕龍巻七梁劉勰撰情采第三十一聖賢書辭總稱文章非采而何夫水性虚而淪猗結朩體實而華蕚振文附質也虎豹無文則鞹同犬羊犀兕有皮而色資丹漆質待文也若乃綜述性靈敷寫器象鏤心鳥跡之中織辭魚􅃠之上其為彪炳縟彩名矣故立文之道其理有三一曰形文五色是也二曰聲文五音是也三曰情文五性是也五色雜而成黼黻五音比而成韶夏五情發而為辭章神理之數也孝經垂典䘮言不文故知君子嘗言未嘗質也老子疾偽故稱美言不信而五千精妙則非棄美矣莊周云辯雕萬物謂藻飾也韓非云艶采辯說謂綺麗也綺麗以艶說藻飾以辯雕文辭之變扵斯極矣研味李老則知文質附乎性情詳覽莊韓則見華實過乎滛侈若擇源扵涇渭之流按轡扵邪正之路亦可以馭文采矣夫鈆黛所以飾容而盻倩生於淑姿文采所以飾言而辯麗本扵情性故情者文之經辭者理之緯經正而後緯成理定而後辭暢此立文之本源也昔詩人什篇為情而造文辭人賦頌為文而造情何以明其然盖風雅之興志思蓄憤而吟詠情性以諷其上此為情而造文也諸子之徒心非鬱陶茍馳夸飾鬻聲釣世此為文而造情也故為情者要約而寫真為文者淫麗而煩濫而後之作者採濫忽真逺棄風雅近師辭賦故體情之製日踈逐文之篇愈盛故有志深軒冕而汎詠皋壤心纒幾務而虚述人外真宰弗存翩其反矣夫桃李不言而成蹊有實存也男子樹蘭而不芳無其情也夫以草朩之㣲依情待實况乎文章述志為本言與志反文豈足徴是以聫辭結采將欲明理采濫辭詭則心理愈翳固知翠綸桂餌反所以失魚言隠榮華殆謂此也是以衣錦褧衣惡文太章賁象窮白貴乎反本夫能設謨以位理擬地以置心心定而後結音理正而後摛藻使文不滅質博不溺心正采耀乎朱藍間色屏扵紅紫乃可謂雕琢其章彬彬君子矣賛曰言以文逺誠哉斯驗心術既形英華乃贍吴錦好渝舜英徒艶繁彩寡情味之必厭鎔裁第三十二情理設位文采行乎其中剛柔以立本變通以趨時立本有體意或偏長趨時無方辭或繁雜蹊要所司職在鎔裁櫽括情理矯揉文采也規範本體謂之鎔剪截浮詞謂之裁裁則蕪穢不生鎔則綱領昭暢譬繩墨之審分斧斤之斵削矣駢拇枝指由侈扵性附贅懸肬實侈於形一意兩出義之駢枝也同辭重句文之肬贅也凢思緒初發辭采苦雜心非權衡勢必輕重是以草創鴻筆先標三凖履端扵始則設情以位體舉正扵中則酌事以取類歸餘扵終則撮辭以舉要然後舒華布實獻替節文繩墨以外美材既斵故能首尾圎合條貫統序若術不素定而委心逐辭異端藂至駢贅必多故三凖既定次討字句句有可削足見其踈字不得减乃知其宻精論要語極略之體逰心竄句極繁之體謂繁與略適分所好引而伸之則兩句敷為一章約以貫之則一章刪成兩句思贍者善敷才覈者善刪善刪者字去而意留善敷者辭殊而義顯字刪而意闕則短乏而非覈辭敷而言重則蕪穢而非贍昔謝艾王濟西河文士張俊以為艾繁而不可刪濟略而不可益若二子者可謂練鎔裁而曉繁略矣至如士衡才優而綴辭尤繁士龍思劣而雅好清省及雲之論機亟恨其多而稱清新相接不以為病盖崇友于耳夫美錦製衣修短有度雖翫其采不倍領袖巧猶難繁况在乎拙而文賦以為榛楛勿剪庸音足曲其識非不鍳乃情苦芟繁也夫百節成體共資榮衛萬趣㑹文不離辭情若情周而不繁辭運而不濫非夫鎔裁何以行之乎賛曰篇章户牖左右相瞰辭如川流溢則泛濫權衡損益斟酌濃淡芟繁剪穢弛扵負擔聲律第三十三夫音律所始本扵人聲者也聲含宫商肇自血氣先王因之以制樂歌故知器寫人聲聲非學器者也故言語者文章神明樞機吐納律吕唇吻而巳古之教歌先揆以法使疾呼中宫徐呼中徴夫商徴響髙宫羽聲下抗喉矯舌之差攅唇激齒之異㢘肉相凖皎然可分今操琴不調必知改張摘文乖張而不識所調響在彼絃乃得克諧聲萌我心更失和律其故何哉良由内聴難為聰也故外聴之易絃以手定内聴之難聲與心紛可以數求難以辭逐凡聲有飛沉響有雙疊雙聲隔字而每舛疊韻雜句而必暌沉則響發而斷飛則聲颺不還並轆轤交往逆鱗相比迃其際㑹則往蹇来連其為疾病亦文家之吃也夫吃文為患生扵好詭逐新趣異故喉脣糺紛將欲觧結務在剛斷左礙而尋右末滯而討前則聲轉扵吻玲玲如振玉辭靡於耳纍纍如貫珠矣是以聲畫妍蚩寄在吟詠吟詠滋味流扵字句氣力窮扵和韻異音相従謂之和同聲相應謂之韻韻氣一定故餘聲易遣和體抑揚故遺響難契屬筆易巧選和至難綴文難精而作韻甚易雖纎意曲變非可縷言然振其大綱不出兹論若夫宫商大和譬諸吹籥翻廻取均頗似調瑟瑟資移柱故有時而乖貳籥含定管故無往而不壹陳思潘岳吹籥之調也陸機左思瑟柱之和也槩舉而推可以類見又詩人綜韻率多清切楚辭辭楚故訛韻實繁及張華論韻謂士衡多楚文賦亦稱知楚不易可謂銜靈均之聲餘失黄鐘之正響也凡切韻之動勢若轉圎訛音之作甚扵枘方免乎枘方則無大過矣練才洞鍳剖字鑚響踈識濶略随音所遇若長風之過籟南郭之吹竽耳古之佩玉左宫右徴以節其歩聲不失序音以律文其可㤀哉賛曰摽清務逺比音則近吹律胷臆調鐘脣吻聲得鹽梅響滑榆槿割棄支離宫商難隠章句第三十四夫設情有宅置言有位宅情曰章位言曰句故章者明也句者局也局言者聨字以分疆明情者總義以􅊶體區畛相異而衢路交通矣夫人之立言因字而生句積句而為章積章而成篇篇之彪炳章無疵也章之明靡句無玷也句之清英字不妄也振本而末從知一而萬畢矣夫裁文匠筆篇有小大離章合句調有緩急随變適㑹莫見定凖句司數字待相接以為用章總一義須意窮而成體其控引情理送迎際㑹譬舞容廻環而有綴兆之位歌聲靡曼而有抗墜之節也尋詩人擬喻雖斷章取義然章句在篇如蠒之抽緒原始要終體必鱗次啟行之辭逆萌中篇之意絶筆之言追媵前句之㫖故能外文綺交内義脉注跗蕚相銜首尾一體若辭失其朋則覊旅而無友事乖其次則飄寓而不安是以搜句忌扵顛倒裁章貴扵順序斯固情趣之指歸文筆之同致也若夫筆句無常而字有條數四字宻而不促六字格而非緩㦯變之以三五盖應機之權節也至扵詩頌大體以四言為正惟祈父肇禋以二言為句尋二言肇扵黄世竹彈之謡是也三言興扵虞時元首之詩是也四言廣扵夏年洛汭之歌是也五言見扵周代行露之章是也六言七言雜出詩騷而體之篇成於兩漢情數運周随時代用矣若乃改韻從調所以節文辭氣賈誼枚乗兩韻輙易劉歆桓譚百句不遷亦各有其志也昔魏武論賦嫌扵積韻而善扵資代陸雲亦稱四言轉句以四句為佳觀彼制韻志同枚賈然兩韻輙易則聲韻㣲躁百句不遷則唇吻告勞妙才激揚雖觸思利貞曷若析之中和庶保無咎又詩人以兮字入於句限楚辭用之字出句外尋兮字承句乃語助餘聲舜詠南風用之久矣而魏武弗好豈不以無益文義耶至於夫惟盖故者發端之首唱之而於以者乃劄句之舊體乎哉矣也亦送末之常科據事似間在用實切巧者廻運彌縫文體將令數句之外得一字之助矣外字難謬况章句歟賛曰斷章有檢積句不恒理資配主辭忌失朋環情草調宛轉相騰離同合異以盡厥能麗辭第三十五造化賦形支體必雙神理為用事不孤立夫心生文辭運裁百慮髙下相湏自然成對唐虞之世辭未極文而皋陶賛云罪疑惟輕功疑惟重益陳謨云滿招損謙受益豈營麗辭率然對耳易之文繫聖人之妙思也序乾四徳則句句相銜龍虎類感則字字相儷乾坤易簡則宛轉相承日月往来則隔行懸合雖句字或殊而偶意一也至於詩人偶章大夫聨辭竒偶適變不勞經營自楊馬張蔡崇盛麗辭如宋畫吳冶刻形鏤法麗句與深采並流偶意共逸韻俱發至魏晉群才析句彌宻聯字合趣割毫析釐然契機者入巧浮假者無功故麗辭之體凡有四對言對為易事對為難反對為優正對為劣言對者雙比空辭者也事對者並舉人驗者也反對者理殊趣合者也正對者事異義同者也長卿上林云修容乎禮園翺翔乎書圃此言對之類也宋玉神女賦云毛嬙鄣袂不足程式西施掩面比之無色此事對之類也仲宣登樓云鍾儀幽而楚奏莊舄顯而越吟此反對之類也孟陽七哀云漢祖想枌榆光武思白水此正對之類也凡偶辭胷臆言對所以為易也徵人之學事對所以為難也幽顯同志反對所以為優也並貴共心正對所以為劣也又以事對各有反正指類而求萬條自昭然矣張華詩稱逰鴈比翼翔歸鴻知接翮劉琨詩言宣尼悲獲麟西狩泣孔丘若斯重出即對句之駢枝也是以言對為美貴在精巧事對所先務在允當若兩事相配而優劣不均是驥在左驂駑為右服也若夫事或孤立莫與相偶是䕫之一足趻踔而行也若氣無竒類文乏異采碌碌麗辭則昏睡耳目必使理圓事宻聨璧其章迭用竒偶節以雜佩乃其貴耳類此而思理斯見也賛曰體植必兩辭動有配左提右挈精味兼載炳爍聫華鏡静含態玉潤雙流如彼珩佩文心雕龍巻七欽定四庫全書文心雕龍巻八梁劉勰撰比興第三十六詩文𢎞奥包韞六義毛公述傳獨標興體豈不以風通而賦同比顯而興隠哉故比者附也興者起也附理者切類以指事起情者依㣲以擬議起情故興體以立附理故比例以生比則畜憤以斥言興則環譬以記諷盖随時之義不一故詩人之志有二也觀夫興之託諭婉而成章稱名也小取類也大闗雎有别故后妃方徳尸鳩貞一故夫人象義義取其貞無従扵夷禽徳貴其别不嫌扵鷙鳥明而未融故發注而後見也且何謂為比盖寫物以附意颺言以切事者也故金錫以喻明徳珪璋以譬秀民螟蛉以類敎誨蜩螗以寫號呼澣衣以擬心憂巻席以方志固凡斯切象皆比義也至如麻衣如雪兩驂如舞若斯之類皆比類者也楚襄信䜛而三閭忠烈依詩製騷諷兼比興炎漢雖盛而辭人夸毗詩刺道䘮故興義銷亾扵是賦頌先鳴故比體雲構紛紜雜遝信舊章矣夫比之為義取類不常或喻扵聲或方扵貌或擬扵心或譬扵事宋玉髙唐云纎條悲鳴聲似竽籟此比聲之類也枚乗莬園云焱焱紛紛若塵埃之間白雲此則比貌之類也賈生鵩賦云禍之與福何異糺纆此以物比理者也王襃洞簫云優柔温潤如慈父之畜子也此以聲比心者也馬融長笛云繁縟絡繹范蔡之説也此以響比辯者也張衡南都云起鄭舞蠒曵緒此以容比物者也若斯之類辭賦所先日用乎比月㤀乎興習小而棄大所以文謝扵周人也至扵揚班之倫曹劉以下圖狀山川影冩雲物莫不纎綜比義以敷其華驚聽囘視資此效績又安仁螢賦云流金在沙季鷹雜詩云青條若總翠皆其義者也故比類雖繁以切至為貴若刻鵠類鶩則無所取焉賛曰詩人比興觸物圎覽物雖胡越合則肝膽擬容取心斷辭必敢攢雜詠歌如川之渙夸飾第三十七夫形而上者謂之道形而下者謂之器神道難摹精言不能追其極形器易寫壮辭可得喻其真才非短長理自難易耳故自天地以降豫入聲貌文辭所被夸飾恒存雖詩書雅言風格訓世事必宜廣文亦過焉是以言峻則嵩髙極天論狭則河不容舠說多則子孫千億稱少則民靡孑遺襄陵舉㴞天之目倒戈立漂杵之論辭雖已甚其義無害也且夫鴞音之醜豈有泮林而變好荼味之苦寧以周原而成飴並意深褒讃故義成矯飾大聖所録以垂憲章孟軻所云説詩者不以文害辭不以辭害意也自宋玉景差夸飾始盛相如憑風詭濫愈甚故上林之舘奔星與宛虹入軒從禽之盛飛廉與鷦鷯俱獲及揚雄甘泉酌其餘波語瓌竒則假珍扵玉樹言峻極則顚墜扵鬼神至東都之比目西京之海若驗理則理無不驗窮飾則飾猶未窮矣又子雲校獵鞭宓妃以饟屈原張衡羽獵困𤣥㝠扵朔野孌彼洛神既非㒺兩惟此水師亦非魑魅而虚用濫形不其踈乎此欲夸其威而飾其事義睽刺也至如氣貌山海體勢宫殿嵯峨掲業熠燿焜煌之状光采煒煒而欲然聲貌岌岌其将動矣莫不因夸以成状沿飾而得竒也扵是後進之才奨氣挟聲軒翥而欲奮飛騰躑而羞跼歩辭入煒煜春藻不能程其艶言在萎絶寒谷未足成其凋談歡則字與笑並論慼則聲共泣偕信可以發藴而飛滯披瞽而駭聾矣然飾窮其要則心聲鋒起夸過其理則名實兩乖若能酌詩書之曠㫖剪揚馬之甚泰使夸而有節飾而不誣亦可謂之懿也賛曰夸飾在用文豈循檢言必鵬運氣靡鴻漸倒海探珠傾崑取琰曠而不溢奢而無玷事類第三十八事類者盖文章之外據事以類義援古以證今者也昔文王繇易剖判爻位既濟九三逺引髙宗之伐明夷六五近書箕子之貞斯略舉人事以徴義者也至若𦙍征羲和陳正典之訓盤庚誥民叙遲任之言此全引成辭以明理者也然則明理引乎成辭徴義舉乎人事迺聖賢之鴻謨經籍之通矩也大畜之象君子以多識前言往行亦有包扵文矣觀夫屈宋屬篇號依詩人雖引古事而莫取舊辭惟賈誼鵩賦始用鶡冠之說相如上林撮引李斯之書此萬分之一㑹也及揚雄百官箴頗酌扵詩書劉歆遂初賦歴叙扵紀傳漸漸綜採矣至扵崔班張蔡遂捃摭經史華實布濩因書立功皆後人之範式也夫薑桂同地辛在本性文章由學能在天資才自内發學以外成有學飽而才餒有才富而學貧學貧者迍邅扵事義才餒者劬勞扵辭情此内外之殊分也是以屬意立文心與筆謀才為盟主學為輔佐主佐合徳文采必覇才學褊狭雖美少功夫以子雲之才而自奏不學及觀書石室乃成鴻采表裡相資古今一也故魏武稱張子之文為拙然學問膚淺所見不博専拾掇崔杜小文所作不可悉難難便不知所出斯則寡聞之病也夫經典沈深載籍浩瀚實群言之奥區而才思之神皋也揚班以下莫不取資任力耕耨縦意漁獵操刀能割必裂膏腴是以将贍才力務在博見狐腋非一皮能温雞蹠必數千而飽矣是以綜學在博取事貴約校練務精捃理湏覈衆美輻輳表裏發揮劉劭趙都賦云公子之客叱勁楚令歃盟管庫𨽻臣呵强秦使鼓缶用事如斯可謂理得而義要矣故事得其要雖小成績譬寸轄制輪尺樞運闗也或㣲言美事置於閒散是綴金翠於足脛靚粉黛扵胷臆也凡用舊合機不啻自其口出引事乖謬雖千載而為瑕陳思群才之英也報孔璋書云葛天氏之樂千人唱萬人和聴者因以蔑韶夏矣此引事之實謬也按葛天之歌唱和三人而已相如上林云奏陶唐之舞聴葛天之歌千人唱萬人和唱和千萬人乃相如接人然而濫侈葛天推三成萬者信賦妄書致斯謬也陸機園葵詩云庇足同一智生理合異端夫葵能衛足事譏鮑荘葛藟庇根辭自樂豫若譬葛為葵則引事為謬若謂庇勝衛則改事失真斯又不精之患夫以子建明練士衡沉宻而不免扵謬曹仁之謬髙唐又曷足以嘲哉夫山朩為良匠所度經書為文士所擇木美而定扵斧斤事美而制扵刀筆研思之士無慙匠石矣賛曰經籍深富辭理遐亘皜如江海鬱若崑鄧文梓共採瓊珠交贈用人若已古来無懵練字第三十九夫文象列而結繩移鳥跡明而書契作斯乃言語之體貌而文章之宅宇也蒼頡造之鬼哭粟飛黄帝用之官治民察先王聲敎書必同文輶軒之使紀言殊俗所以一字體總異音周禮保章氏掌敎六書秦㓕舊章以吏為師及李斯刪籀而秦篆興程邈造𨽻而古文廢漢初草律明著厥法太史學童教試六體又吏民上書字謬輙劾是以馬字缺畫而石建懼死雖云性慎亦時重文也至孝武之世則相如譔篇及宣成二帝徴集小學張敞以正讀傳業揚雄以竒字纂訓並貫練雅頌總閱音義鴻筆之徒莫不洞曉且多賦京苑假借形聲是以前漢小學率多瑋字非獨制異乃共曉難也暨乎後漢小學轉踈複文隠訓臧否大半及魏代綴藻則字有常檢追觀漢作翻成阻奥故陳思稱楊馬之作趣幽㫖深讀者非師傳不能析其辭非博學不能綜其理豈直才懸抑亦字隠自晉来用字率從簡易時並習易人誰取難今一字詭異則羣句震驚三人弗識則将成字妖矣後世所同曉者雖難斯易時所共廢雖易斯難趣舍之間不可不察夫爾雅者孔徒之所纂而詩書之襟帶也蒼頡者李斯之所輯而鳥籀之遺體也雅以淵源誥訓頡以苑囿竒文異體相資如左右肩股該舊而知新亦可以屬文若夫義訓古今興廢殊用字形單複妍蚩異體心既託聲扵言言亦寄形扵字諷誦則績在宫商臨文則能歸字形矣是以綴字屬篇必湏練擇一避詭異二省聫邊三權重出四調單複詭異者字體瓌怪者也曹攄詩稱豈不願斯逰􅄶心惡􅀈呶兩字詭異大疵美篇况乃過此其可觀乎聨邊者半字同文者也狀貌山川古今咸用施扵常文則齟齬為瑕如不獲免可至三接三接之外其字林乎重出者同字相犯者也詩騷適㑹而近世忌同若兩字俱要則寧在相犯故善為文者富扵萬篇貧扵一字一字非少相避為難也單複者字形肥瘠者也瘠字累句則纎踈而行劣肥字積文則黯黕而篇闇善酌字者叄伍單複磊落如珠矣凡此四條雖文不必有而體例不無若值而莫悟則非精觧至扵經典隠曖方冊紛綸簡蠧帛裂三寫易字或以音訛或以文變子思弟子於穆不祀者音訛之異也晉之史記三豖渡河文變之謬也尚書大傳有别風淮雨帝王世紀云列風淫雨别列淮淫字似潜移淫列義當而不竒淮别理乖而新異傅毅制誄巳用淮雨固知愛竒之心古今一也史之闕文聖人所慎若依義棄竒則可與正文字矣賛曰篆𨽻相鎔蒼雅品訓古今殊跡妍蚩異分字靡異流文阻難運聲畫昭精墨采騰奮隠秀第四十夫心術之動逺矣文情之變深矣源奥而派生根盛而穎峻是以文之英蕤有秀有隠隠也者文外之重㫖者也秀也者篇中之獨拔者也隠以複意為工秀以卓絶為巧斯乃舊章之懿績才情之嘉㑹也夫隠之為體義生文外祕響傍通伏采潜發譬爻象之變互體川瀆之韞珠玉也故互體變爻而化成四象珠玉潜水而瀾表方圓始正而末竒内明而外潤使翫之者無窮味之者不厭矣彼波起辭間是謂之秀纎手麗音宛乎逸態若逺山之浮烟靄孌女之靚容華然煙靄天成不勞扵粧㸃容華格定無待扵裁鎔深淺而各竒􅀈纎而俱妙若揮之則有餘而攬之則不足矣夫立意之士務欲造竒每馳心扵𤣥黙之表工辭之人必欲臻美恒溺思扵佳麗之鄉嘔心吐膽不足語窮煅嵗煉年奚能喻苦故能藏穎詞間昏迷扵庸目露鋒文外驚絶乎妙心使醖藉者蓄隠而意愉英銳者抱秀而心恱譬諸裁雲製霞不讓乎天工斵卉刻葩有同乎神匠矣若篇中乏隠等宿儒之無學或一叩而語窮句間鮮秀如巨室之少珍若百詰而色沮斯並不足扵才思而亦有媿於文辭矣将欲徴隠聊可指篇古詩之離别樂府之長城詞怨㫖深而復兼乎比興陳思之黄雀公幹之青松格剛才勁而並長扵諷諭叔夜之闕二字嗣宗之闕二字境𤣥思澹而獨得乎優閑士衡之闕二字彭澤之闕二字心宻語澄而俱適乎壮采如欲辨秀亦惟摘句常恐秋節至凉颷奪炎熱意悽而詞婉此匹婦之無聊也臨河濯長纓念子悵悠悠志髙而言壮此丈夫之不遂也東西安所之徘徊以旁皇心孤而情懼此閨房之悲極也朔風動秋草邊馬有歸心氣寒而事傷此覊旅之怨曲也凡文集勝篇不盈十一篇章秀句裁可百二並思合而自逢非硏慮之所求也或有晦塞為深雖奥非隠雕削取巧雖美非秀矣故自然㑹妙譬卉朩之耀英華潤色取美譬繒帛之染朱緑朱緑染繒深而繁鮮英華曜樹淺而煒煜秀句所以照文苑盖以此也賛曰深文隠蔚餘味曲包辭生互體有似變爻言之秀矣萬慮一交動心驚耳逸響笙匏文心雕龍巻八欽定四庫全書文心雕龍巻九梁劉勰撰指瑕第四十一管仲有言無翼而飛者聲也無根而固者情也然則聲不假翼其飛甚易情不待根其固匪難以之垂文可不愼歟古来文才異世争驅或逸才以爽迅或精思以纖密而慮動難圓鮮無瑕病陳思之文羣才之俊也而武帝誄云尊靈永蟄明帝頌云聖體浮輕浮輕有似於蝴蝶永蟄頗疑於昆蟲施之尊極豈其當乎左思七諷説孝而不從反道若斯餘不足觀矣潘岳為才善於哀文然悲内兄則云感口澤傷弱子則云心如疑禮文在尊極而施之下流辭雖足哀義斯替矣若夫君子擬人必於其倫而崔瑗之誄李公比行於黄虞向秀之賦嵇生方罪於李斯與其失也雖寧僭無濫然髙厚之詩不類甚矣凡巧言易摽拙辭難隠斯言之玷實深白圭繁例難載故略舉四條若夫立文之道惟字與義字以訓正義以理宣而晉末篇章依希其㫖始有賞際竒至之言終無撫叩酬即之語每單舉一字指以為情夫賞訓錫賚豈闗心解撫訓執握何預情理雅頌未聞漢魏莫用懸領似如可辯課文了不成義斯實情訛之所變文澆之致弊而宋来才英未之或改舊染成俗非一朝也近代辭人率多猜忌至乃比語求蚩反音取瑕雖不屑於古而有擇於今焉又製同他文理宜刪革若排人美辭以為巳力寳玉大弓終非其有全寫則掲篋傍採則探囊然世逺者太輕時同者為尤矣若夫注解為書所以明正事理然謬於研求或率意而斷西亰賦稱中黄育獲之疇而薛綜謬注謂之閹尹是不聞執雕虎之人也又周禮井賦舊有疋馬而應劭釋疋或量首數蹄斯豈辯物之要哉原夫古之正名車兩而馬疋疋兩稱目以並耦為用葢車貳佐乗馬儷驂服服乗不隻故名號必雙名號一正則雖單為疋矣疋夫疋婦亦配義也夫車馬小義而歴代莫悟辭賦近事而千里致差况鑚灼經典能不謬哉夫辯言而數筌蹄選勇而驅閹尹失理太甚故舉以為戒丹青初炳而後渝文章嵗久而彌光若能櫽括於一朝可以無慙於千載也贊曰羿氏舛射東野敗駕雖有雋才謬則多謝斯言一玷千載弗化令章靡疚亦善之亞養氣第四十二昔王充著述制養氣之篇驗巳而作豈虚造哉夫耳目鼻口生之役也心慮言辭神之用也率志委和則理融而情暢鑚礪過分則神疲而氣衰此性情之數也夫三皇辭質心絶於道華帝世始文言貴於敷奏三代春秋雖㳂世彌縟並適分胷臆非牽課才外也戰代枝詐攻奇飾説漢世迄今辭務日新争光鬻采慮亦竭矣故淳言以比澆辭文質懸乎千載率志以方竭情勞逸差於萬里古人所以餘裕後進所以莫遑也凡童少鑒淺而志盛長艾識堅而氣衰志盛者思鋭以勝勞氣衰者慮密以傷神斯實中人之常資嵗時之大較也若夫器分有限智用無涯或慙鳬企鶴瀝辭鐫思於是精氣内銷有似尾閭之波神志外傷同乎牛山之朩怛愓之盛疾亦可推矣至如仲任置硯以綜述敬通懷筆以専業既暄之以嵗序又煎之以日時是以曹公懼為文之傷命陸雲歎用思之困神非虚談也夫學業在勤故有錐股自厲志於文也則申寫鬱滯故宜從容率情優柔適㑹若銷鑠精膽慼迫和氣秉牘以驅齡灑翰以伐性豈聖賢之素心㑹文之直理哉且夫思有利鈍時有通塞沐則心覆且或反常神之方昏再三愈黷是以吐納文藝務在節宣清和其心調暢其氣煩而即捨勿使壅滯意得則舒懷以命筆理伏則投筆以巻懷逍遙以針勞談笑以藥勌常弄閑於才鋒賈餘於文勇使刃發如新湊理無滯雖非胎息之邁術斯亦衛氣之一方也贊曰紛哉萬象勞矣千想𤣥神宜寳素氣資養水停以鑒火静而朗無擾文慮鬱此精爽附㑹第四十三何謂附㑹謂總文理統首尾定與奪合涯際彌綸一篇使雜而不越者也若築室之湏基構裁衣之待縫緝矣夫才量學文宜正體製必以情志為神眀事義為骨髓辭采為肌膚宫商為聲氣然後品藻𤣥黄摛振金玉獻可替否以裁厥中斯綴思之常數也凡大體文章類多枝𣲖整𣲖者依源理枝者循幹是以附辭㑹義務總綱領驅萬塗於同歸貞百慮於一致使衆理雖繁而無倒置之乖群言雖多而無棼絲之亂扶陽而出條順隂而蔵跡首尾周密表裏一體此附㑹之術也夫畫者謹髪而易貌射者儀毫而失墻鋭精細巧必踈體統故宜詘寸以信尺枉尺以直尋棄偏善之巧學具美之績此命篇之經畧也夫文變無方意見浮雜約則義孤博則辭叛率故多尤需為事賊且才分不同思緒各異或製首以通尾或片接以寸附然通製者葢寡接附者甚衆若統緒失宗辭味必亂義脉不流則偏枯文體夫能懸識湊理然後文節自㑹如膠之粘朩豆之合黄矣是以駟牡異力而六轡如琴馭文之法有似於此去留随心脩短在手齊其歩驟總轡而已故善附者異㫖如肝膽拙㑹者同音如胡越改章難於造篇易字艱於代句此巳然之驗也昔張湯擬奏而再却虞松草表而屢譴並理事之不明而辭㫖之失調也及兒寛更草鍾㑹易字而漢武歎奇晉景稱善者乃理得而事明心敏而辭當也以此而觀則知附㑹巧拙相去逺哉若夫絶筆斷章譬乗舟之振楫克終底績寄深寫逺若首唱榮華而媵句憔悴則遺勢鬱湮餘風不暢此周易所謂臀無膚其行次且也惟首尾相援則附㑹之體固亦無以加於此矣贊曰篇統間關情素稠疊原始要終疎條布葉道味相附懸緒自接如樂之和心聲克協總術第四十四今之常言有文有筆以為無韻者筆也有韻者文也夫文以足言理兼詩書别目兩名自近代耳顔延年以為筆之為體言之文也經典則言而非筆傳記則筆而非言請奪彼矛還攻其楯矣何者易之文言豈非言文若筆不言文不得云經典非筆矣將以立論未見其論立也子以為發口為言屬筆曰翰常道曰經述經曰傳經傳之體出言入筆筆為言使可强可弱分經以典奥為不刋非以言筆為優劣也昔陸氏文賦號為曲盡然汎論纖悉而實體未該故知九變之貫匪窮知言之選難備矣凡精慮造文各競新麗多欲練辭莫肯研術落落之玉或亂乎石碌碌之石時似乎玉精者要約匱者亦尠博者該贍蕪者亦繁辯者昭晳淺者亦露奥者複隱詭者亦典或義華而聲悴或理拙而文澤知夫調鐘未易張琴實難伶人告和不必盡窕槬之中動用揮扇何必窮初終之韻魏文比篇章於音樂葢有徵矣夫不截盤根無以驗利器不剖文奥無以辯通才才之能通必資曉術自非圓鑒區域大判條例豈能控引情源制勝文苑哉是以執術馭篇似善奕之窮數棄術任心如博塞之邀遇故博塞之文借巧儻来雖前驅有功而後援難繼少既無以相接多亦不知所刪乃多少之並惑何姸蚩之能制乎若夫善弈之文則術有恒數按部整伍以待情㑹因時順機動不失正數逢其極機入其巧則義味騰躍而生辭氣叢雜而至視之則錦繪聽之則絲簧味之則甘腴佩之則芬芳斷章之功於斯盛矣夫驥足雖駿纆牽忌長以萬分一累且廢千里况文體多術共相彌綸一物擕貳莫不解體所以列在一篇備總情變譬三十之輻共成一轂雖未足觀亦鄙夫之見也贊曰文場筆苑有術有門務先大體鑑必窮源乗一總萬舉要治繁思無定契理有恒存時序第四十五時運交移質文代變古今情理如可言乎昔在陶唐徳盛化鈞野老吐何力之談郊童含不識之歌有虞繼作政阜民暇薫風詩於元后爛雲歌於列臣盡其美者何乃心樂而聲泰也至大禹敷土九序詠功成湯聖敬猗歟作頌逮姫文之徳盛周南勤而不怨太王之化淳邠風樂而不滛幽厲昏而板蕩怒平王微而黍離哀故知歌謠文理與世推移風動於上而波震於下者春秋以後角戰英雄六經泥蟠百家飈駭方是時也韓魏力政燕趙任權五蠧六蝨嚴於秦令唯齊楚兩國頗有文學齊開荘衢之第楚廣蘭臺之宫孟軻賔館荀卿宰邑故稷下扇其清風蘭陵鬱其茂俗鄒子以談天飛譽騶奭以雕龍馳響屈平聨藻於日月宋玉交彩於風雲觀其豔説則籠罩雅頌故知暐煜之奇意出乎縱横之詭俗也爰至有漢運接燔書髙祖尚武戯儒簡學雖禮律草創詩書未遑然大風鴻鵠之歌亦天縱之英作也施及孝恵迄于文景經術頗興而辭人勿用賈誼抑而鄒枚沉亦可知已逮孝武崇儒潤色鴻業禮樂争輝辭藻競騖栢梁展朝讌之詩金堤製恤民之詠徵枚乘以蒲輪申主父以鼎食擢公孫之對策歎兒寛之擬奏買臣負薪而衣錦相如滌器而被繡於是史遷夀王之徒嚴終枚臯之屬應對固無方篇章亦不匱遺風餘采莫與比盛越昭及宣實繼武績馳騁石渠暇豫文㑹集雕篆之軼材發綺縠之髙喻於是王襃之倫底禄待詔自元暨成降意圖籍美玉屑之譚清金馬之路子雲鋭思於千首子政讐校於六藝亦已美矣爰自漢室迄至成哀雖世漸百齡辭人九變而大抵所歸祖述楚辭靈均餘影於是乎在自哀平陵替光武中興深懷圖讖頗畧文華然杜篤獻誄以免刑班彪參奏以補令雖非旁求亦不暇棄及明帝疊耀崇愛儒術肄禮璧堂講文虎觀孟堅珥筆于國史賈逵給札於瑞頌東平擅其懿文沛王振其通論帝則藩儀輝光相照矣自安和已下迄至順桓則有班傳三崔王馬張蔡磊落鴻儒才不時乏而文章之選存而不論然中興之後羣才稍改前轍華實所附斟酌經辭葢歴政講聚故漸靡儒風者也降及靈帝時好辭製造羲皇之書開鴻都之賦而樂松之徒招集淺陋故楊賜號為驩兠蔡邕比之俳優其餘風遺文葢蔑如也自獻帝播遷文學蓬轉建安之末區宇方輯魏武以相王之尊雅愛詩章文帝以副君之重妙善辭賦陳思以公子之豪下筆琳瑯並體貌英逸故俊才雲蒸仲宣委質於漢南孔璋歸命於河北偉長從宦於青土公幹徇質於海隅徳璉綜其斐然之思元瑜展其翩翩之樂文蔚休伯之儔于叔徳祖之侣傲雅觴豆之前雍容袵席之上灑筆以成酣歌和墨以藉談笑觀其時文雅好慷慨良由世積亂離風衰俗怨並志深而筆長故梗概而多氣也至眀帝纂戎制詩度曲徵篇章之士置崇文之觀何劉群才迭相照耀少主相仍唯髙貴英雅顧盻合章動言成論於時正始餘風篇體輕澹而嵇阮應繆並馳文路矣逮晉宣始基景文克構並跡沉儒雅而務深方術至武帝惟新承平受命而膠序篇章弗簡皇慮降及懷愍綴旒而已然晉雖不文人才實盛茂先揺筆而散珠太冲動墨而横錦岳湛曜聨璧之華機雲摽二俊之采應傅三張之徒孫摯成公之屬並結藻清英流韻綺靡前史以為運渉季世人未盡才誠哉斯談可為歎息元皇中興披文建學劉刁禮吏而寵榮景純文敏而優擢逮明帝秉哲雅好文㑹升儲御極孳孳講藝練情於誥䇿振采於辭賦庾以筆才逾親温以文思益厚揄揚風流亦彼時之漢武也及成康促齡穆哀短祚簡文勃興淵乎清峻微言精理函滿𤣥席澹思醲采時灑文囿至孝武不嗣安恭巳矣其文史則有袁殷之曹孫于之輩雖才或淺深珪璋足用自中朝貴𤣥江左稱盛因談餘氣流成文體是以世極迍邅而辭意夷泰詩必柱下之㫖歸賦乃漆園之義䟽故知文變染乎世情興廢繫乎時序原始以要終雖百世可知也自宋武愛文文帝彬雅秉文之徳孝武多才英采雲構自明帝以下文理替矣爾其搢紳之林霞蔚而飈起王袁聨宗以龍章顔謝重葉以鳳采何范張沈之徒亦不可勝也葢聞之於世故畧舉大較暨皇齊馭寳運集休眀太祖以聖武膺籙髙祖以睿文纂業文帝以貳離含章中宗以上哲興運並文眀自天緝遐景祚今聖歴方興文思光被海岳降神才英秀發馭飛龍於天衢駕騏驥於萬里經典禮章跨周轢漢唐虞之文其鼎盛乎鴻風懿采短筆敢陳颺言讃時請寄眀哲贊曰蔚映十代辭采九變樞中所動環流無倦質文㳂時崇替在選終古雖逺瞹焉如靣文心雕龍巻九欽定四庫全書文心雕龍巻十梁劉勰撰}
