  - {type: variant, offset: 2383, length: 190, content: 其照青眸寫其形然魯臣以麟為麇楚人以雉為鳳魏民以夜光為怪石宋客以燕礫為寶珠形器易徵謬乃若是文情難鑒誰曰易分夫篇章雜沓質文交加知多偏好人莫圓該慷慨者逆聲而擊節醞藉者見密而高蹈浮慧者觀綺而躍心愛奇者聞詭而驚聽會己則嗟諷異我則沮棄各執一隅之解欲擬萬端之變所謂東向而望不見西墻也凡操千曲而後曉聲觀千劍而後識器故圓照之象務先博觀閱喬岳以形培塿酌滄波以喻畎澮無私於輕重不偏於憎愛然後能平理若衡照, SBCK: ''}
