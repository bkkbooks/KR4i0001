  - {type: variant, offset: 3015, length: 1, content: 涼, WYG: 始正而末竒内明而外潤使翫之者無窮味之者不厭矣彼波起辭間是謂之秀纎手麗音宛乎逸態若逺山之浮烟靄孌女之靚容華然煙靄天成不勞扵粧㸃容華格定無待扵裁鎔深淺而各竒􅀈纎而俱妙若揮之則有餘而攬之則不足矣夫立意之士務欲造竒每馳心扵𤣥黙之表工辭之人必欲臻美恒溺思扵佳麗之鄉嘔心吐膽不足語窮煅嵗煉年奚能喻苦故能藏穎詞間昏迷扵庸目露鋒文外驚絶乎妙心使醖藉者蓄隠而意愉英銳者抱秀而心恱譬諸裁雲製霞不讓乎天工斵卉刻葩有同乎神匠矣若篇中乏隠等宿儒之無學或一叩而語窮句間鮮秀如巨室之少珍若百詰而色沮斯並不足扵才思而亦有媿於文辭矣将欲徴隠聊可指篇古詩之離别樂府之長城詞怨㫖深而復兼乎比興陳思之黄雀公幹之青松格剛才勁而並長扵諷諭叔夜之闕二字嗣宗之闕二字境𤣥思澹而獨得乎優閑士衡之闕二字彭澤之闕二字心宻語澄而俱適乎壮采如欲辨秀亦惟摘句常恐秋節至凉颷奪炎熱意悽而詞婉此匹婦之無聊也臨河濯長纓念子悵悠悠志髙而言壮此丈夫之不遂也東西安所之徘徊以旁皇心孤而情懼此閨房之悲極也朔}
