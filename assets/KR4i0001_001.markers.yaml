  - {type: variant, offset: 2, length: 0, content: '', SBCK: 梁通事舍人東莞劉勰撰}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 篇為五十篇據序志篇稱上篇以下下篇以上本止二巻然隋志已作十巻盖後人所分又據其篇中所言此書實成于齊代此本署梁通事舎人劉勰撰亦後人追題也是書自至正乙未刻于嘉禾至明𢎞治嘉靖萬厯間凡經五刻其隠秀一篇皆有缺文明末常熟錢功甫稱得阮華山宋槧本鈔補四百餘字然其書晚出别無顯證其詞亦頗不類如嘔心吐膽似摭李賀小傳語鍜嵗煉年似摭六一詩話論周朴語稱班姫為匹婦亦似摭鍾嶸詩品語皆有可疑况至正去宋未逺不應宋本已無一存三百年後乃為明人所得又考永樂大典所載舊本闕文亦同其時宋本如林更不應内府所藏無一完刻阮所稱殆亦影撰何焯等誤信之也至字句舛訛自楊慎朱謀㙔以下遞有校正而亦不免於妄改如哀弔篇賦憲之諡句皆云賦憲當作議徳盖以賦形近議憲形近悳悳古徳字也然考王應麟玉海曰周書諡法惟三月既生魄周公旦太公望相嗣王發既賦憲受臚于物之野將𦵏乃制作諡文心雕龍云賦憲之諡出於此然則二字不誤古人已言以是例之其以意雌黄者多矣乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀文心雕龍原序文心雕龍凡十巻合篇終序志一篇為五十篇梁通事舎人劉勰彦和所作也勰東莞人自言嘗夜夢執丹漆之器随仲尼而南行窹而思敷讃聖㫖莫若注經而馬鄭諸儒𢎞之巳精就有深觧未足立家惟文章之用有禆經典於是搦筆和墨論著古今文體以成此書出示沈約約大重之謂其深得文理常陳之几案今讀其文出入六經貫穿百氏逺搜荒古之世近窮㝢内之事精推顥穹之㣲粗及塵礫之細陳明王之禮樂述大聖之道徳蔚如也至其陽秋先後作家衮鉞區分瑕瑜不掩百秊斷案莫之異同非慱學雄辯深識遐究烏能及兹若夫論著為文之義敶古繹今别裁分體如方圓之規矩聲音之律吕雖使班馬長雲並列將彬彬與揖共升㳺夏之堂矣論者以六朝齊梁而下佛學昌熾為文多工纎巧駢驪氣亦衰靡概以律勰豈通論哉方今海内文教盛隆操觚之士争崇古雅獨是書時罕印本好古者思欲致之恒病購求之難吾邑汪子仁卿慱文談藝喜而校刻之嗚呼此刻既行世有休文寧無同賞音者吾知雋永之餘固不必鐫肝刻肺抽黄對白而於文也亦思過半矣時嘉靖庚子六月既望書於葵栢山齋新安石巖方元禎欽定四庫全書文心雕龍巻一梁劉勰撰}
