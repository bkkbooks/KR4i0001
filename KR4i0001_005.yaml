body:
  text: 卷五封禪第二十一夫正位北辰嚮明南面所以運天樞育黎獻者何嘗不經道緯德以勒皇蹟者哉緑圖曰灘灘噅噅棼棼雉雉萬物盡化言至德所被也丹書曰義勝欲則從欲勝義則凶戒慎之至也則戒慎以崇其德至德以凝其化七十有二君所以封禪矣昔黃帝神靈克膺鴻瑞勒功喬嶽鑄鼎荊山大舜巡嶽顯乎虞典成康封禪聞之樂緯及齊桓之霸爰窺王跡夷吾譎陳距以怪物固知玉牒金鏤專在帝皇也然則西鶼東鰈南茅北黍空談非徵勳德而已是史遷八書明述封禪者固禋祀之殊禮銘號之祕祝祀天之壯觀矣秦始皇銘岱文自李斯法家辭氣體乏弘潤然疏而能壯亦彼時之絶采也鋪觀兩漢隆盛孝武禪號於肅然光武巡封於梁父誦德銘勳乃鴻筆耳觀相如封禪蔚為唱首爾其表權輿序皇王炳玄符鏡鴻業驅前古於當今之下騰休明於列聖之上歌之以禎瑞讚之以介丘絶筆茲文固惟新之作也及光武勒碑則文自張純首胤典謨末同祝辭引鉤讖敘離分計武功述文德事核理舉華不足而實有餘矣凡此二家並岱宗實跡也及揚雄劇秦班固典引事非鐫石而體因紀禪觀劇秦為文影寫長卿詭言遁辭故兼包神怪然骨掣靡密辭貫圓通自稱極思無遺力矣典引所敘雅有懿采歷鑑前作能執厥中其致義會文斐然餘巧故稱封禪靡而不典劇秦典而不實豈非追觀易為明循勢易為力歟至於邯鄲受命攀響前聲風末力寡輯韻成頌雖文理頗序而不能奮飛陳思魏德假論客主問答迂緩且已千言勞深績寡飆焰缺焉茲文為用蓋一代之典章也搆位之始宜明大體樹骨於訓典之區選言於宏富之路使意古而不晦於深文今而不墜於淺義吐光芒辭成廉鍔則為偉矣雖復道極數殫終然相襲而日新其采者必超前轍焉贊曰封勒帝績對越天休逖聽高嶽聲英克彪樹石九旻泥金八幽鴻律蟠采如龍如虬章表第二十二夫設官分職高卑聯事天子垂珠以聽諸侯鳴玉以朝敷奏以言明試以功故堯咨四嶽舜命八元固辭再讓之請俞往欽哉之授並陳辭帝庭匪假書翰然則敷奏以言則章表之義也明試以功即授爵之典也至太甲既立伊尹書誡思庸歸亳又作書以讚文翰獻替事斯見矣周監二代文理彌盛再拜稽首對揚休命承文受冊敢當丕顯雖言筆未分而陳謝可見降及七國未變古式言事於王皆稱上書秦初定制改書曰奏漢定禮儀則有四品一曰章二曰奏三曰表四曰議章以謝恩奏以按劾表以陳請議以執異章者明也詩云為章於天謂文明也其在文物赤白曰章表者標也禮有表記謂德見于儀其在器式揆景曰表章表之目蓋取諸此也按七略藝文謠詠必録章表奏議經國之樞機然闕而不纂者乃各有故事而布在職司也前漢表謝遺篇寡存及後漢察舉必試章奏左雄奏議臺閣為式胡廣章奏天下第一並當時之傑筆也觀伯始謁陵之章足見其典文之美焉昔晉文受冊三辭從命是以漢末讓表以三為斷曹公稱為表不止三讓又勿得浮華所以魏初表章指事造實求其靡麗則未足美矣至於文舉之薦禰衡氣揚采飛孔明之辭後主志盡文暢雖華實異旨並表之英也琳瑀章表有譽當時孔璋稱健則其標也陳思之表獨冠群才觀其體贍而律調辭清而志顯應物製巧隨變生趣執轡有餘故能緩急應節矣逮晉初筆札則張華為儔其三讓公封理周辭要引義比事必得其偶世珍鷦鷯莫顧章表及羊公之辭開府有譽於前談庾公之讓中書信美於往載序志顯類有文雅焉劉琨勸進張駿自序文致耿介並陳事之美表也原夫章表之為用也所以對揚王庭昭明心曲既其身文且亦國華章以造闕風矩應明表以致禁骨采宜耀循名課實以文為本者也是以章式炳賁志在典謨使要而非略明而不淺表體多包情僞屢遷必雅義以扇其風清文以馳其麗然懇惻者辭為心使浮侈者情為文屈必使繁約得正華實相勝唇吻不滯則中律矣子貢云心以制之言以結之蓋一辭意也荀卿以為觀人美辭麗以黼黻文章亦可以喻於斯乎贊曰敷奏絳闕獻替黻扆言必貞明義則弘偉肅恭節文條理首尾君子秉文辭令有斐奏啓第二十三昔唐虞之臣敷奏以言秦漢之輔上書稱奏陳政事獻典儀上急變劾愆謬總謂之奏奏者進也敷于下情進於上也秦始立奏而法家少文觀王綰之奏勳德辭質而義近李斯之奏驪山事略而意誣政無膏潤形於篇章矣自漢以來奏事或稱上疏儒雅繼踵殊采可觀若夫賈誼之務農朝錯之兵術匡衡之定郊王吉之勸禮溫舒之緩獄谷永之諫仙理既切至辭亦通明可謂識大體矣後漢群賢嘉言罔伏楊秉耿介於災異陳蕃憤悶於尺一骨鯁得焉張衡指摘於史職蔡雍詮列於朝儀博雅明焉魏代名臣文理迭興若高堂天文黃觀教學王郎節省甄毅考課亦盡節而知治矣晉氏多難災屯流移劉頌殷勤於時務溫嶠懇切於費役并體國之忠規矣夫奏之為筆固以明允篤誠為本辨扸疏通為首強志足以成務博見足以窮理酌古御今治繁總要此其體也若乃按劾之奏所以明憲清國昔周之太僕繩愆糾繆秦之御史職主文法漢置中丞總司按劾故位在摯擊砥礪其氣必使筆端振風簡上凝霜者也觀孔光之奏董賢則實其姦回路粹之奏孔融則誣其釁惡名儒之與險士固殊心焉若夫傅咸徑直而按辭堅深劉隗切正而劾文闊略各其志也後之彈事迭相斟酌惟新日用而舊準弗差然函人欲全矢人欲傷術在糾惡勢必深峭詩刺讒人投畀豺虎禮嫉無禮方之鸚猩墨翟非儒目以羊彘孟軻譏墨比諸禽獸詩禮儒墨既其如茲奏劾嚴文孰云能免是以世人為文競於詆訶吹毛取瑕次骨為戾復似善罵多失折衷若能闢禮門以懸規標義路以植矩然後踰垣者折肱捷徑者滅趾何必躁言醜句詬病為切哉是以立範運衡宜明體要必使理有典刑辭有風軌總法家之式秉儒家之文不畏強禦氣流墨中無縱詭隨聲動簡外乃稱絶席之雄直方之舉耳啓者開也高宗云啓乃心沃朕心取其義也孝景諱啓故兩漢無稱至魏國箋記始云啓聞奏事之末或云謹啓自晉來盛啓用兼表奏陳政言事既奏之異條讓爵謝恩亦表之別幹必斂徹入規促其音節辨要輕清文而不侈亦啓之大略也又表奏確切號為讜言讜者偏也王道有偏乖乎蕩蕩矯正其偏故曰讜言也孝成稱班伯之讜言言貴直也自漢置八能密奏陰陽皂囊封事故曰封事鼂錯受書還上便宜後代便宜多附封事慎機密也夫王臣匪躬必吐謇諤事舉人存故無待泛說也贊曰皂飭司直肅清風禁筆鋭干將墨含淳鴆雖有次骨無或膚浸獻政陳宜事必勝任議對第二十四周爰咨謀是謂為議議之言宜審事宜也易之節卦君子以制度數議德行周書曰議事以制政乃弗迷議貴節制經典之體也昔管仲稱軒轅有明臺之議則其來遠矣洪水之難堯咨四嶽宅揆之舉舜疇五人三代所興詢及芻蕘春秋釋宋魯僖預議及趙靈胡服而季父爭論商鞅變法而甘龍交辨雖憲章無算而同異足觀迄至有漢始立駁議駁者雜也雜議不純故曰駁也自兩漢文明楷式照備藹藹多士發言盈庭若賈誼之遍代諸生可謂捷於議也至如吾丘之駁挾弓安國之辨胸奴賈捐之之陳於朱崖劉歆之辨於祖宗雖質文不同得事要矣若乃張敏之斷輕侮郭躬之議擅誅程曉之駁校事司馬芝之議貨錢何曾蠲出女之科秦秀定賈充之諡事實允當可謂達議體矣漢世善駁則應劭為首晉代能議則傅咸為宗然仲瑗博古而銓貫以敘長虞識治而屬辭枝繁及陸機斷議亦有鋒穎而腴辭弗翦頗纍文骨亦各有美風格存焉夫動先擬議明用稽疑所以敬慎群務弛張治術故其大體所資必樞紐經典採故實於前代觀通變於當今理不謬搖其枝字不妄舒其藻又郊祀必洞於禮戎事必練於兵佃穀先曉於農斷訟務精於律然後標以顯義約以正辭文以辨潔為能不以繁縟為巧事以明核為美不以深隱為奇此綱領之大要也若不達政體而舞筆弄文支離搆辭穿鑿會巧空騁其華固為事實所擯設得其理亦為遊辭所埋矣昔秦女嫁晉從文衣之媵者晉人貴媵而賤女楚珠鬻鄭為薰桂之櫝鄭人買櫝而還珠若文浮於理末勝其本則秦女楚珠復在於茲矣又對策者應詔而陳政也射策者探事而獻說也言中理準譬射侯中的二名雖殊即議之別體也古之造士選事考言漢文中年始舉賢良朝錯對策蔚為舉首及孝武益明旁求俊乂對策者以第一登庸射策者以甲科入仕斯固選賢要術也觀朝氏之對驗古明今辭裁以辨事通而贍超升高第信有徵矣仲舒之對祖述春秋本陰陽之化究列代之變煩而不慁者事理明也公孫之對簡而未博然總要以約文事切而情舉所以太常居下而天子擢上也杜欽之對略而指事辭以治宣不為文作及後漢魯丕辭氣質素以儒雅中策獨入高第凡此五家並前代之明範也魏晉已來稍務文麗以文紀實所失已多及其來選又稱疾不會雖欲求文弗可得也是以漢飲博士而雉集乎堂晉策秀才而麇興於前無他怪也選失之異耳夫駁議偏辨各執異見對策揄揚大明治道使事深於政術理密於時務酌三五以鎔世而非迂緩之高談馭權變以拯俗而非刻薄之僞論風恢恢而能遠流洋洋而不溢王庭之美對也難矣哉士之為才也或練治而寡文或工文而疏治對策所選實屬通才志足文遠不其鮮歟贊曰議惟疇政名實相課斷理必剛摛辭無懦對策王庭同時酌和治體高秉雅謨遠播書記第二十五大舜云書用識哉所以記時事也蓋聖賢言辭總為尚書書之為體主言者也揚雄曰言心聲也書心畫也聲畫形君子小人見矣故書者舒也舒布其言陳之簡牘取象乎夬貴在明決而已三代政暇文翰頗疏春秋聘繁書介彌盛繞朝贈士會以策子家與趙宣以書巫臣之遺子反子産之諫范宣詳觀四書辭若對面又子叔敬叔進弔書於滕君固知行人挈辭多被翰墨矣及七國獻書詭麗輻湊漢來筆札辭氣紛紜觀史遷之報任安東方朔之難公孫楊惲之酬會宗子雲之答劉歆志氣槃桓各含殊采並杼軸乎尺素抑揚乎寸心逮後漢書記則崔瑗尤善魏之元瑜號稱翩翩文舉屬章半簡必録休璉好事留意辭翰抑其次也嵇康絶交實志高而文偉矣趙至贈離乃少年之激切也至如陳遵占辭百封各意禰衡代書親疏得宜斯又尺牘之偏才也詳總書體本在盡言言以散鬱陶託風采故宜條暢以任氣優柔以懌懷文明從容亦心聲之獻酬也若夫尊貴差序則肅以節文戰國以前君臣同書秦漢立儀始有表奏王公國內亦稱奏書張敞奏書於膠后其義美矣迄至後漢稍有名品公府奏記而郡將奏箋記之言志進己志也箋者表也識表其情也崔實奏記於公府則崇讓之德音矣黃香奏箋於江夏亦肅恭之遺式矣公幹箋記麗而規益子桓弗論故世所共遺若略名取實則有美於為詩矣劉廙謝恩喻切以至陸機自理情周而巧箋之為善者也原箋記之為式既上窺乎表亦下睨乎書使敬而不懾簡而無傲清美以惠其才彪蔚以文其響蓋箋記之分也夫書記廣大衣被事體筆劄雜名古今多品是以總領黎庶則有譜籍簿録醫曆星筮則有方術占式申憲述兵則有律令法制朝市徵信則有符契劵疏百官詢事則有關刺解牒萬民達志則有狀列辭諺並述理於心著言於翰雖藝文之末品而政事之先務也故謂譜者普也注序世統事資周普鄭氏譜詩蓋取乎此籍者借也歲借民力條之於版春秋司籍即其事也簿者圃也草木區別文書類聚張湯李廣為吏所簿別情僞也録者領也古史世本編以簡策領其名數故曰録也方者隅也醫藥攻病各有所主專精一隅故藥術稱方術者路也算歷極數見路乃明九章積微故稱為術淮南萬畢皆其類也占者覘也星辰飛伏伺候乃見登觀書雲故曰占也式者則也陰陽盈虛五行消息變雖不常而稽之有則也律者中也黃鐘調起五音以正法律馭民八刑克平以律為名取中正也令者命也出命申禁有若自天管仲下命如流水使民從也法者象也兵謀無方而奇正有象故曰法也制者裁也上行於下如匠之制器也符者孚也徵召防僞事資中孚三代玉瑞漢世金竹末代從省易以書翰矣契者結也上古純質結繩執契今羌胡徵數負販記緡其遺風歟券者束也明白約束以備情僞字形半分故周稱判書古有鐵券以堅信誓王褒髯奴則券之諧也疏者布也布置物類撮題近意故小券短書號為疏也關者閉也出入由門關閉由審庶務在政通塞應詳韓非云孫亶回聖相也而關於州部蓋謂此也刺者達也詩人諷刺周禮三刺事敘相達若針之通結矣解者釋也解釋結滯徵事以對也牒者葉也短簡編牒如葉在枝溫舒截蒲即其事也議政未定故短牒咨謀牒之尤密謂之為籤籤者纖密者也狀者貌也體貌本原取其事實先賢表諡並有行狀狀之大者也列者陳也陳列事情昭然可見也辭者舌端之文通己於人子産有辭諸侯所賴不可已也諺者直語也喪言亦不及文故弔亦稱諺廛路淺言有實無華鄒穆公云囊漏儲中皆其類也太誓云古人有言牝雞無晨大雅云人亦有言惟憂用老並上古遺諺詩書可引者也至於陳琳諫辭稱掩目捕雀潘嶽哀辭稱掌珠伉儷並引俗說而為文辭者也夫文辭鄙俚莫過於諺而聖賢詩書採以為談況踰於此豈可忽哉觀此四條並書記所總或事本相通而文意各異或全任質素或雜用文綺隨事立體貴乎精要意少一字則義闕句長一言則辭妨並有司之實務而浮藻之所忽也然才冠鴻筆多疏尺牘譬九方堙之識駿足而不知毛色牝牡也言既身文信亦邦瑞翰林之士思理實焉贊曰文藻條流託在筆札既馳金相亦運木訥萬古聲薦千里應拔庶務紛綸因書乃察
