body:
  text: 卷六神思第二十六古人云形在江海之上心存魏闕之下神思之謂也文之思也其神遠矣故寂然凝慮思接千載悄焉動容視通萬里吟詠之間吐納珠玉之聲眉睫之前卷舒風雲之色其思理之致乎故思理為妙神與物遊神居胸臆而志氣統其關鍵物沿耳目而辭令管其樞機樞機方通則物無隱貌關鍵將塞則神有遁心是以陶鈞文思貴在虛靜疏瀹五藏澡雪精神積學以儲寶酌理以富才研閲以窮照馴致以繹辭然後使玄解之宰尋聲律而定墨獨照之匠窺意象而運斤此蓋馭文之首術謀篇之大端夫神思方運萬塗競萌規矩虛位刻鏤無形登山則情滿於山觀海則意溢於海我才之多少將與風雲而並驅矣方其搦翰氣倍辭前暨乎篇成半折心始何則意翻空而易奇言徵實而難巧也是以意授於思言授於意密則無際疏則千里或理在方寸而求之域表或義在咫尺而思隔山河是以秉心養術無務苦慮含章司契不必勞情也人之稟才遲速異分文之制體大小殊功相如含筆而腐毫揚雄掇翰而驚夢桓談疾感於苦思王充氣竭於沈慮張衡研京以十年左思練都以一紀雖有巨文亦思之緩也淮南崇朝而賦騷枚皋應詔而成賦子建援牘如口誦仲宣舉筆似宿搆阮瑀據鞍而制書禰衡當食而草奏雖有短篇亦思之速也若夫駿發之士心總要術敏在慮前應機立斷覃思之人情饒岐路鑒在疑後研慮方定機敏故造次而成功慮疑故愈久而致績難易雖殊並資博練若學淺而空遲才疏而徒速以斯成器未之前聞是以臨篇綴慮必有二患理鬱者苦貧辭溺者傷亂然則博聞為饋貧之糧貫一為拯亂之藥博而能一亦有助乎心力矣若情數詭雜體變遷貿拙辭或孕於巧義庸事或萌於新意視布於麻雖云未費杼軸獻功煥然乃珍至於思表纖旨文外曲致言所不追筆固知止至精而後闡其妙至變而後通其數伊摯不能言鼎輪扁不能語斤其微矣乎贊曰神用象通情變所孕物以貌求心以理應刻鏤聲律萌芽比興結慮司契垂帷制勝體性第二十七夫情動而言形理發而文見蓋沿隱以至顯因內而符外者也然才有庸俊氣有剛柔學有淺深習有雅鄭並情性所爍陶染所凝是以筆區雲譎文苑波詭者矣故辭理庸俊莫能翻其才風趣剛柔寧或改其氣事義淺深未聞乖其學體式雅鄭鮮有反其習各師成心其異如面若總其歸塗則數窮八體一曰典雅二曰遠奧三曰精約四曰顯附五曰繁縟六曰壯麗七曰新奇八曰輕靡典雅者鎔式經誥方軌儒門者也遠奧者馥采典文經理玄宗者也精約者核字省句剖析毫釐者也顯附者辭直義暢切理厭心者也繁縟者博喻釀采煒燁枝派者也壯麗者高論宏裁卓爍異采者也新奇者擯古競今危側趣詭者也輕靡者浮文弱植縹眇附俗者也故雅與奇反奧與顯殊繁與約舛壯與輕乖文辭根葉苑囿其中矣若夫八體屢遷功以學成才力居中肇自血氣氣以實志志以定言吐納英華莫非情性是以賈生俊發故文潔而體清長卿傲誕故理侈而辭溢子雲沉寂故志隱而味深子政簡易故趣昭而事博孟堅雅懿故裁密而思靡平子淹通故慮周而藻密仲宣躁競故穎出而才果公幹氣褊故言壯而情駭嗣宗俶儻故響逸而調遠叔夜俊俠故興高而采烈安仁輕敏故鋒發而韻流士衡矜重故情繁而辭隱觸類以推表裏必符豈非自然之恆資才氣之大略哉夫才有天資學慎始習斫梓染絲功在初化器成綵定難可翻移故童子雕琢必先雅製沿根討葉思轉自圓八體雖殊會通合數得其環中則輻輳相成故宜摹體以定習因性以練才文之司南用此道也贊曰才性異區文體繁詭辭為膚根志實骨髓雅麗黼黻淫巧朱紫習亦凝真功沿漸靡風骨第二十八詩總六義風冠其首斯乃化感之本源志氣之符契也是以怊悵述情必始乎風沉吟鋪辭莫先於骨故辭之待骨如體之樹骸情之含風猶形之包氣結言端直則文骨成焉意氣駿爽則文風清焉若豐藻克贍風骨不飛則振采失鮮負聲無力是以綴慮裁篇務盈守氣剛健既實輝光乃新其為文用譬征鳥之使翼也故練於骨者析辭必精深乎風者述情必顯捶字堅而難移結響凝而不滯此風骨之力也若瘠義肥辭繁雜失統則無骨之徵也思不環周索課乏氣則無風之驗也昔潘勗錫魏思摹經典群才韜筆乃其骨髓峻也相如賦仙氣號凌雲蔚為辭宗乃其風力遒也能鑒斯要可以定文茲術或違無務繁采故魏文稱文以氣為主氣之清濁有體不可力強而致故其論孔融則云體氣高妙論徐幹則云時有齊氣論劉楨則云有逸氣公幹亦云孔氏卓卓信含異氣筆墨之性殆不可勝並重氣之旨也夫翬翟備色而翾翥百步肌豐而力沈也鷹隼乏采而翰飛戾天骨徑而氣猛也文章才力有似於此若風骨乏采則鷙集翰林采乏風骨則雉竄文囿唯藻耀而高翔固文章之鳴鳳也若夫鎔冶經典之範翔集子史之術洞曉情變曲昭文體然後能莩甲新意雕畫奇辭昭體故意新而不亂曉變故辭奇而不黷若骨采未圓風辭未練而跨略舊規馳騖新作雖獲巧意危敗亦多豈空結奇字紕繆而成輕矣周書云辭尚體要弗惟好異蓋防文濫也然文術多門各適所好明者弗授學者弗師於是習華隨侈流遁忘反若能確乎正式使文明以健則風清骨峻篇體光華能研諸慮何遠之有哉贊曰情與氣偕辭共體並文明以健圭璋乃聘蔚彼風力嚴此骨鯁才鋒峻立符采克炳通變第二十九夫設文之體有常變文之數無方何以明其然耶凡詩賦書記名理相因此有常之體也文辭氣力通變則久此無方之數也名理有常體必資於故實通變無方數必酌於新聲故能騁無窮之路飲不竭之源然綆短者銜渴足疲者輟塗非文理之數盡乃通變之術疏耳故論文之方譬諸草木根幹麗土而同性臭味晞陽而異品矣是以九代詠歌志合文則黃歌斷竹質之至也唐歌在昔則廣於黃世虞歌卿雲則文於唐時夏歌雕牆縟於虞代商周篇什麗於夏年至於序志述時其揆一也暨楚之騷文矩式周人漢之賦頌影寫楚世魏之篇製顧慕漢風晉之辭章瞻望魏采榷而論之則黃唐淳而質虞夏質而辨商周麗而雅楚漢侈而豔魏晉淺而綺宋初訛而新從質及訛彌近彌淡何則競今疏古風末氣衰也今才穎之士刻意學文多略漢篇師範宋集雖古今備閲然近附而遠疏矣夫青生於藍絳生於蒨雖踰本色不能復化桓君山云豫見新進麗文美而無採及見劉揚言辭常輒有得此其驗也故練青濯絳必歸藍蒨矯訛翻淺還宗經誥斯斟酌乎質文之間而檃括乎雅俗之際可與言通變矣夫誇張聲貌則漢初已極自茲厥後循環相因雖軒翥出轍而終入籠內枚乘七發云通望兮東海虹洞兮蒼天相如上林云視之無端察之無涯日出東沼月生西陂馬融廣成云天地虹洞固無端涯大明出東月生西陂揚雄校獵云出入日月天與地沓張衡西京云日月於是乎出入象扶桑於濛泛此並廣寓極狀而五家如一諸如此類莫不相循參伍因革通變之數也是以規略文統宜宏大體先博覽以精閲總綱紀而攝契然後拓衢路置關鍵長轡遠馭從容按節憑情以會通負氣以適變采如宛虹之奮鬐光若長離之振翼乃穎脫之文矣若乃齷齪於偏解矜激乎一致此庭間之回驟豈萬里之逸步哉贊曰文律運周日新其業變則堪久通則不乏趨時必果乘機無怯望今制奇參古定法定勢第三十夫情致異區文變殊術莫不因情立體即體成勢也勢者乘利而為制也如機發矢直澗曲湍回自然之趣也圓者規體其勢也自轉方者矩形其勢也自安文章體勢如斯而已是以模經為式者自入典雅之懿效騷命篇者必歸豔逸之華綜意淺切者類乏醞藉斷辭辨約者率乖繁縟譬激水不漪稿木無陰自然之勢也是以繪事圖色文辭盡情色糅而犬馬殊形情交而雅俗異勢鎔範所擬各有司匠雖無嚴郛難得踰越然淵乎文者並總群勢奇正雖反必兼解以俱通剛柔雖殊必隨時而適用若愛典而惡華則兼通之理偏似夏人爭弓矢執一不可以獨射也若雅鄭而共篇則總一之勢離是楚人鬻矛譽盾兩難得而俱售也是以括囊雜體功在銓別宮商朱紫隨勢各配章表奏議則準的乎典雅賦頌歌詩則羽儀乎清麗符檄書移則楷式於明斷史論序注則師範於核要針銘碑誄則體制於弘深連珠七辭則從事於巧豔此循體而成勢隨變而立功者也雖復契會相參節文互雜譬五色之錦各以本采為地矣桓談稱文家各有所慕或好浮華而不知實核或美衆多而不見要約陳思亦云世之作者或好煩文博采深沉其旨者或好離言辨句分毫析釐者所習不同所務各異言勢殊也劉楨云文之體指虛實強弱使其辭已盡而勢有餘天下一人耳不可得也公幹所談頗亦兼氣然文之任勢勢有剛柔不必壯言慷慨乃稱勢也又陸雲自稱往日論文先辭而後情尚勢而不取悅澤及張公論文則欲宗其言夫情固先辭勢實須澤可謂先迷後能從善矣自近代辭人率好詭巧原其為體訛勢所變厭黷舊式故穿鑿取新察其訛意似難而實無他術也反正而已故文反正為乏辭反正為奇效奇之法必顛倒文句上字而抑下中辭而出外回互不常則新色耳夫通衢夷坦而多行捷徑者趨趣近故也正文明白而常務反言者適俗故也然密會者以意新得巧苟異者以失體成怪舊練之才則執正以馭奇新學之鋭則逐奇而失正勢流不反則文體遂斃秉茲情術可無思耶贊曰形生勢成始末相承湍回似規矢激如繩因利騁節情采自凝枉轡學步力止壽陵
