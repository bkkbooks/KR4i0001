body:
  text: 卷四史傳第十六開闢草昧歲紀綿邈居今識古其載籍乎軒轅之世史有蒼頡主文之職其來久矣曲禮曰史載筆史者使也執筆左右使之記也古者左史記言右史書事言經則尚書事經則春秋也唐虞流于典謨夏商被于誥誓洎周命惟新姬公定法紬三正以班曆貫四時以聯事諸侯建邦各有國史彰善疸惡樹之風聲自平王微弱政不及雅憲章散紊彝倫攸斁昔者夫子閔王道之缺傷斯文之墜靜居以歎鳳臨衢而泣麟於是就大師以正雅頌因魯史以修春秋舉得失以表黜陟徵存亡以摽勸戒褒見一字貴踰軒冕貶在片言誅深斧鉞然睿旨幽隱經文婉約丘明同時實得微言乃原始要終創為傳體傳者轉也轉受經旨以授其後實聖文之羽翮記籍之冠冕也及至從橫之世史職猶存秦并七王而戰國有策蓋録而弗敘故即簡而為名也漢滅嬴項武功積年陸賈稽古作楚漢春秋爰及太史談世惟執簡子長繼志甄序帝績比堯稱典則位雜中賢法孔題經則文非玄聖故取式呂覽通號曰紀紀綱之號亦宏稱也故本紀以述皇王列傳以總侯伯八書以鋪政體十表以譜年爵雖殊古式而得事序焉爾其實録無隱之旨博雅弘辨之才愛奇反經之尤條例蹖落之失叔皮論之詳矣及班固述漢因循前業觀司馬遷之辭思實過半其十志該富讚序弘麗儒雅彬彬信有遺味至於宗經矩聖之典端緒豐贍之功遺親攘美之罪徵賄鬻筆之愆公理辨之究矣觀夫左氏綴事附經間出於文為約而氏族難明及史遷各傳人始區詳而易覽述者宗焉及孝惠委機呂后攝政史班立紀並違經實何則庖犧以來未聞女帝者也漢運所值難為後法牝雞無晨武王首誓婦無與國齊桓著盟宣后亂秦呂氏危漢豈唯政事難假亦名號宜慎矣張衡司史而或同遷固元年平二后欲為立紀繆亦甚矣尋子弘雖偽要當孝惠之嗣孺子誠微實繼平帝之體二子可紀何有於二后哉至于後漢紀傳發源東觀袁張所制偏駁不倫薛謝之作疏謬少信若司馬彪之詳實華嶠之準當則其冠也及魏代三雄記傳互出陽秋魏略之屬江表吳録之類或激抗難徵或疏闊寡要唯陳壽三志文質辨洽荀張比之於遷固非妄譽也至於晉代之書繫乎著作陸機肇始而未備王韶續末而不終干寶述紀以審正得序孫盛陽秋以約舉為能按春秋經傳舉例發凡自史漢以下莫有準的至鄧粲晉紀始立條例又擺落漢魏憲章殷周雖湘州曲學亦有心典謨及安國立例乃鄧氏之規焉原夫載籍之作也必貫乎百氏被之千載表徵盛衰殷鑑興廢使一代之制共日月而長存王霸之迹並天地而久大是以在漢之初史職為盛郡國文計先集太史之府欲其詳悉於體國也閲石室啓金匱抽裂帛檢殘竹欲其博練於稽古也是立義選言宜依經以樹則勸戒與奪必附聖以居宗然後詮評昭整苛濫不作矣然紀傳為式編年綴事文非泛論按實而書歲遠則同異難密事積則起訖易疏斯固總會之為難也或有同歸一事而數人分功兩記則失於復重偏舉則病於不周此又銓配之未易也故張衡摘史班之舛濫傅玄譏後漢之尤煩皆此類也若夫追述遠代代遠多偽公羊高云傳聞異辭荀況稱録遠略近蓋文疑則闕貴信史也然俗皆愛奇莫顧實理傳聞而欲偉其事録遠而欲詳其迹於是棄同即異穿鑿傍説舊史所無我書則傳此訛濫之本源而述遠之巨蠹也至於記編同時時同多詭雖定哀微辭而世情利害勳榮之家雖庸夫而盡飾迍敗之士雖令德而嗤埋吹霜煦露寒暑筆端此又同時之枉可為歎息者也故述遠則誣矯如彼記近則回邪如此析理居正唯素心乎若乃尊賢隱諱固尼父之聖旨蓋纖瑕不能玷瑾瑜也姦慝懲戒實良史之直筆農夫見莠其必鋤也若斯之科亦萬代一準焉至於尋繁領雜之術務信棄奇之要明白頭訖之序品酌事例之條曉其大綱則衆理可貫然史之為任乃彌綸一代負海內之責而贏是非之尤秉筆荷擔莫此之勞遷固通矣而歷詆後世若任情失正文其殆哉贊曰史肇軒黃體備周孔世歷斯編善惡偕總騰褒裁貶萬古魂動辭宗丘明直歸南董諸子第十七諸子者入道見志之書太上立德其次立言百姓之群居苦紛雜而莫顯君子之處世疾名德之不章唯英才特達則炳曜垂文騰其姓氏懸諸日月焉昔風后力牧伊尹咸其流也篇述者蓋上古遺語而戰代所記者也至鬻熊知道而文王咨詢餘文遺事録為鬻子子自肇始莫先於茲及伯陽識禮而仲尼訪問爰序道德以冠百氏然則鬻惟文友李實孔師聖賢並世而經子異流矣逮及七國力政俊乂蜂起孟軻膺儒以磬折莊周述道以翱翔墨翟執儉確之教尹文課名實之符野老治國於地利騶子養政於天文申商刀鋸以制理鬼谷脣吻以策勳尸佼兼總於雜術青史曲綴以街談承流而枝附者不可勝算並飛辨以馳術饜祿而餘榮矣暨于暴秦烈火勢炎崑岡而煙燎之毒不及諸子逮漢成普思子政讎校於是七略芬菲九流鱗萃殺青所編百有八十餘家矣迄至魏晉作者間出讕言兼存璅語必録類聚而求亦充箱照軫矣然繁辭雖積而本體易總述道言治枝條五經其純粹者入矩踳駁者出規禮記月令取乎呂氏之紀三年問喪寫乎荀子之書此純粹之類也若乃湯之問棘云蚊睫有雷霆之聲惠施對梁王云蝸角有伏尸之戰列子有移山跨海之談淮南有傾天折地之説此踳駁之類也是以世疾諸子混洞虛誕按歸藏之經大明迂怪乃稱羿斃十日姮娥奔月殷易如茲況諸子乎至如商韓六虱五蠹棄孝廢仁轘藥之禍非虛至也公孫之白馬孤犢辭巧理拙魏牟比之梟鳥非妄貶也昔東平求諸子史記而漢朝不與蓋以史記多兵謀而諸子雜詭術也然洽聞之士宜撮綱要覽華而食實棄邪而採正極睇參差亦學家之壯觀也研夫孟荀所述理懿而辭雅管晏屬篇事核而言練列御寇之書氣偉而采奇鄒子之説心奢而辭壯墨翟隨巢意顯而語質尸佼尉繚術通而文鈍鶡冠綿綿亟發深言鬼谷渺渺每環其義情辨以澤文子擅其能辭約而精尹文得其要慎到析密理之巧韓非著博喻之富呂氏鑒遠而體周淮南泛採而文麗斯則得百氏之華采而辭氣之大略也若夫陸賈新語賈誼新書揚雄法言劉向説苑王符潛夫崔實正論仲長昌言杜夷幽求咸敘經典或明政術雖摽論名歸乎諸子何者博明萬事為子適辨一理為論彼皆蔓延雜説故入諸子之流夫自六國以前去聖未遠故能越世高談自開戶牖兩漢以後體勢浸弱雖明乎坦途而類多依採此遠近之漸變也嗟夫身與時舛志共道申摽心於萬古之上而送懷於千載之下金石靡矣聲其銷乎贊曰丈夫處世懷寶挺秀辨雕萬物智周宇宙立德何隱含道必授條流殊述若有區囿論説第十八聖哲彝訓曰經述經敘理曰論論者倫也倫理無爽則聖意不墜昔仲尼微言門人追記故抑其經目稱為論語蓋群論立名始於茲矣自論語已前經無論字六韜二論後人追題乎詳觀論體條流多品陳政則與議説合契釋經則與傳注參體辨史則與贊評齊行銓文則與敘引共紀故議者宜言説者説語傳者轉師注者主解贊者明意評者平理序者次事引者胤辭八名區分一揆宗論論也者彌綸群言而研精一理者也是以莊周齊物以論為名不韋春秋六論昭列至石渠論藝白虎講聚述聖通經論家之正體也及班彪王命嚴尤三將敷述昭情善入史體魏之初霸術兼名法傅嘏王粲校練名理迄至正始務欲守文何晏之徒始盛玄論於是聃周當路與尼父爭塗矣詳觀蘭石之才性仲宣之去伐叔夜之辨聲太初之本玄輔嗣之兩例平叔之二論並師心獨見鋒穎精密蓋人倫之英也至如李康運命同論衡而過之陸機辨亡效過秦而不及然亦其美矣次及宋岱郭象鋭思於機神之區夷甫裴頠交辨於有無之域並獨步當時流聲後代然滯有者全繫於形用貴無者專守於寂寥徒鋭偏解莫詣正理動極神源其般若之絶境乎逮江左群談惟玄是務雖有日新而多抽前緒矣至如張衡譏世韻似俳説孔融孝廉但談嘲戲曹植辨道體同書抄才不持論寧如其已原夫論之為體所以辨正然否窮于有數追于無形迹堅求通鉤深取極乃百慮之筌蹄萬事之權衡也故其義貴圓通辭忌枝碎必使心與理合彌縫莫見其隙辭共心密敵人不知所乘斯其要也是以論如析薪貴能破理斤利者越理而橫斷辭辨者反義而取通覽文雖巧而檢迹知妄唯君子能通天下之志安可以曲論哉若夫注釋為詞解散論體雜文雖異總會是同若秦延君之注堯典十餘萬字朱普之解尚書三十萬言所以通人惡煩羞學章句若毛公之訓詩安國之傳書鄭君之釋禮王弼之解易要約明暢可為式矣説者悅也兌為口舌故言資悅懌過悅必偽故舜驚讒説説之善者伊尹以論味隆殷太公以辨釣興周及燭武行而紓鄭端木出而存魯亦其美也暨戰國爭雄辨士雲踊從橫參謀長短角勢轉丸騁其巧辭飛鉗伏其精術一人之辨重於九鼎之寶三寸之舌強於百萬之師六印磊落以佩五都隱賑而封至漢定秦楚辨士弭節酈君既斃於齊鑊蒯子幾入乎漢鼎雖復陸賈籍甚張釋傅會杜欽文辨樓護脣舌頡頏萬乘之階抵噓公卿之席並順風以託勢莫能逆波而泝洄矣夫説貴撫會弛張相隨不專緩頰亦在刀筆范睢之言事李斯之止逐客並煩情入機動言中務雖批逆鱗而功成計合此上書之善説也至於鄒陽之説吳梁喻巧而理至故雖危而無咎矣敬通之説鮑鄧事緩而文繁所以歷騁而罕遇也凡説之樞要必使時利而義貞進有契於成務退無阻於榮身自非譎敵則唯忠與信披肝膽以獻主飛文敏以濟辭此説之本也而陸氏直稱説煒曄以譎誑何哉贊曰理形於言敘理成論詞深人天致遠方寸陰陽莫二鬼神靡遁説爾飛鉗呼吸沮勸詔策第十九皇帝御宇其言也神淵默黼扆而響盈四表唯詔策乎昔軒轅唐虞同稱為命命之為義制性之本也其在三代事兼誥誓誓以訓戎誥以敷政命喻自天故授官錫胤易之姤象后以施命誥四方誥命動民若天下之有風矣降及七國並稱曰命命者使也秦并天下改命曰制漢初定儀則則命有四品一曰策書二曰制書三曰詔書四曰戒敕敕戒州郡詔誥百官制施赦命策封王侯策者簡也制者裁也詔者告也敕者正也詩云畏此簡書易稱君子以制數度禮稱明神之詔書稱敕天之命並本經典以立名目遠詔近命習秦制也記稱絲綸所以應接群后虞重納言周貴喉舌故兩漢詔誥職在尚書王言之大動入史策其出如綍不反若汗是以淮南有英才武帝使相如視草隴右多文士光武加意於書辭豈直取美當時亦敬慎來葉矣觀文景以前詔體浮雜武帝崇儒選言弘奧策封三王文同訓典勸戒淵雅垂範後代及制誥嚴助即云厭承明廬蓋寵才之恩也孝宣璽書責博于陳遂亦故舊之厚也逮光武撥亂留意斯文而造次喜怒時或偏濫詔賜鄧禹稱司徒為堯敕責侯霸稱黃鉞一下若斯之類實乖憲章暨明章崇學雅詔間出和安政弛禮閣鮮才每為詔敕假手外請建安之末文理代興潘勗九錫典雅逸群衛覬禪誥符采炳耀弗可加也自魏晉誥策職在中書劉放張華互管斯任施令發號洋洋盈耳魏文帝下詔辭義多偉至於作威作福其萬慮之一弊乎晉氏中興唯明帝崇才以溫嶠文清故引入中書自斯以後體憲風流矣夫王言崇祕大觀在上所以百辟其刑萬邦作孚故授官選賢則義炳重離之輝優文封策則氣含風雨之潤敕戒恆誥則筆吐星漢之華治戎燮伐則聲有洊雷之威眚災肆赦則文有春露之滋明罰敕法則辭有秋霜之烈此詔策之大略也戒敕為文實詔之切者周穆命郊父受敕憲此其事也魏武稱作敕戒當指事而語勿得依違曉治要矣及晉武敕戒備告百官敕都督以兵要戒州牧以董司警郡守以恤隱勒牙門以禦衛有訓典焉戒者慎也禹稱戒之用休君父至尊在三同極漢高祖之敕太子東方朔之戒子亦顧命之作也及馬援已下各貽家戒班姬女戒足稱母師也教者效也言出而民效也契敷五教故王侯稱教昔鄭弘之守南陽條教為後所述乃事緒明也孔融之守北海文教麗而罕施乃治體乖也若諸葛孔明之詳約庾稚恭之明斷並理得而辭中教之善也自教以下則又有命詩云有命自天明命為重也周禮曰師氏詔王明詔為輕也今詔重而命輕者古今之變也贊曰皇王施令寅嚴宗誥我有絲言兆民伊好輝音峻舉鴻風遠蹈騰義飛辭渙其大號檄移第二十震雷始於曜電出師先乎威聲故觀電而懼雷壯聽聲而懼兵威兵先乎聲其來已久昔有虞始戒於國夏后初誓於軍殷誓軍門之外周將交刃而誓之故知帝世戒兵三王誓師宣訓我衆未及敵人也至周穆西征祭公謀父稱古有威讓之令有文告之辭即檄之本源也及春秋征伐自諸侯出懼敵弗服故兵出須名振此威風暴彼昏亂劉獻公之所謂告之以文辭董之以武師者也齊桓征楚詰菁茅之闕晉厲伐秦責箕郜之焚管仲呂相奉辭先路詳其意義即今之檄文暨乎戰國始稱為檄檄者皎也宣露於外皎然明白也張儀檄楚書以尺二明白之文或稱露布露布者蓋露板不封播諸視聽也夫兵以定亂莫敢自專天子親戎則稱龔行天罰諸侯御師則云肅將王誅故分閫推轂奉辭伐罪非唯致果為毅亦且厲辭為武使聲如衝風所擊氣似欃槍所掃奮其武怒總其罪人徵其惡稔之時顯其貫盈之數搖姦宄之膽訂信慎之心使百尺之衝摧折於咫書萬雉之城顛墜於一檄者也觀隗囂之檄亡新布其三逆文不雕飾而辭切事明隴右文士得檄之體矣陳琳之檄豫州壯有骨鯁雖姦閹攜養章密太甚發丘模金誣過其虛然抗辭書釁皎然露固矣敢指曹公之鋒幸哉免袁黨之戮也鍾會檄蜀徵驗甚明桓溫檄胡觀釁尤切並壯筆也凡檄之大體或述此休明或敘彼苛虐指天時審人事算強弱角權勢摽蓍龜於前驗懸鞶鑑於已然雖本國信實參兵詐譎詭以馳旨煒曄以騰説凡此衆條莫之或違者也故其植義揚辭務在剛健插羽以示迅不可使辭緩露板以宣衆不可使義隱必事昭而理辨氣盛而辭斷此其要也若曲趣密巧無所取才矣又州邦徵吏亦稱為檄固明舉之義也移者易也移風易俗令往而民隨者也相如之難蜀老文曉而喻博有移檄之骨焉及劉歆之移太常辭剛而義辨文移之首也陸機之移百官言約而事顯武移之要者也故檄移為用事兼文武其在金革則逆黨用檄順衆資移所以洗濯民心堅明符契意用小異而體義大同與檄參伍故不重論也贊曰三驅弛網九伐先話鞶鑑吉凶蓍龜成敗摧壓鯨鯢抵落蜂蠆移寶易俗草偃風邁
