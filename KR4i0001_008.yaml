body:
  text: 卷八比興第三十六詩文弘奧包韞六義毛公述傳獨標興體豈不以風通而賦同比顯而興隱哉故比者附也興者起也附理者切類以指事起情者依微以擬議起情故興體以立附理故比例以生比則畜憤以斥言興則環譬以寄諷蓋隨時之義不一故詩人之志有二也觀夫興之託諭婉而成章稱名也小取類也大關睢有別故后妃方德尸鳩貞一故夫人象義義取其貞無從於夷禽德貴其別不嫌於鷙鳥明而未融故發注而後見也且何謂為比蓋寫物以附意揚言以切事者也故金錫以喻明德圭璋以譬秀民螟蛉以類教誨蜩螳以寫號呼浣衣以擬心憂卷席以方志固凡斯切象皆比義也至如麻衣如雪兩驂如舞若斯之類皆比類者也襄楚信讒而三閭忠烈依詩製騷諷兼比興炎漢雖盛而辭人夸毗諷刺道喪故興義銷亡於是賦頌先鳴故比體雲構紛紜雜遝信舊章矣夫比之為義取類不常或喻於聲或方於貌或擬於心或譬於事宋玉高唐云纖條悲鳴聲似竽籟此比聲之類也枚乘菟園云焱焱紛紛若塵埃之間白雲此則比貌之類也賈生鵩鳥云禍之與福何異糾纆此以物比理者也王褒洞簫云優柔溫潤如慈父之愛子也此以聲比心者也馬融長笛云繁縟絡繹范蔡之說也此以響比辨者也張衡南都云起鄭舞璽曳緒此以容比物者也若斯之類辭賦所先日用乎比月忘乎興習小而棄大所以文謝於周人也至於揚班之倫曹劉以下圖狀山川影寫雲物莫不織綜比義以敷其華驚聽回視資此效績又安仁螢賦云流金在沙季鷹雜詩云青條若總翠皆其義者也故比類雖繁以切至為貴若刻鶴類鶩則無所取焉贊曰詩人比興觸物圓覽物雖胡越合則肝膽擬容取心斷辭必敢攢雜詠歌如川之渙夸飾第三十七夫形而上者謂之道形而下者謂之器神道難摹精言不能追其極形器易寫壯辭可得喻其真才非短長理自難易耳故自天地以降豫入聲貌文辭所被夸飾恆存雖詩書雅言風格訓世事必宜廣文亦過焉是以言峻則嵩高極天論狹則河不容舠說多則子孫千億稱少則民靡孑遺襄陵舉滔天之目倒戈立漂杵之論辭雖已甚其義無害也且夫梟音之醜豈有泮林而變好荼味之苦寧以周原而成飴並意深褒讚故義成矯飾大聖所録以垂憲章孟軻所云說詩者不以文害辭不以辭害意也自宋玉景差夸飾始盛相如憑風詭濫愈甚故上林之館奔星與宛虹入軒從禽之盛飛廉與焦明俱獲及揚雄甘泉酌其餘波語瓌奇則假珍於玉樹言峻極則顛墜於鬼神至東都之比目西京之海若驗理則理無可驗窮飾則飾猶未窮矣又子雲校獵鞭宓妃以餉屈原張衡羽獵困玄冥於朔野孌彼洛神既非魑魅惟此水怪亦非魍魎而虛用濫形不其疏乎此欲夸其威而其事義暌剌也至如氣貌山海體勢宮殿嵯峨揭業熠耀焜煌之狀光采煒煒而欲然聲貌岌岌其將動矣莫不因夸以成狀沿飾而得奇也於是後進之才獎氣挾聲軒翥而欲奮飛騰躑而羞局步辭入煒燁春藻不能程其豔言在萎絶寒谷未足成其凋談歡則字與笑並論戚則聲共泣偕信可以發蘊而飛滯披瞽而駭聾矣然飾窮其要則心聲鋒起夸過其理則名實兩乖若能酌詩書之曠旨剪揚馬之甚泰使夸而有節飾而不誣亦可謂之懿也贊曰夸飾在用文豈循檢言必鵬運氣靡鴻漸倒海探珠傾崑取琰曠而不溢奢而無玷事類第三十八事類者蓋文章之外據事以類義援古以證今者也昔文王繇易剖判爻位既濟九三遠引高宗之伐明夷六五近書箕子之貞斯略舉人事以徵義者也至若胤征羲和陳正典之訓盤庚誥民敘遲任之言此全引成辭以明理者也然則明理引乎成辭徵義舉乎人事乃聖賢之鴻謨經籍之通矩也大畜之象君子以多識前言往行亦有包於文矣觀夫屈宋屬篇號依詩人雖引古事而莫取舊辭唯賈誼鵩賦始用鶡冠之說相如上林撮引李斯之書此萬分之一會也及揚雄六官針頗酌於詩書劉歆遂初賦歷敘於紀傳漸漸綜採矣至於崔班張蔡遂捃托經史華實布護因書立功皆後人之範式也夫薑桂因地辛在本性文章由學能在天資才自內發學以外成有飽學而才餒有才富而學貧學貧者迍邅於事義才餒者劬勞於辭情此內外之殊分也是以屬意立文心與筆謀才為盟主學為輔佐主佐合德文采必霸才學褊狹雖美少功夫以子雲之才而自奏不學及觀書石室乃成鴻采表裏相資古今一也故魏武稱張子之文為拙然學問膚淺所見不博專拾掇崔杜小文所作不可悉難難便不知所出斯則寡聞之病也夫經典沈深載籍浩汗實群言之奧區而才思之神皋也揚班以下莫不取資任力耕耨縱意漁獵操刀能割必裂膏腴是以將贍才力務在博見狐腋非一皮能溫雞跖必數千而飽矣是以綜學在博取事貴約校練務精捃理須核衆美輻湊表裏發輝劉卲趙都賦云公子之客叱徑楚令歃盟管庫隸臣呵強秦使鼓缶用事如斯可稱理得而義要矣故事得其要雖小成績譬寸轄制輪尺樞運關也或微言美事置於閒散是綴金翠於足脛靚粉黛於胸臆也凡用舊合機不啻自其口出引事乘謬雖千載而為瑕陳思群才之英也報孔璋書云葛天氏之樂千人唱萬人和聽者因以蔑韶夏矣此引事之實謬也按葛天之歌唱和三人而已相如上林云奏陶唐之舞聽葛天之歌千人唱萬人和唱和千萬人乃相如推之然而濫侈葛天推三成萬者信賦妄書致斯謬也陸機園葵詩云庇足同一智生理合異端夫葵能衛足事譏鮑莊葛藟庇根辭自樂豫若譬葛為葵則引事為謬若謂庇勝衛則改事失真斯又不精之患夫以子建明練士衡沈密而不免於謬曹洪之謬高唐又曷足以嘲哉夫山木為良匠所度經書為文士所擇木美而定於斧斤事美而制於刀筆研思之士無慚匠石矣贊曰經籍深富辭理遐亘皓如江海鬱若崑鄧文梓共採瓊珠交贈用人若己古來無懵練字第三十九夫文象列而結繩移鳥跡明而書契作斯乃言語之體貌而文章之宅宇也蒼頡造之鬼哭粟飛黃帝用之官治民察先王聲教書必同文輶軒之使紀言殊俗所以一字體總異音周禮保氏掌教六書秦滅舊章以吏為師及李斯刪籀而秦篆興程邈造隸而古文廢漢初草律明著厥法太史學童教試六體又吏民上書字謬輒劾是以馬字缺畫而石建懼死雖云性慎亦時重文也至孝武之世則相如撰篇及宣成二帝徵集小學張敞以正讀傳業揚雄以奇字纂訓並貫練雅頌總閲音義鳴筆之徒莫不洞曉且多賦京苑假借形聲是以前漢小學率多瑋字非獨制異乃共曉難也暨乎後漢小學轉疏復文隱訓臧否太半及魏代綴藻則字有常檢追觀漢作翻成阻奧故陳思稱揚馬之作趣幽旨深讀者非師傳不能析其辭非博學不能綜其理豈直才懸抑亦字隱自晉來用字率從簡易時並習易人誰取難今一字詭異則群句震驚三人弗識則將成字妖矣後世所同曉者雖難斯易時所共廢雖易斯難趣舍之間不可不察夫爾雅者孔徒之所纂而詩書之襟帶也蒼頡者李斯之所輯而鳥籀之遺體也雅以淵源詁訓頡以苑囿奇文異體相資如左右肩股該舊而知新亦可以屬文若夫義訓古今興廢殊用字形單復妍蚩異體心既託聲於言言亦寄形於字諷誦則績在宮商臨文則能歸字形矣是以綴字屬篇必須練擇一避詭異二省聯邊三權重出四調單復詭異者字體瓌怪者也曹攄詩稱豈不願斯遊褊心惡㕳呶兩字詭異大疵美篇況乃過此其可觀乎聯邊者半字同文者也狀貌山川古今咸用施於常文則鉏鋙為瑕如不獲免可至三接三接之外其字林乎重出者同字相犯者也詩騷適會而近世忌同若兩字俱要則寧在相犯故善為文者富於萬篇貧於一字一字非少相避為難也單復者字形肥瘠者也瘠字纍句則纖疏而行劣肥字積文則黯黕而篇暗善酌字者參伍單復磊落如珠矣凡此四條雖文不必有而體例不無若值而莫悟則非精解至於經典隱曖方冊紛綸簡蠹帛裂三寫易字或以音訛或以文變子思弟子於穆不似音訛之異也晉之史記三豕渡河文變之謬也尚書大傳有別風淮雨帝王世紀云列風淫雨別列淮淫字似潛移淫列義當而不奇淮別理乖而新異傅毅制誄已用淮雨元長作序亦用別風固知愛奇之心古今一也史之闕文聖人所慎若依義棄奇則可與正文字矣贊曰篆隸相鎔蒼雅品訓古今殊跡妍蚩異分字靡異流文阻難運聲畫昭精墨采騰奮隱秀第四十夫心術之動遠矣文情之變深矣源奧而派生根盛而穎峻是以文之英蕤有秀有隱隱也者文外之重旨者也秀也者篇中之獨拔者也隱以復意為工秀以卓絶為巧斯乃舊章之懿績才情之嘉會也夫隱之為體義生文外祕響傍通伏采潛發譬爻象之變互體川瀆之韞珠玉也故互體變爻而成化四象珠玉潛水而瀾表方圓涼風動秋草邊馬有歸心氣寒而事傷此羈旅之怨曲也凡文集勝篇不盈十一篇章秀句裁可百二並思合而自逢非研慮之所課也或有晦塞為深雖奧非隱雕削取巧雖美非秀矣故自然會妙譬卉木之耀英華潤色取美譬繒帛之染朱緑朱緑染繒深而繁鮮英華曜樹淺而煒燁秀句所以照文苑蓋以此也贊曰深文隱蔚餘味曲包辭生互體有似變爻言之秀矣萬慮一交動心驚耳逸響笙匏
