front:
  text: 文心雕龍卷之八
  hash: sha256:3ffe9e6f27f9a385b08511cbb02a12b445f933c84572e71cab1cf7868a0deab7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0001_SBCK_008-1a}
body:
  text: 梁通事舍人東莞劉勰撰比興第三十六詩文弘奥包韞六義毛公述傳獨標興體豈不以風通而賦同比顯而興隱哉故比者附也興者起也附理者切類以指事起情者依微以擬議起情故興體以立附理故比例以生比則畜憤以斥言興則環譬以寄諷蓋隨時之義不一故詩人之志有二也觀夫興之託諭婉而成章稱名也小取類也大關雎有别故后妃方德尸鳩貞一故夫人象義義取其貞無從於夷禽德貴其别不嫌於鷙鳥明而未融故發注而後見也且何謂爲比蓋寫物以附意颺言以切事者也故金錫以喻明德珪璋以譬秀民螟蛉以類教誨蜩螗以寫號呼澣衣以擬心憂卷席以方志固凡斯切象皆比義也至如麻衣如雪兩驂如舞若斯之類皆比類者也襄楚信䜛而三閭忠烈依詩製騷諷兼比興炎漢雖盛而辭人夸毗詩刺道䘮故興義銷亡於是賦頌先鳴故比體雲構紛紜雜遝信舊章矣夫比之爲義取類不常或喻於聲或方於貌或擬於心或譬於事宋玉高唐云纎條悲鳴聲似竽籟此比聲之類也枚乘兎園云焱焱紛紛若塵埃之間白雲此則比貌之類也賈生鵩賦云禍之與福何異糺纒此以物比理者也王褒洞簫云優柔温潤如慈父之愛子也此以聲比心者也馬融賦云繁縟絡繹范蔡說之此以響比辯者也張衡南都云起鄭舞璽抽緒此以容比物者也若斯之類辭賦所先日用乎比月忘乎興習小而棄大所以文謝於周人也至於楊班之倫曹劉以下圖狀山川影寫雲物莫不纎綜比義以敷其華驚聽回視資此效績又安仁螢賦云流金在沙季鷹雜詩云青條若總翠皆其義者也故比類雖繁以切至爲貴若刻鶴類鶩則無所取焉贊曰詩人比興觸物圓覽物雖胡越合則肝膽擬容取心斷辭必敢攅雜詠歌如川之渙夸飾第三十七夫形而上者謂之道形而下者謂之噐神道難摹精言不能追其極形噐易寫壯辭可得喻其眞才非短長理自難易耳故自天地以降豫入聲貌文辭所被夸飾恒存雖詩書雅言風格訓世事必宜廣文亦過焉是以言峻則嵩高極天論狹則河不容舠說多則子孫千億稱少則民靡孑遺襄陵舉滔天之目倒戈立漂杵之論辭雖巳甚其義無害也且夫鴞音之醜豈有泮林而變好荼味之苦寜以周原而成飴並意深褒讚故義成矯飾大聖所錄以垂憲章孟軻所說詩者不以文害辭不以辭害意也自宋玉景差夸飾始盛相如慿風詭濫愈甚故上林之舘奔星與宛虹入軒從禽之盛飛廉與鷦鷯俱獲及揚雄甘泉酌其餘波語瓌奇則假珍於玉樹言峻極則顚墜於鬼神至東都之比目西京之海若驗理則理無不驗窮飾則飾猶未窮矣又子雲校獵鞭宓妃以饟屈原張衡羽獵困玄㝠於朔野欒彼洛神旣非魑魅惟此水怪亦非魑魅而虚用濫形不其疎乎此欲夸其威而其事義睽刺也至如氣貎山海體勢宫殿嵯峨掲業熠燿焜煌之狀光采煒煒而欲然聲貌岌岌其將動矣莫不因夸以成狀㳂飾而得奇也於是後進之才奬氣挾聲軒翥而欲奮飛騰躑而羞跼歩辭入煒燁春藻不能程其豔言在萎絶寒谷未足成其凋談歡則字與笑並論慼則聲共泣偕信可以發藴而飛滯披瞽而駭聾矣然飾窮其要則心聲鋒起夸過其理則名實兩乖若能酌詩書之曠㫖剪揚馬之甚泰使夸而有節飾而不誣亦可謂之懿也贊曰夸飾在用文豈循檢言必鵬運氣靡鴻漸倒海探珠傾崑取琰曠而不溢奢而無玷事類第三十八事類者蓋文章之外据事以類義援古以證今者也昔文王繇易剖判爻位旣濟九三遠引高宗之伐明夷六五近書箕子之貞斯略舉人事以徵義者也至若㣧征羲和陳正典之訓盤庚誥民叙遲任之言此全引成辭以明理者也然則明理引乎成辭徵義舉乎人事廼聖賢之鴻謨經藉之通矩也大畜之象君子以多識前言徃行亦有包於文矣觀夫屈宋屬篇號依詩人雖引古事而莫取舊辭唯賈誼鵩賦始用鶡冠之說相如上林撮引李斯之書此萬分之一㑹也及揚雄六官箴頗酌於詩書劉歆遂初賦歷叙於紀傳漸漸綜採矣至於崔班張蔡遂捃摭經史華實布䕶因書立功皆後人之範式也夫薑桂同地辛在夲性文章由學能在天資才自内發學以外成有飽學而才餒者有才富而學貧者學貧者迍邅於事義才餒者劬勞於辭情此内外之殊分也是以屬意立文心與筆謀才爲盟主學爲輔佐主佐合德文采必覇才學𥚹狹雖美少功夫以子雲之才而自奏不學及觀書石室乃成鴻采表裏相資古今一也故魏武稱張子之文爲拙然學問膚淺所見不博專拾掇崔杜小文所作不可悉難難便不知所出斯則寡聞之病也夫經典沈深載籍浩汗實羣言之奥區而才思之神臯也揚班以下莫不取資任力耕耨縱意漁獵操刀能割必裂膏腴是以將贍才力務在博見狐腋非一皮能温鷄蹠必數千而飽矣是以綜學在博取事貴約校練務精捃理須覈衆美輻湊表裏發輝劉邵趙都賦客云公子之客叱勁楚令㰱盟管庫隷臣呵强秦使鼓缶用事如斯可謂理得而義要矣故事得其要雖小成績譬寸轄制輪尺樞運關也或微言美事置於閒是綴金翠於足脛靚粉黛於胷臆也凡用舊合機不啻自其口出引事乖謬雖千載而爲瑕陳思羣才之英也報孔璋書云葛天氏之樂千人唱萬人和聽者因以篾韶夏矣此引事之實謬也按葛天之歌唱和三人而巳相如上林云奏陶唐之舞聽葛天之歌千人唱萬人和唱和千萬人乃相如接人然而濫侈葛天推三成萬者信賦妄書致斯謬也陸機園葵詩云庇足同一智生理合異端夫葵能衞足事譏鮑莊葛藟庇根辭自樂豫若譬葛爲葵則引事爲謬若謂庇勝衞則改事失眞斯又不精之患夫以子建明練士衡沈宻而不免於謬曹仁之謬高唐又曷足以嘲哉夫山木爲良匠所度經書爲文士所擇木美而定於斧斤事美而制於刀筆研思之士無慙匠石矣贊曰經籍深富辭理遐亘皜如江海鬰若崑鄧文梓共採瓊珠交贈用人若巳古來無懵練字第三十九夫文象列而結繩移鳥跡明而書契作斯乃言語之體貌而文章之宅宇也蒼頡造之鬼哭粟飛黃帝用之官治民察先王聲教書必同文輶軒之使紀言殊俗所以一字體總異音周禮保章氏掌教六書秦㓕舊章以吏爲師及李斯刪籀而秦篆興程邈造隷而古文廢漢初章律明著厥法太史學童教試六體又吏民上書字謬輙劾是以馬字缺畫而石建懼死雖云性愼亦時重文也至孝武之世則相如譔篇及宣成二帝徵集小學張敞以正讀傳業揚雄以奇字纂訓並貫練雅頌總閱音義鳴筆之徒莫不洞曉且多賦京苑假借形聲是以前漢小學率多瑋字非獨制異乃共曉難也曁乎後漢小學轉疎複文隱訓臧否太半及魏代綴藻則字有常檢追觀漢作翻成阻奥故陳思稱楊馬之作趣幽㫖深讀者非師傳不能析其辭非博學不能綜其理豈直才懸抑亦字隱自晉來用字率從簡易時並習易人誰取難今一字詭異則羣句震驚三人弗識則將成字妖矣後世所同曉者雖難斯易時所共廢雖易斯難趣舍之間不可不察夫爾雅者孔徒之所慕而詩書之襟帶也蒼頡者李斯之所輯而鳥籀之遺體也雅以淵源誥訓頡以苑囿奇文異體相資如左右肩股該舊而知新亦可以屬文若夫義訓古今興廢殊用字形單複妍蚩異體心旣託聲於言言亦寄形於字諷誦則續在宫商臨文則能歸字形矣是以綴字屬篇必須練擇一避詭異二省聯邉三權重幽四調單複詭異者字體瓌怪者也曹攄詩稱豈不願斯遊𥚹心惡㕳呶兩字詭異大疪美篇况乃過此其可觀乎聯邊者半字同文者也狀貌山川古今咸用施於常文則鉏銛爲瑕如不獲免可至三接三接之外其字林乎重出者同字相犯者也詩驗適㑹而近世忌同若兩字俱要則寜在相犯故善爲文者富於萬篇貧於一字一字非少相避爲難也單複者字形肥瘠者也瘠字累句則纎疎而行劣肥字積文則黯默而篇闇善酌字者叄伍單複磊落如珠矣凡此四條雖文不必有而體例不無若值而莫悟則非精解至於經典隱曖方冊紛綸簡蠧帛裂三寫易字或以音訛或以文變子思弟子於穆不祀者音訛之異也晉之史記三豕渡河文變之謬也尚書大傳有别風淮雨帝王世紀云列風滛雨别列淮滛字似濳移滛列義當而不奇淮别理乖而新異傳毅制誄巳用淮雨固知愛奇之心古今一也史之闕文聖人所愼若依義棄奇則可與正文字矣贊曰篆隷相鎔蒼雅品訓古今殊跡妍蚩異分字靡異流文阻難運聲畫昭精墨采騰奮隱秀第四十夫心術之動遠矣文情之變深矣源奥而派生根盛而頴峻是以文之英㽔有秀有隱隱也者文外之重㫖者也秀也者篇中之獨㧞者也隱以複意爲工秀以卓絶爲巧斯乃舊章之懿績才情之嘉㑹也夫隱之爲體義生文外祕響傍通伏采濳發譬爻象之變玄體川瀆之韞珠玉也故玄體變爻而成化四象珠玉濳水而瀾表方圓凉風動秋草邉馬有歸心氣寒而事傷此覉旅之怨曲也凡文集勝篇不盈十一篇章秀句裁可百二並思合而自逢非研慮之所果也或有雕削取巧雖美非秀矣故自然㑹妙譬卉木之耀英華潤色取美譬繒帛之染朱綠朱綠染繒深而繁鮮英華曜樹淺而煒燁秀句所以照文苑蓋以此也贊曰深文隱蔚餘味曲包辭生互體有似變爻言之秀矣萬慮一交動心驚耳逸響笙匏山人蔡懋孝校文心雕龍卷之八
