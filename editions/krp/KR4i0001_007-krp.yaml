front:
  text: 文心雕龍卷之七
  hash: sha256:6d30f9cd9d526059651d05650b088049a40ca64d6470ba635a2defc2037e804c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0001_SBCK_007-1a}
body:
  text: 梁通事舍人東莞劉勰撰情采第三十一聖賢書辭總稱文章非采而何夫水性虚而淪漪結木體實而華蕚振文附質也虎豹無文則鞹同犬羊犀兕有皮而色資丹􅃮質待文也若乃綜述性靈敷寫噐象鏤心鳥跡之中織辭魚網之上其爲彪炳縟彩名矣故立文之道其理有三一曰形文五色是也二曰聲文五音是也三曰情文五性是也五色雜而成黼黻五音比而成韶夏五情發而爲辭章神理之數也孝經垂典喪言不文故知君子甞言未嘗質也老子疾僞故稱美言不信而五千精妙則非棄美矣莊周云辯雕萬物謂藻飾也韓非云豔采辯說謂綺麗也綺麗以豔說藻飾以辯雕文辭之變於斯極矣研味孝老則知文質附乎性情詳覽莊韓則見華實過乎滛侈若擇源於涇渭之流按轡於邪正之路亦可以馭文采矣夫鈆黛所以飾容而盻倩生於淑姿文采所以飾言而辯麗本於情性故情者文之經辭者理之緯經正而後緯成理定而後辭暢此立文之本源也昔詩人什篇爲情而造文辭人賦頌爲文而造情何以明其然蓋風雅之興志思蓄憤而吟詠情性以諷其上此爲情而造文也諸子之徒心非鬱陶苟馳夸飾鬻聲釣世此爲文而造情也故爲情者要約而寫眞爲文者滛麗而煩濫而後之作者採濫忽眞遠棄風雅近師辭賦故體情之製日疎逐文之篇愈盛故有志深軒冕而汎詠臯壤心纏幾務而虚述人外眞宰弗存翩其反矣夫桃李不言而成蹊有實存也男子樹蘭而不芳無其情也夫以草木之微依情待實况乎文章述志爲本言與志反文豈足徵是以聯辭結采將欲明理采濫辭詭則心理愈翳固知翠綸桂餌反所以失魚言隱榮華殆謂此也是以衣錦褧衣惡文太章賁象窮白貴乎反本夫能設謨以位理擬地以置心心定而後結音理正而後摛藻使文不滅質博不溺心正采耀乎朱藍間色屏於紅紫乃可謂雕琢其章彬彬君子矣贊曰言以文遠誠哉斯驗心術旣形英華乃贍吳錦好渝蕣英徒豔繁彩寡情味之必厭鎔裁第三十二情理設位文采行乎其中剛柔以立本變通以趨時立本有體意或偏長趨時無方辭或繁雜蹊要所司職在鎔裁櫽括情理矯揉文采也規範本體謂之鎔剪截浮詞謂之裁裁則蕪穢不生鎔則綱領昭暢譬繩墨之審分斧斤之斵削矣駢拇枝指由侈於性附贅懸肬實侈於形二意兩出義之駢枝也同辭重句文之肬贅也凡思緒𥘉發辭采苦雜心非權衡勢必輕重是以草創鳴筆先標三凖履端於始則設情以位體舉正於中則酌事以取類歸餘於終則撮辭以舉要然後舒華布實獻贊節文繩墨以外美材旣斵故能首尾圓合條貫始序若術不素定而委心逐辭異端藂至駢贅必多故三凖旣定次討定句句有可削足見其疎字不得减乃知其宻精論要語極略之體遊心竄句極繁之體謂繁與略適分所好引而伸之則兩句敷爲一章約以貫之則一章刪成兩句思贍者善敷才覈者善刪善刪者字去而意留善敷者辭殊而義顯字刪而意闕則短乏而非覈辭敷而言重則蕪穢而非贍昔謝艾王濟西河文士張俊以爲艾繁而不可刪濟略而不可益若二子者可謂練鎔裁而曉繁略矣至如士衡才優而綴辭尤繁士龍思劣而雅好清省及雲之論機亟恨其多而稱淸新相接不以爲病蓋崇友干耳夫美錦製衣脩短有度雖翫其采不倍領䄂巧猶難繁况在乎拙而文賦以爲榛楉勿剪庸音足曲其識非不鑒乃情苦吝繁也夫百節成體共資榮衛萬趣㑹文不離辭情若情周而不繁辭運而不濫非夫鎔裁何以行之乎贊曰篇章戸牖左右相瞰辭如川流溢則泛濫權衡損益斟酌濃淡芟繁剪穢㢮於負擔聲律第三十三夫音律所始本於人聲者也聲含宫啇肇自而氣先王因之以制樂歌故知噐寫人聲聲非學噐者也故言語者文章神明樞機吐納律吕脣吻而巳古之教歌先揆以法使疾呼中宫徐呼中徵夫商徵響高宫羽聲下抗喉矯舌之差攅脣激齒之異廉肉相凖皎然可分今操琴不調必知改張摘文乖張而不識所調響在被絃乃得克諧聲萌我心更失和律其故何哉良由外聽難爲聰也故外聽之易絃以手定内聽之難聲與心紛可以數求難以辭逐凡聲有飛沉響有動静䨇聲隔字而毎舛疊韻雜句而必睽沉則響發而斷飛則聲颺不還並轆轤交徃逆鱗相比迃其際㑹則徃蹇來連其爲疾病亦文家之吃也夫吃文爲患生於好詭逐新趣異故喉脣糺紛將欲解結務在剛斷左礙而㝷右末滯而討前則聲轉於吻玲玲如振玉辭靡於耳纍纍如貫珠矣是以聲畫妍蚩寄在吟詠吟詠滋味流於下句氣力窮於和韻異音相從謂之和同聲相應謂之韻韻氣一定故餘聲易遣和體抑揚故遺響難契屬筆易巧選和至難綴文難精而作韻甚易雖纎意曲變非可縷言然振其大綱不出兹論若夫宫商大和譬諸吹籥翻㢠取均頗似調瑟瑟資移柱故有時而乖貳籥含定管故無徃而不壹陳思潘岳吹籥之調也陸機左思瑟柱之和也槩舉而推可以類見又詩人綜韻率多清切楚辭辭楚故訛韻寔繁及張華論韻謂士衡多楚文賦亦稱知楚不易可謂衘靈均之聲餘失黃鐘之正響也凡切韻之動勢若轉圓訛音之作甚於枘方免乎枘方則無大過矣練才洞鑒剖字鑽響疎識濶略隨音所遇若長風之過籟東郭之吹竽耳古之佩玉左宫右徵以節其歩聲不失序音以律文其可忘哉贊曰摽清務遠比音則近吹律胸臆調鐘脣吻聲得鹽梅響滑榆槿割棄支離宫商難隱章句第三十四夫設情有宅置言有位宅情曰章位言曰句故章者明也何者局也局言者聯字以分疆明情者總義以包體區畛相異而衢路交通矣夫人之立言因字而生句積句而爲章積章而成篇篇之彪炳章無疵也章之明靡句無玷也句之淸英字不妄也振本而末從知一而萬畢矣夫裁文匠筆篇有小大離章合句調有緩急隨變適㑹莫見定凖句司數字待相接以爲用章總一義須意窮而成體其控引情理送迎際㑹譬舞容廻環而有綴兆之位歌聲靡曼而有抗墜之節也㝷詩人擬喻雖斷章取義然章句在篇如蠒之抽緒原始要終體必鱗次啓行之辭逆萌中篇之意絶筆之言追勝前句之㫖故能外文綺交内義脉注跗蕚相衘首尾一體若辭失其明則覉旅而無友事乖其次則飄寓而不安是以捜句忌於顚倒裁章貴於順序斯固情趣之指歸文筆之同致也若夫筆句無常而字有條數四字宻而不促六字格而非緩或變之以三五蓋應機之權節也至於詩頌大體以四言爲正唯析父肇禋以二言爲句㝷二言肇於黃世竹彈之謡是也三言興於虞時元首之詩是也四言廣於夏年洛汭之歌是也五言見於周代行露之章是也六言七言雜出詩騷而體之篇成於兩漢情數運周隨時代用矣若乃改韻從調所以節文辭氣賈誼枚乘兩韻輙易劉歆桓譚百句不遷亦各有其志也昔魏武論賦嫌於積韻而善於資代陸雲亦稱四言轉句以四句爲佳觀彼制韻志同枚賈然兩韻輙易則聲韻微躁百句不遷則脣吻告勞妙才激揚雖觸思利貞曷若折之中和庻保無咎又詩人以兮字入於句限楚辭用之字出於句外㝷兮字承句乃語助餘聲舜詠南風用之久矣而魏武弗好豈不以無益文義耶至於夫惟蓋故者發端之首唱之而於以者乃劄句之舊體乎哉矣也亦送末之常科據事似閒在用實切巧者廻運彌縫文體將令數句之外得一字之助矣外字難謬况章句歟贊曰斷章有檢積句不恒理資配主辭忌告朋環情草調宛轉相騰離同合異以盡厥能麗辭第三十五造化賦形支體必䨇神理爲用事不孤立夫心生文辭運裁百慮高下相須自然成對唐虞之世辭未極文而臯陶贊文罪疑惟輕功疑惟重益陳謨云滿招損謙受益豈營麗辭率然對耳易之文繫聖人之妙思也序乾四德則八句相衘龍虎類感則字字相儷乾坤易簡則宛轉相承日月徃來則隔行懸合雖句字或殊而偶意一也至於詩人偶章大夫聯辭奇偶適變不勞經營自揚馬張蔡崇盛麗辭如宋畫呉冶刻形鏤法麗句與深采並流偶意共逸韻俱發至魏晉羣才析句彌宻聯字合趣割毫析釐然契機者入巧浮假者無功故麗辭之體凡有四對言對爲易事對爲難反對爲優正對爲劣言對者䨇比空辭者也事對者並舉人驗者也反對者理殊趣合者也正對者事異義同者也長卿上林云脩容乎禮園翺翔乎書圃此言對之類也宋玉神女賦云毛嬙鄣𬒮不足程式西施掩靣比之無色此事對之類也仲宣登樓云鐘儀幽而楚奏莊舄顯而越吟此反對之類也孟陽七哀云漢祖想枌榆光武思白水此正對之類也凡偶辭􅎍臆言對所以爲易也微人之學事對所以爲難也幽顯同志反對所以爲優也並貴共心正對所以爲劣也又以事對各有反正指類而求萬條自昭然矣張華詩稱逰鴈比翼翔歸鴻知接翮劉琨詩言宣尼悲獲麟西狩涕孔丘若斯重出卽對句之駢枝也是以言對爲美貴在精巧事對所先務在允當若兩事相配而優劣不均是驥在左驂駑爲右服也若夫事或孤立莫與相偶是䕫之一足踸踔而行也若氣無竒類文乏異采碌碌麗辭則昏睡耳目必使理圓事宻聯璧其章迭用奇偶節以雜佩乃其貴耳類此而思理斯見也贊曰體植必兩辭動有配左提右挈精未兼載炳爍聯華鏡静含態玉潤䨇流如彼珩佩郷貢士楊繼美校文心雕龍卷之七
