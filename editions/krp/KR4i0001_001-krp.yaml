front:
  text: 文心雕龍卷之一
  hash: sha256:fba0753a6664bbf39b230a22a2fbdcc2c628fd1fbd6fa346bae907651a26e64b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0001_SBCK_001-1a}
body:
  text: 梁通事舍人東莞劉勰撰原道第一文之爲德也大矣與天地並生者何哉夫玄黄色雜方圓體分日月疊璧以垂麗天之象山川煥綺以鋪理地之形此盖道之文也仰觀吐曜俯察含章高卑定位故兩儀旣生矣惟人參之性靈所鍾是謂三才爲五行之秀人實天地之心生心生而言立言立而文明自然之道也傍及萬品動植皆文龍鳯以藻繪呈瑞虎豹以炳蔚凝姿雲霞雕色有踰畫工之妙草木賁華無待錦匠之奇夫豈外飾盖自然耳至於林籟結響調如竽瑟泉石激韻和若球鍠故形立則章成矣聲發則文生矣夫以無識之物鬱然有彩有心之噐其無文歟人文之元肇自太極幽讚神明易象惟先庖犧畫其始仲尼翼其終而乾坤兩位獨制文言言之文也天地之心哉若廼河圖孕乎八卦洛書韞乎九疇玉版金鏤之實丹文綠牒之華誰其尸之亦神理而巳自鳥迹代繩文字始炳炎皥遺事紀在三墳而年世渺邈聲采靡追唐虞文章則煥乎始盛元首載歌旣發吟詠之志益稷陳謀亦垂敷奏之風夏后氏興業峻鴻績九序惟歌勲德彌縟逮及啇周文勝其質雅頌所被英華日新文王患憂繇辭炳曜符采複隱精義堅深重以公旦多材褥其徽烈剬詩緝頌斧藻羣言至夫子繼聖獨秀前哲鎔鈞六經必金聲而玉振雕琢情性組織辭令木鐸啓而千里應席珍流而萬世響寫天地之輝光曉生民之耳目矣爰自風姓曁于孔氏玄聖創典素王述訓莫不原道心裁文章研神理而設教取象乎河洛問數乎蓍龜觀天文以極變察人文以成化然後能經緯區宇彌綸彛憲發輝事業彪炳辭義故知道㳂聖以垂文聖因文而明道旁通而無涯日用而不匱易曰鼓天下之動存乎辭辭之所以能鼓天下者廼道之文也贊曰道心惟微神理設教光采玄聖炳耀仁孝龍圖獻體龜書呈貌天文斯觀民胥以傚徵聖第二夫作者曰聖述者曰明陶鑄性情功在上哲夫子文章可得而聞則聖人之情見乎文辭矣先王聖化布在方冊夫子風采溢于格言是以逺稱唐世則煥乎爲盛近褒周代則郁哉可從此政化貴文之徵也鄭伯入陳以立辭爲功宋置折爼以多方舉禮此事蹟貴文之徵也褒美子產則云言以足志文以足言泛論君子則云情欲信辭欲巧此修身貴文之徵也然則忠足而言文情信而辭巧廼含章之玉牒秉文之金科矣夫鑒周日月妙極機神文成規矩思合符契或簡言以逹㫖或博文以該情或明理以立體或隱義以藏用故春秋一字以褒貶喪服舉輕以包重此簡言以逹㫖也邠詩聯章以積句儒行縟說以繁辭此博文以該情也書契斷决以象夬文章昭晰以象離此明理以立體也四象精義以曲隱五例微辭以婉晦此隱義以藏用也故知繁略殊形隱顯異術抑引隨時變通㑹適徵之孔周則文有師矣是以政論文必徵於聖必宗於經易稱辨物正言斷辭則備書云辭尚體要弗惟好異故知正言所以立辨體要所以成辭辭成無好異之尤辨立有斷辭之義雖精義曲隱無傷其正言微辭婉晦不害其體要體要與㣲辭偕通正言共精義並用聖人之文章亦可見也顏闔以爲仲尼飾羽而畫徒事華辭雖欲此言聖弗可得巳然則聖文之雅麗固衘華而佩實者也天道難聞猶或鑽仰文章可見胡寜勿思若徵聖立言則文其庶矣贊曰妙極生知􅐶哲惟宰精理爲文秀氣成采鑒懸日月辭富山海百齡影徂千載心在宗經第三三極彜訓其書言經經也者恒久之至道不刋之鴻教也故象天地效鬼神參物序制人紀洞性靈之奥區極文章之骨髓者也皇世三墳帝代五典重以八索申以九丘歲歷綿曖條流紛糅自夫子刋述而大寳咸耀於是易張十翼書標七觀詩列四始禮正五經春秋五例義旣極乎性情辭亦匠於文理故能開學養正昭明有融然而道心惟微聖謀卓絶墻宇重峻而吐納自深譬萬鈞之洪鍾無錚錚之細響矣易惟談天人神致用故繫稱㫖遠辭高言中事隱韋編三絶固哲人之驪淵也書實記言而詁訓茫昧通乎爾雅則文意曉然故子夏歎書昭昭若日月之明離離如星辰之行言昭灼也詩主言志詁訓同書摛風裁興藻辭譎喩溫柔在誦敢最附深衷矣禮記立體據事剬範章條纎曲一字見義五石六鷁以詳略成文雉門兩觀以先後顯㫖其婉章志晦諒以邃矣尚書則覽文如詭而㝷理卽暢春秋則觀辭立曉而訪義方隱此聖人之殊致表裏之異體者也至根柢槃深枝葉峻茂辭約而㫖豐事近而喻逺是以徃者雖舊餘味日新後進追取而非曉前脩文用而未先可謂太山徧雨河潤千里者也故論說辭序則易統其首詔策章奏則書發其源賦頌謌讚則詩立其本銘誄箴祝則禮總其端紀傳銘檄則春秋爲根並窮高以樹表極遠以啓疆所以百家騰躍終入環内者也若禀經以製式酌雅以富言是仰山而鑄銅煑海而爲鹽也故文能宗經體有六義一則情深而不詭工則風淸而不雜三則事信而不誕四則義直而不囘五則體約而不蕪六則文麗而不滛楊子比雕玉以作噐謂五經之含文也夫文以行立行以文傳四教所先符采相濟勵德樹聲莫不師聖而建言脩辭鮮克宗經是以楚艶漢侈流弊不還正末歸本不其懿歟贊曰三極彛道訓深稽古致化歸一分教斯五性靈鎔匠文章奥府淵哉鑠乎羣言之祖正緯第四夫神道闡幽天命㣲顯馬龍出而大易興神龜見而洪範燿故繫辭稱河出圖洛出書聖人則之斯之謂也但世夐文隱好生矯誕眞雖存矣僞亦憑焉夫六經彪炳而緯候稠疊孝論昭哲而鉤䜟葳㽔按經驗緯其僞有四蓋緯之成經其猶織綜絲麻不雜布帛乃成今經正緯竒倍擿千里其僞一矣經顯聖訓也緯隱神教也聖訓宜廣神教宜約而今緯多於經神理更繁其僞二矣有命自天廼稱符䜟而八十一篇皆託於孔子則是堯造綠圖昌制丹書其僞三矣啇周以前圖錄頻見春秋之末羣經方備先緯後經體乖織綜其僞四矣僞旣倍摘則義異自明經足訓矣緯何豫焉原夫圖錄之見廼昊天休命事以瑞聖義非配經故河不出圖夫子有歎如或可造無勞喟然昔康王河圖陳於東序故知前世符命歷代寳傳仲尼所撰序錄而巳於是伎數之士附以詭術或說隂陽或序災異若鳥鳴似語䖝葉成字篇條滋蔓必假孔氏通儒討覈謂起哀平東序祕寳朱紫亂矣至於光武之世篤信斯術風化所靡學者比肩沛獻集緯以通經曹褒撰䜟以定禮乖道謬典亦已甚矣是以桓譚疾其虚僞尹敏戯其深瑕張衡發其僻謬荀恱明其詭誕四賢博練論之精矣若乃羲農軒皥之源山瀆鍾律之要白魚赤烏之符黃金紫玉之理事豐竒偉辭富膏腴無益經典而有助文章是以後來辭人援摭英華平子恐其迷學奏令禁絶仲豫惜其雜眞未許煨燔前代配經故詳論焉贊曰榮河溫洛是孕圖緯神寳藏用理隱文貴世歷二漢朱紫騰沸芟夷譎詭糅其雕蔚辯騷第五自風雅寢聲莫或抽緒竒文鬱起其離騷哉固巳軒翥詩人之後奮飛辭家之前豈去聖之未逺而楚人之多才乎昔漢武愛騷而淮南作傳以爲國風好色而不滛小雅怨謗而不亂若離騷者可謂兼之蟬蛻穢濁之中浮游塵埃之外㬭然涅而不緇雖與日月爭光可也班固以爲露才揚已忿懟沉江羿澆二姚與左氏不合崑崙懸圃非經義所載然其文辭麗雅爲詞賦之宗雖非明哲可謂妙才王逸以爲詩人提耳屈原婉順離騷之文依經立義駟虬乘翳則時乘六龍崑崙流沙則禹貢敷土名儒辭賦莫不擬其儀表所謂金相玉質百世無匹者也及漢宣嗟歎以爲皆合經術揚雄諷味亦言體同詩雅四家舉以方經而孟堅謂不合傳襃貶任聲抑揚過實可謂鑒而弗精翫而未覈者也將覈其論必徵言焉故其陳堯舜之耿介稱湯武之祗敬典誥之體也譏桀紂之猖披傷羿澆之顚隕規諷之㫖也虬龍以喻君子雲蜺以譬䜛邪比興之義也毎一顧而淹涕歎君門之九重忠怨之辭也觀兹四事同于風雅者也至於託雲龍說迂怪豐隆求宓妃鴆鳥媒娥女詭異之辭也康回傾地夷羿蔽日木天九首土伯三足譎怪之談也依彭咸之遺則從子胥以自適狷狹之志也士女雜座亂而不分指以爲樂娛酒不廢沉湎日夜舉以爲懽荒滛之意也摘此四事異乎經典者也故論其典誥則如彼語其本誕則如此固知楚辭者體憲於三代而風雅於戰國乃雅頌之博徒而詞賦之英傑也觀其骨鯁所樹肌膚所附雖取鎔經意亦自鑄偉辭故騷經九章朗麗以哀志九歌九辯綺靡以傷情逺遊天問瓌詭而惠巧招䰟招隱耀艶而深華卜居摽放言之致漁父寄獨徃之才故能氣性轢古辭來切今驚采絶艶難與並能矣自九懷以下遽躡其跡而屈宋逸歩莫之能追故其叙情怨則鬱伊而易感述離居則愴怏而難懷論山水則循聲而得貌言節候則披文而見時是以枚賈追風以入麗馬揚㳂波而得竒其衣被詞人非一代也故才高者菀其鴻裁中巧者獵其艶辭吟諷者衘其山川童蒙者拾其香草若能憑軾以倚雅頌懸轡以馭楚篇酌竒而不失其眞翫華而不墜其實則顧盻可以驅辭力欬唾可以窮文致亦不復乞靈於長卿假寵於子淵矣贊曰不有屈原豈見離騷驚才風逸壯志煙高山川無極情理實勞金相玉式絶益稱豪山人陸瑞家校文心雕龍卷之一
