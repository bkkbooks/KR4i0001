  - {type: variant, offset: 0, length: 3990, content: 文心雕龍卷之九梁通事舍人東莞劉勰撰指瑕第四十一管仲有言無翼而飛者聲也無根而固者情也然則聲不假翼其飛甚易情不待根其固匪難以之垂文可不愼歟古來文才異世爭驅或逸才以爽迅或精思以纎宻而慮動難圓鮮無瑕病陳思之文羣才之峻也而武帝誄云尊靈永蟄明帝頌云聖體浮輕浮輕有似於蝴蝶永蟄頗疑於昆蟲施之尊極豈其當乎左思七諷說孝而不從反道若斯餘不足觀矣潘岳爲才善於哀文然悲内兄則云感口澤傷弱子則云心如疑禮文在尊極而施之下流辭雖足哀義斯替矣若夫君子擬人必於其倫而崔瑗之誄李公比行於黃虞向秀之賦稽生方罪於李斯與其失也雖寜降無濫然高原之詩不類甚矣凡巧言易摽拙辭難隱斯言之玷實深白圭繁例難載故略舉四條若夫立文之道惟字與義字以訓正義以理宣而晉末篇章依俙其㫖始有賞際奇至之言終無撫叩酬卽之語毎單舉一字指以爲情夫賞訓錫賚豈關心解撫訓執握何預情理雅頌未聞漢魏莫用懸領似如可辯課文了不成義斯實情訛之所變文澆之致弊而宋來才英未之或改舊染成俗非一朝也近代辭人率多猜忌至乃比語求蚩反音取瑕雖不屑於古而有擇於今焉又製同他文理宜刪革若排人美辭以爲巳力寳玉大弓終非其有全寫則掲篋傍採則探囊然世遠者太輕時同者爲尤矣若夫注解爲書所以明正事理然謬於研求或率意而斷西京賦稱中黃育獲之疇而薛綜謬注謂之閹尹是不聞執雕虎之人也又周禮井賦舊有疋馬而應劭釋疋或量首數蹄斯豈辯物之要哉原夫古之正名車兩而馬疋疋兩稱目以並耦爲用蓋車貳佐乘馬儷驂服服乘不隻故名號必雙名號一正則雖單爲疋矣疋夫疋婦亦配義也夫車馬小義而歷代莫悟辭賦近事而千里致差况鑽灼經典能不謬哉夫辯言而數筌蹄選勇而駈閹尹失理太甚故舉以爲戒丹青初炳而後渝文章歲久而彌光若能櫽括於一朝可以無慙於千載也贊曰羿氏舛射東野敗駕雖有雋才謬則多謝斯言一玷千載弗化令章靡疚亦善之亞養氣第四十二昔王充著述制養氣之篇驗巳而作豈虚造哉夫耳目鼻口生之役也心慮言辭神之用也率志委和則理融而情暢鑚礪過分則神疲而氣衰此性情之數也夫三皇辭質心絶於道華帝世始文言貴於敷奏三代春秋雖㳂世彌縟並適分胸臆非牽課才外也戰代枝詐攻奇飾說漢世迄今辭務日新爭光鬻采慮亦竭矣故淳言以比澆辭文質懸乎千載率志以方竭情勞逸差於萬里古人所以餘裕後進所以莫遑也凡童少鑒淺而志盛長艾識堅而氣衰志盛者思銳以勝勞氣衰者慮宻以傷神斯實中人之常資歲時之大較也若夫噐分有限智用無涯或慙鳬企鶴瀝辭鐫思於是精氣内銷有似尾閭之波神志外傷同乎牛山之木恒惕之盛疾亦可推矣至如仲任置硯以綜述敬通懷筆以專業旣暄之以歲序又煎之以日時是以曹公懼爲文之傷命陸雲歎用思之困神非虚談也夫學業在勤故有錐股自厲志於文也則申寫鬱滯故宜從容率情優柔適㑹若銷鑠精膽蹙迫和氣秉牘以驅齡灑翰以伐性豈聖賢之素心㑹文之直理哉且夫思有利鈍時有通塞沐則心覆且或反常神之方昏再三愈黷是以吐納文藝務在節宣淸和其心調暢其氣煩而卽捨勿使壅滯意得則舒懷以命筆理伏則投筆以卷懷逍遥以針勞談笑以藥勌常弄閒於才鋒賈餘於文勇使刃發如新凑理無滯雖非胎息之萬術斯亦衛氣之一方也贊曰紛哉萬象勞矣千想玄神宜寳素氣資養水停以鑒火靜而朗無櫌文慮鬱此精爽附㑹第四十三何謂附㑹謂總文理綂首尾定與奪合涯際彌綸一篇使雜而不越者也若築室之須基構裁衣之待縫緝矣夫才量學文宜正體製必以情志爲神明事義爲骨髓辭采爲肌膚宫商爲聲氣然後品藻玄黃摛振金玉獻可替否以裁厥中斯綴思之常數也凡大體文章類多枝派整派者依源理枝者循幹是以附辭㑹義務總綱領驅萬塗於同歸貞百慮於一致使衆理雖繁而無倒置之乖羣言雖多而無棼絲之亂扶陽而出條順隂而藏跡首尾周宻表裏一體此附㑹之術也夫畫者謹髪而易貎射者儀毫而失墻銳精細乃必疎體綂故宜詘寸以信尺枉尺以直㝷棄偏善之巧學具美之績此命篇之經略也夫文變無方意見浮雜約則義孤博則辭叛率故多尤需爲事賊且才分不同思緒各異或製首以通尾或片接以寸附然通製者蓋寡接附者甚衆若綂緒失宗辭味必亂義脉不流則偏枯文體夫能懸識湊理然後文節自㑹如膠之粘木豆之合黃矣是以駟牡異力而六轡如琴馭文之法有似於此去留隨心修短在手齊其歩驟總轡而已故善附者異㫖如肝膽拙㑹者同音如胡越改章難於造篇易字艱於代句此已然之驗也昔張湯疑奏而再却虞松草表而屢譴並理事之不明而辭㫖之失調也及兒寛更草鍾㑹易字而漢武歎竒晉景稱善者乃理得而事明心敏而辭當也以此而觀則知附㑹巧拙相去遠哉若夫絶筆斷章譬乘舟之振楫克終底績寄在寫以遠送若首唱榮華而媵句憔悴則遺勢鬱湮餘風不暢此周易所謂臀無膚其行次睢也惟首尾相援則附㑹之體固亦無以加於此矣贊曰篇綂間關情數稠疊原始要終疎條布葉道味相附懸緒自接如樂之和心聲克恊總術第四十四今之常言有文有筆以爲無韻者筆也有韻者文也夫文以足言理兼詩書别目兩名自近代耳顔延年以爲筆之爲體言之文也經典則言而非筆傳記則筆而非言請奪彼矛還攻其盾矣何者易之文言豈非言文若筆不言文不得云經典非筆矣將以立論未見其論立也予以爲發口爲言屬筆曰翰常道曰經述經曰傳經傳之體出言入筆筆爲言使可强可弱分經以典奥爲不利非以言筆爲優劣也昔陸氏文賦號爲曲盡然汎論纎悉而實體未該故知九變之實匪躬知言之選難備矣凡精慮造文各競新麗多欲練辭莫肯研術落落之玉或亂乎石碌碌之石時似乎玉精者要約匱者亦尠博者該贍無者亦繁辯者昭晢淺者亦露奥者複隱詭者亦典或義華而聲悴或理拙而文澤知夫調鐘未易張琴實難伶人告和不必盡窕槬之中動用揮扇何必窮初終之韻魏文比篇章於音樂蓋有徵矣夫不截盤根無以驗利噐不剖文奥無以辯通才才之能通必資暁術自非圓鑒區域大判條例豈能控引淸源制勝文苑哉是以執術馭篇似善奕之窮數無術任心如博塞之邀遇故博塞之文借巧儻來雖前驅有功而後援難繼少旣無以相接多亦不知所刪乃多少之非惑何妍蚩之能制乎若夫善奕之文則術有恒數按部整伍以待情㑹因時順機動不失正數逢其極機入其巧則義味騰躍而生辭氣叢雜而至視之則錦繪聽之則絲簧味之則甘腴佩之則芬芳斷章之功於斯盛矣夫驥足雖駿纆牽忌長以萬分一累且廢千里况文體多術共相彌綸一物携貳莫不解體所以列在一篇備總情變譬三十之輻共成一轂雖未足觀亦鄙夫之見也贊曰文場筆苑有術有門務先大體鑑必窮源乘一總萬舉要治繁思無定契理有恒存時序第四十五時運交移質文代變古今情理如可言乎昔在陶唐德盛化鈞野老吐何力之談郊童含不識之歌有虞繼作政阜民暇薰風詩於元后爛雲歌於列臣盡其美者何乃心樂而聲泰也至大禹敷土九序詠功成湯聖敬猗歟作頌逮姬文之德盛周南勤而不怨太王之化淳邠風樂而不滛幽厲昏而板蕩怒平生微而黍離哀故知歌謡文理與世推移風動於上而波震於下者春秋以後角戰英雄六經泥蟠百家飈駭方是時也韓魏力政燕趙任權五蠧六蝨嚴於秦令唯齊楚兩國頗有文學齊開莊衢之第楚廣蘭臺之宮孟軻賔館荀卿宰邑故稷下扇其淸風蘭陵鬱其茂俗鄒子以談天飛譽騶奭以雕龍馳響屈平聯藻於日月宋玉交彩於風雲觀其豔說則籠罩雅頌故知暐燁之奇意出乎縱橫之詭俗也爰至有漢運接燔書高祖尚武戯儒簡學雖禮律草創詩書未遑然大風鴻鵠之歌亦天縱之英作也施及孝惠迄于文景經術頗興而辭人勿用賈誼抑而鄒枚沉亦可知巳逮孝武崇儒潤色鴻業禮樂爭輝辭藻競騖栢梁展朝讌之詩金堤製恤民之詠徵枚乘以蒲輪申主父以鼎食擢公孫之對䇿歎兒寛之凝奏買臣負薪而衣錦相如滌噐而被繡於是史遷壽王之徒嚴終枚臯之屬應對固無方篇章亦不匱遺風餘采莫與比盛越昭及宣實繼武績馳騁石渠暇豫文㑹集雕篆之軼材發綺轂之高喻於是王襃之倫底祿待詔自元曁成降意圖籍笑玉屑之諫清金馬之路子雲銳思於千首子政讐校於六藝亦巳美矣爰自漢室迄至成哀雖世漸百齡辭人九變而大抵所歸祖述楚辭靈均餘影於是乎在自哀平陵替光武中興深懷圖䜟頗略文華然杜篤獻誄以免刑班彪參表以補令雖非旁求亦不遐棄及明帝疊耀崇愛儒術肄禮璧堂講文虎觀孟堅珥筆于國史賈逵給禮於端頌東平擅其懿文沛王振其通論帝則藩儀輝光相照矣自安和巳下迄至順桓則有班傳三崔王馬張蔡磊落鴻儒才不時乏而文章之選存而不論然中興之後羣才稍改前轍華實所附斟酌經辭蓋歷政講聚故漸靡儒風者也降及靈帝時好辭製造羲皇之書開鴻都之賦而樂松之徒招集淺陋故楊賜號爲驩兠蔡邕比之俳優其餘風遺文蓋篾如也自獻帝播遷文學蓬轉建安之末區宇方輯魏武以相王之尊雅愛詩章文帝以副君之重妙善辭賦陳思以公子之豪下筆琳琅並體貎英逸故俊才雲蒸仲宣委質於漢南孔璋歸命於河北偉長從宦於青土公幹徇質於海隅德璉綜其斐然之思元瑜展其翩翩之樂文蔚休伯之儔子俶德祖之侶傲雅觴豆之前雍容袵席之上灑筆以成酣歌和墨以藉談笑觀其時文雅好慷慨良由世積亂離風衰俗怨並志深而筆長故梗槩而多氣也至明帝纂戎制詩度曲徵篇章之士置崇文之觀何劉羣才迭相照耀少主相仍唯高貴英雅顧盻合章動言成論於時正始餘風篇體輕澹而嵇阮應繆並馳文路矣逮晉宣始基景文克構並跡沉儒雅而務深方術至武帝惟新承平受命而膠序篇章弗簡皇慮降及懷愍綴旒而巳然晉雖不文人才實盛茂先揺筆而散珠太冲動墨而橫錦岳湛曜聯璧之華機雲摽二俊之采應傅三張之徒孫摰成公之屬並結藻清英流韻綺靡前史以爲運渉季世人未盡才誠哉斯談可爲歎息元皇中興披文建學劉刀禮吏而寵榮景純文敏而優擢逮明帝束哲雅好文㑹升儲御極孳孳講藝練情於誥䇿振采於辭賦庾以筆才逾親溫以文思益厚揄揚風流亦彼時之漢武也及成康促齡穆哀短祚簡文勃興淵乎清峻微言精理凾滿玄席澹思醲采時灑文囿至孝武不嗣安㳟已矣其文史則有袁殷之曹孫于之軰雖才或淺深珪璋足用自中朝貴玄江左稱盛因談餘氣流成文體是以世極迍邅而辭意夷泰詩必柱下之㫖歸賦乃漆園之義疏故治文變染乎世情興廢繁乎時序原始以要終雖百世可知也自宋武愛文文帝彬雅秉文之德孝武多才英采雲構自明以下文理替矣爾其縉紳之林霞蔚而飈起王袁聯宗以龍章顔謝重葉以鳯采何范張沈之徒亦不可勝也蓋聞之於世故略舉大較暨皇齊馭寳運集休明太祖以聖武膺籙高祖以睿文纂業文帝以貳離含章中宗以上哲興運並文明自天緝遐景祚今聖歷方興文思充被海岳降神才英秀發馭飛龍於天衢駕騏驥於萬里經典禮章跨周轢漢唐虞之文其鼎盛乎鴻風懿采短筆敢陳颺言讚時請寄明哲贊曰蔚映十伐辭采九變樞中所動環流無倦質文㳂時崇替在選終古雖遠瞹焉如靣山人沈荆石校文心雕龍卷之九, WYG: ''}
