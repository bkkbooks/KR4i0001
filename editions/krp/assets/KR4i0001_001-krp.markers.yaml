  front:
  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR4i0001_krp_001-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR4i0001_SBCK_001-1a01}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 勰撰其書原道以下二十五篇論文章體製神思以下二十四篇論文章工拙合序志一篇為五十篇據序志篇稱上篇以下下篇以上本止二巻然隋志已作十巻盖後人所分又據其篇中所言此書實成于齊代此本署梁通事舎人劉勰撰亦後人追題也是書自至正乙未刻于嘉禾至明𢎞治嘉靖萬厯間凡經五刻其隠秀一篇皆有缺文明末常熟錢功甫稱得阮華山宋槧本鈔補四百餘字然其書晚出别無顯證其詞亦頗不類如嘔心吐膽似摭李賀小傳語鍜嵗煉年似摭六一詩話論周朴語稱班姫為匹婦亦似摭鍾嶸詩品語皆有可疑况至正去宋未逺不應宋本已無一存三百年後乃為明人所得又考永樂大典所載舊本闕文亦同其時宋本如林更不應内府所藏無一完刻阮所稱殆亦影撰何焯等誤信之也至字句舛訛自楊慎朱謀㙔以下遞有校正而亦不免於妄改如哀弔篇賦憲之諡句皆云賦憲當作議徳盖以賦形近議憲形近悳悳古徳字也然考王應麟玉海曰周書諡法惟三月既生魄周公旦太公望相嗣王發既賦憲受臚于物之野將𦵏乃制作諡}
  - {type: page-break, offset: 0, content: '', id: KR4i0001_WYG_000-5a, image: WYG1478/WYG1478-0003c.png}
  - {type: page-break, offset: 0, content: '', id: KR4i0001_WYG_000-5b, image: WYG1478/WYG1478-0003d.png}
