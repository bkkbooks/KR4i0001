  - {type: variant, offset: 4, length: 1, content: 卷, WYG: 云賦憲}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 諡出於此然則二字不誤古人已言以是例之其以意雌黄者多矣乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀文心雕龍原序文心雕龍凡十巻合篇終序志}
  - {type: page-break, offset: 6, content: '', id: KR4i0001_WYG_000-6b, image: WYG1478/WYG1478-0004b.png}
  - {type: page-break, offset: 6, content: '', id: KR4i0001_WYG_000-7a, image: WYG1478/WYG1478-0004c.png}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 篇為五十篇}
  body:
  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR4i0001_krp_001-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR4i0001_SBCK_001-1a02}
  - {type: indent, offset: 0, content: 　　　　　　　　, id: KR4i0001_krp_001-bkkind1}
  - {type: variant, offset: 3, length: 1, content: 舍, WYG: 舎}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 劉勰彦和所作也勰}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 人自言嘗夜夢執丹漆之器随仲尼而南行窹而思敷讃聖㫖莫若注經而馬鄭諸儒𢎞之巳精就有深觧未足立家惟文章之用有禆經典於是搦筆和墨論著古今文體以成此書出示沈約約大重之謂其深得文理常陳之几案今讀其文出入六經貫穿百氏逺搜荒古之世近窮㝢内之事精推顥穹之㣲粗及塵礫之細陳明王之禮樂述大聖之道徳蔚如也至其陽秋先後作家衮鉞區分瑕瑜不掩百秊斷案莫之異同非慱學雄辯深識遐究烏能及兹若夫論著為文之義敶古繹今别裁分體如方圓之規矩聲音之律吕雖使班馬長雲並列將彬彬與揖共升㳺夏之堂矣論者以六朝齊梁而下佛學昌熾為文多工纎巧駢驪氣亦衰靡概以律勰豈通論哉方今海内文教盛隆操觚之士争崇古雅獨是書時罕印本好古者思欲致之恒病購求之難吾邑汪子仁卿慱文談藝喜而校刻之嗚呼此刻既行世有休文寧無同賞音者吾知雋永之餘固不必鐫肝刻肺抽黄對白而於文也亦思過半矣時嘉靖庚子六月既望書於葵栢山齋新安石巖方元禎欽定四庫全書文心雕龍巻一梁}
