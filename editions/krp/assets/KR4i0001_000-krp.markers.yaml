  - {type: variant, offset: 30, length: 409, content: 百餘字今從錢功甫校本補錄始正而末寄內明而外潤使玩之者無窮味之者不厭矣彼波起詞間是謂之秀手音宛乎逸態若遠山之浮煙靄孌女之靚容華然煙靄天成不勞于粧點容華格定無待于裁鎔深淺而各奇纎而俱妙若揮之則有餘而攬之則不足矣夫立意之士務欲造寄每馳心于玄默之表工詞之人必欲臻美恒匿思於佳麗之鄕嘔心吐膽不足語窮煅歲煉年奚能諭苦故能藏穎詞間昏迷于庸目露鋒文外驚絶乎妙心使醖藉者畜隱而意愉英鋭者抱秀而心悅譬諸裁雲製霞不讓乎天工斵卉刻葩有同乎神匠矣若篇中乏隱若宿儒之無學或一叩而語窮句間鮮秀如巨室之少珍若百而色沮斯並不足于才思而亦有愧于文詞矣將欲徵隱聊可指篇古詩之離別樂府之長城詞怨旨深而復兼乎比興陳思之黃雀公幹之靑松格剛才勁而並長于諷諭叔夜之嗣宗之境玄思淡而獨得乎優閒士衡之彭澤之心密語澄而俱適乎如欲辨秀亦惟摘句常恐秋節至涼飈奪炎熱意悽而詞婉此匹婦之無聊也臨河濯長纓念子悵悠悠志高而言壯此丈夫之不遂也東西安所之徘徊以徬徨心孤而情懼此閨房之悲極也, WYG: 庫全書集部九}
