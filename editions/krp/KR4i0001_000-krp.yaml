front:
  text: 隱秀篇闕文補
  hash: sha256:39a7262b5915d12d3d35c138863b23667bf11999cb7a8f5bb5c7db067f6195f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0001_SBCK_000-1a}
body:
  text: 文心雕龍元明刋本隱秀篇珠玉潛水而瀾表方圓下涼風動秋草上皆闕四百餘字今從錢功甫校本補錄始正而末寄內明而外潤使玩之者無窮味之者不厭矣彼波起詞間是謂之秀手音宛乎逸態若遠山之浮煙靄孌女之靚容華然煙靄天成不勞于粧點容華格定無待于裁鎔深淺而各奇纎而俱妙若揮之則有餘而攬之則不足矣夫立意之士務欲造寄每馳心于玄默之表工詞之人必欲臻美恒匿思於佳麗之鄕嘔心吐膽不足語窮煅歲煉年奚能諭苦故能藏穎詞間昏迷于庸目露鋒文外驚絶乎妙心使醖藉者畜隱而意愉英鋭者抱秀而心悅譬諸裁雲製霞不讓乎天工斵卉刻葩有同乎神匠矣若篇中乏隱若宿儒之無學或一叩而語窮句間鮮秀如巨室之少珍若百而色沮斯並不足于才思而亦有愧于文詞矣將欲徵隱聊可指篇古詩之離別樂府之長城詞怨旨深而復兼乎比興陳思之黃雀公幹之靑松格剛才勁而並長于諷諭叔夜之嗣宗之境玄思淡而獨得乎優閒士衡之彭澤之心密語澄而俱適乎如欲辨秀亦惟摘句常恐秋節至涼飈奪炎熱意悽而詞婉此匹婦之無聊也臨河濯長纓念子悵悠悠志高而言壯此丈夫之不遂也東西安所之徘徊以徬徨心孤而情懼此閨房之悲極也文心雕龍目錄第一卷原道第一徵聖第二宗經第三正緯第四辯騷第五第二卷明詩第六樂府第七銓賦第八頌讚第九祝盟第十第三卷銘箴第十一誄碑第十一哀弔第十三雜文第十四諧讔第十五第四卷史傳第十六諸子第十七論說第十八詔策第十九檄移第二十第五卷封禪第二十一章表第二十二奏啓第二十三議對第二十四書記第二十五第六卷神思第二十六體性第二十七風骨第二十八通變第二十九定勢第三十第七卷情采第三十一鎔裁第三十二聲律第三十三章句第三十四麗辭第三十五第八卷比興第三十六夸飾第三十七事類第三十八練字第三十九隱秀第四十第九卷指瑕第四十一養氣第四十二附㑹第四十三總術第四十四時序第四十五第十卷物色第四十六才略第四十七知音第四十八程噐第四十九序志第五十文心雕龍目錄畢
