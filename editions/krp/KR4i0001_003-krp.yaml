front:
  text: 文心雕龍卷之三
  hash: sha256:2c4654176ca8318adf1d0930a19e2fb1e74c6ad52bbe1093e5cb8a73abe2249b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0001_SBCK_003-1a}
body:
  text: 梁通事舍人東莞劉勰撰銘箴第十一昔帝軒刻輿几以弼違大禹勒筍簴而招諫成湯盤盂著日新之規武王戸席題必戒之訓周公愼言於金人仲尼革容於欹器則先聖鑒戒其來久矣故銘者名也觀器必也正名審用貴乎盛德蓋臧武仲之論銘也曰天子令德諸侯計功大夫稱伐夏鑄九牧之金鼎周勒肅愼之楛矢令德之事也吕望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勲於景銘孔悝表勒於衞鼎稱伐之類也若乃飛廉有石槨之錫靈公有蒿里之謚銘發幽石吁可怪矣趙靈勒跡於畨禺秦昭刻傳於華山夸誕示後吁可茂也詳觀衆例銘義見矣至於始皇勒岳政暴而文澤亦有疎通之美焉若班固燕然之勒張昶華隂之碣序亦盛矣蔡邕銘思獨冠古今僑公之箴吐納典謨朱穆之鼎全成碑文溺所長也至如敬通雜器凖矱戒銘而事非其物繁畧違中崔駰品物讚多戒少李尤積篇義儉辭碎蓍龜神物而居博奕之中衡斛嘉量而在臼杵之末曾名品之末暇何事理之能閒哉魏文九寳器利辭鈍唯張采劒閣其才淸采迅足駸駸後發前至勒銘岷漢得其宜矣箴者所以攻疾防患喻箴石也斯文興盛於三代夏啇二箴餘句頗存及周之辛甲百官箴一篇體義備焉迄至春秋微而未絶故魏綘諷君於后羿楚子訓民於在勤戰伐已來棄德務功銘辭代興箴文委絶至揚雄稽古始範虞箴卿尹州牧廿五篇及崔胡𥙷綴總稱百官指事配位鞶鑑可徵信所謂追淸風於前古攀辛甲於後代者也至於潘朂符節要而失淺温嶠傅臣博而患繁王濟國子引廣事雜潘尼乘輿義正體蕪凢斯繼作鮮有克衷至於王朗雜箴乃寘巾履得其戒愼而失其所施觀其約文舉要憲章戒銘而水火井竈繁辭不巳志有偏也夫箴誦於官銘題於器名目雖異而警戒實同箴全禦過故文質確切銘兼襃譖故體貴弘潤其取事也必覈以辨其摛文也必簡而深此其大要也然矢言之道蓋闕庸器之制乆淪所以箴銘異用罕施代惟乘文君子宜酌其遠大焉贊曰銘實表器箴惟德軌有佩于言無鑒于水秉兹貞厲敬言乎履義典則弘文約爲美誄碑第十二周世盛德有銘誄之文大夫之才臨䘮能誄誄者累也累其德行旌之不朽也夏啇巳前其詳靡聞周雖有誄未被於士又賤不誄貴㓜不誄長在萬乘則稱天以誄之讀誄定謚其節文大矣自魯莊戰乘丘始及於士逮尼父卒哀公作誄觀其愸遺之切嗚呼之歎雖非壡作古式存焉至柳妻之誄惠子則辭哀而韻長矣曁乎漢世承流而作揚雄之誄元后文實煩穢沙麓撮其要而摯疑成篇安有累德述尊而闊略四句乎杜篤之誄有譽前代吳誄雖工而他篇頗疎豈以見稱光武而改盻千金哉傅毅所制文體倫序孝山崔瑗辨絜相參觀序如傅辭靡律調固誄之才也潘岳構意專師孝山巧於序悲易入新切所以隔代相望能徵厥聲者也至如崔駰誄趙劉陶誄黃並得憲章工在簡要陳思叨名而體實繁緩文皇誄末㫖言自陳其乖甚矣若夫殷臣誄湯追襃玄鳥之祚周史歌文上闡后稷之烈誄述祖宗蓋詩人之則也至於序述哀情則觸類而長傅毅之誄北海云白日幽光雰霧杳㝠始序致惑遂爲後式景而效者彌取於功矣詳夫誄之爲制蓋選言錄行傳體而頌文榮始而哀終論其人也曖乎若可覿道其哀也悽焉如可傷此其㫖也碑者埤也上古帝皇始號封禪樹石埤岳故曰碑也周穆紀跡于弇山之石亦石碑之意也又宗廟有碑樹之兩楹事正麗牲未勒勲績而庸器漸闕故後代用碑以石代金同乎不朽自廟徂墳猶封墓也自後漢以來碑碣雲起才鋒所斷莫高蔡邕觀楊賜之碑骨鯁訓典陳郭二文句無擇言周乎衆碑莫非淸允其叙事也該而要其綴采也雅而澤淸詞轉而不窮巧義出而卓立察其爲才自然而至孔融所創有慕伯喈張陳兩文辨給足采亦其亞也及孫綽爲文志在碑誄温王郤庾辭多枝雜桓彞一篇最爲辨裁夫屬碑之體資乎史才其序則傳其文則銘標序盛德必見淸風之華昭紀鴻懿必見峻偉之烈此碑之制也夫碑實銘噐銘實碑文因噐立名事光於誄是以勒石讚勲者入銘之域樹碑述巳者同誄之區焉贊曰寫實追虚碑誄以立銘德慕行文采允集觀風似靣聽辭如泣石墨鐫華頺影豈忒哀弔第十三賦憲之謚短折曰哀哀者依也悲實依心故曰哀也以辭遣哀蓋下涙之悼故不在黃髪必施夭昏昔三良殉秦百夫莫贖事均夭橫黃鳥賦哀㧕亦詩人之哀辭乎曁漢武封禪而霍侯暴亡帝傷而作詩亦哀辭之類矣及後漢汝陽王亡崔瑗哀辭始變前戒然履突鬼門怪而不辭駕龍乘雲仙而不哀又卒章五言頗似歌謠亦彷彿乎漢武也至於蘇愼張升並述哀文雖發其情華而未極心實建安哀辭惟偉長差善行女一篇時有惻怛及潘岳繼作實踵其美觀其慮善辭變情洞悲苦敘事如傳結言摹詩促節四言鮮有緩句故能義直而文婉體舊而趣新金鹿澤蘭莫之或繼也原夫哀辭大體情主於痛傷而辭窮乎愛惜㓜未成德故譽止於察惠弱不勝務故悼加乎膚色隱心而結文則事愜觀文而屬心則體奢奢體爲辭則雖麗不哀必使情徃㑹悲文來引泣乃其貴耳弔者至也詩云神之弔矣言神至也君子令終定謚事極理哀故賔之慰主以至到爲言也壓溺乖道所以不弔又宋水鄭火行人奉辭國灾民亡故同弔也及晉築虎臺齊襲燕城使蘇秦翻賀爲弔虐民搆敵亦亡之道凡斯之例弔之所設也或驕貴而殞身或狷忿以乖道或有志而無時或美才而兼累追而慰之並名爲弔自賈誼浮湘發憤弔屈體同而事覈辭淸而理哀蓋首出之作也及相如之弔二世全爲賦體桓譚以爲其言惻愴讀者歎息及平章要切斷而能悲也揚雄弔屈思積切寡意深文略故辭韻沉膇班彪蔡邕並敏於致語然影附賈氏難爲並驅耳胡阮之弔夷齊襃而無聞仲宣所制譏呵實工然則胡阮嘉其淸王子傷其隘各志也禰衡之弔平子縟麗而輕淸陸機之弔魏武序巧而文繁降斯以下未有可稱者矣夫弔雖古義而華辭未造華過韻緩則化而爲賦固宜正義以繩理昭德而塞違割㭊襃貶哀而有正則無奪倫矣贊曰辭定所表在彼弱弄苗而不秀自古斯慟雖有通才迷方告控千載可傷寓言以送雜文第十四智術之子博雅之人藻溢於辭辭盈乎氣苑囿文情故日新殊致宋玉含才頗亦負俗始造對問以申其志放懷寥廓氣實使之及枚乘摛艶首製七發腴辭雲搆本麗風駭蓋七竅所發發乎嗜欲始雅末正所以戒膏梁之子也揚雄覃思文闊業深綜述碎文璅語肇爲連珠其辭雖小而明潤矣凡此三者文章之枝派暇豫之末造也自對問以後東方朔效而廣之名爲客難託古慰志疎而有辨揚雄解嘲雜以諧謔廻環自釋頗亦爲工班固賔戯含懿采之華崔駰逹㫖吐典言之裁張衡應問宻而兼雅崔寔客譏整而微質蔡邕釋誨體奥而文炳景純客傲情見而采蔚雖迭相祖述然屬篇之高者也至於陳思客問辭高而理疎庾凱客咨意榮而文粹斯類甚衆無所取裁矣原兹文之設廼發憤以表志身挫憑乎道勝時屯寄於情泰莫不淵岳其心麟鳯其采此立本之大要也自七發以下作者繼踵觀枚氏首唱信獨㧞而偉麗矣及傅毅七激㑹淸要之工崔駰七依入博雅之巧張衡七辨結采綿靡崔瑗七厲植義純正陳思七啓取美於宏壯仲宣七釋致辨於事理自桓麟七說以下左思七諷以上枝附影從十有餘家或文麗而義睽或理粹而辭馭觀其大抵所歸莫不高談宫舘壮語畋獵窮瓌奇之服饌極蠱媚之聲色甘意搖骨體艶詞洞䰟識雖始之以滛侈而終之以居正然諷以勸百勢不自反子雲所謂先騁鄭衞之聲曲終而奏雅者也唯七厲敘賢歸以儒道雖文非㧞羣而意實卓爾矣自連珠以下擬者問出杜篤賈逵之曹劉珍潘朂之輩欲穿明珠多貫魚目可謂壽陵匍匐非復邯鄲之歩里配捧心不關西施之嚬矣唯士衡運思理新文敏而裁章置句廣於舊篇豈慕珠仲四寸之璫乎夫文小易周思閒可贍足使義明而辭淨事圓而音澤磊磊自轉可稱珠耳詳夫漢來雜文名號多品或典語誓問或覽略篇章或曲操弄引或吟諷謠詠總括其名並歸雜文之區甄别其義各入討論之或類聚有貫故不曲述贊曰偉矣前脩學堅多飽負文餘力飛靡弄巧技辭攢映嘒若參昻慕嚬之心於焉祗攪諧讔第十五芮良夫之詩云自有肺腸俾民卒狂夫心險如山口壅若川怨怒之情不一歡謔之言無方昔華元棄甲城者發睅目之謳臧紇喪師國人造侏儒之歌並嗤戯形貌内怨爲俳也又𧖟解鄙諺貍首滛哇苟可箴戒載于禮典故知諧辭讔言亦無棄矣諧之言皆也辭淺㑹俗皆悅笑也昔齊宣酣樂而淳干說甘酒楚襄讌集而宋玉賦好色意在微諷有足觀者及優孟之諷􅃮城優旃之諌葬馬並譎辭飾說㧕止昬暴是以子長編史列傳滑稽以其辭雖傾囘意歸義正也但本體不雜其流易弊於是東方枚臯餔糟啜醨無所匡正而詆嫚媒弄故其自稱爲賦廼亦俳也見視如倡亦有悔矣至魏大因俳說以著茂書薛綜憑宴㑹而發嘲調雖抃推席而無益時用矣然而懿文之士未免枉轡潘岳醜婦之屬束晢賣餅之類尤相效之蓋以百數魏晉滑稽盛相驅扇遂乃應㻛之鼻方於盗削卵張華之形比乎握舂杵曾是莠言有虧德音豈非溺者之妄茂胥靡之狂歌歟讔者隱也遯辭以隱意譎譬以指事也昔還楊求拯於楚師喻眢井而稱麥麴叔儀乞糧於魯人歌佩玉而呼庚癸伍舉刺荆王以大鳥齊客譏薛公以海魚莊姬託辭於龍尾臧文謬書於羊裘隱語之用被于紀傳大者興治濟身其次弼違曉惑蓋意生於權譎而事出於機急與夫諧辭可相表裏者也漢世隱書十有八篇歆固編文錄之歌末昔楚莊齊威性好隱語至東方曼倩尤巧辭述但謬辭詆戯無益規補自魏代巳來頗非俳優而君子隱化爲謎語謎也者廻互其辭使昏迷也或體目文字或圖象品物纖巧以弄忠淺察以衒辭義欲婉而正辭欲隱而顯荀卿𧖟賦巳兆其體至魏文陳思約而宻之高貴鄕公博舉品物雖有小巧用乖遠大夫觀古之爲隱理周要務豈爲童稚之戯謔摶髀而抃笑哉然文辭之有諧隱譬九流之有小說蓋稗官所采以廣視聽若效而不巳則髠袒而入室旃孟之石交乎贊曰古之嘲隱振危釋憊雖有絲麻無棄管蒯㑹義適時頗益諷誡空戯滑稽德音大壞鄕貢士諸純臣校文心雕龍卷之三
