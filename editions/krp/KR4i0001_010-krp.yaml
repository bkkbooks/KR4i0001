  text: 文心雕龍卷之十
  hash: sha256:40397142d4faf4d2aa5f9dde5f4b9d8896d7235b7c9b11774e9f7bc45d1787ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0001_SBCK_010-1a}
body:
  text: 梁通事舍人東莞劉勰撰物色第四十六春秋代序隂陽慘舒物色之動心亦揺焉蓋陽氣萌而玄駒歩隂律凝而丹鳥羞微蟲猶或入感四時之動物深矣若夫珪璋挺其惠心英華秀其淸氣物色相召人誰獲安是以獻歲發春悅豫之情暢滔滔孟夏鬱陶之心凝天高氣淸隂沈之志遠霰雪無垠矜肅之慮深歲有其物物有其容情以物遷辭以情發一葉且或迎意蟲聲有足引心况清風與明月同夜白日與春林共朝哉是以詩人感物聯類不窮流連萬象之際沈吟視聽之區寫氣圖貌旣隨物以宛轉屬采附聲亦與心而徘徊故灼灼狀桃花之鮮依依盡楊柳之貌杲杲爲出日之容瀌漉擬雨雪之狀喈喈逐黃鳥之聲喓喓學草蟲之韻皎日嘒星一言窮理參差沃若兩字連形並以少總多情貌無遺矣雖復思經千載將何易奪及離騷代興觸類而長物貌難盡故重沓舒狀於是嵯峨之類聚葳㽔之羣積矣及長卿之徒詭勢瓌聲模山範水字必魚貫所謂詩人麗則而約言辭人麗滛而繁句也至如雅詠棠華或黃或白騷述秋蘭綠葉紫莖凡摛表五色貴在時見若靑黃屢出則繁而不珍自近代以來文貴則似窺情風景之上鑚貌草木之中吟詠所發志惟深遠體物爲妙功在宻附故巧言切狀如印之印泥不加雕削而曲寫毫芥故能瞻言而見貌印字而知時也然物有恒姿而思無定檢或率爾造極或精思愈疎且詩騷所摽並據要害故後進銳筆怯於爭鋒莫不因方以借巧卽勢以㑹竒善於適要則雖舊彌新矣是以四序紛廻而入興貴閒物色雖繁而折辭尚簡使味飄飄而輕舉情曄曄而更新古來辭人異代接武莫不參伍以相變因革以爲功物色盡而情有餘者曉㑹通也若乃山林臯壤實文思之奥府略語則闕詳說則繁然屈平所以能洞監風騷之情者抑亦江山之助乎贊曰山沓水匝樹雜雲合目旣徃還心亦吐納春日遲遲秋風颯颯情徃似贈興來如答才略第四十七九代之文富矣盛矣其辭令華采可略而詳也虞夏文章則有臯陶六德䕫序八音益則有贊五子作歌辭義温雅萬代之儀表也啇周之世則仲虺垂誥伊尹敷訓吉甫之徒並述詩頌義固爲經文亦師矣及乎春秋大夫則修辭聘㑹磊落如琅玕之圃焜耀似縟錦之肆薳教擇楚國之令典隨㑹講晉國之禮法趙襄以文勝從饗國僑以修辭扞鄭子太叔美秀而文公孫翬善於辭令皆文名之標者也戰代任武而文士不絶諸子以道術取資屈宋以楚辭發采樂毅報書辯以義范睢上疏宻而至蘇秦歷說壯而中李斯自奏麗而動若在文世則楊班儔矣荀况學宗而象物名賦文質相稱固巨儒之情也漢室陸賈首發竒采賦孟春而選典誥其辨之富矣賈誼才頴陵軼飛兎議揠而賦清豈虚至哉枚乘之七發鄒陽之上書膏潤於筆氣形於言矣仲舒專儒子長純史而麗縟成文亦詩人之告哀焉相如好書師範屈宋洞入夸艶致名辭宗然覆取精意理不勝辭正楊子以爲文麗用寡者長卿誠哉是言也王褒構采以宻巧爲致附聲測貌泠然可觀子雲屬意辭人最深觀其涯度幽遠捜選詭麗而竭才以鑽思故能理贍而辭堅矣桓譚著論富號猗頓宋弘稱薦爰比相如而集靈諸賦偏淺無才故知長於諷論不及麗文也敬通雅好辭說而坎壈盛世顯志自序亦蚌病成珠矣二班兩劉奕葉繼采舊說以爲固文優彪歆學精向然王命清辯新序該練璿璧產於崑岡亦難得而踰本矣傅毅崔駰光采比肩瑗寔踵武能世厥風者矣杜篤賈逵亦有聲於文跡其爲才也崔傅之末流也李充賦銘志慕鴻裁而才力沈膇垂翼不飛馬融鴻儒思洽登高吐納經範華實相扶王逸博識有功而絢綵無力延壽繼志瓌頴獨標其善圖物寫貌豈枚乘之遺術歟張衡通贍蔡邕精雅文史彬彬隔世相望是則竹栢異心而同貞金玉殊質而皆寳也劉向之奏議㫖切而調緩趙壹之辭賦意繁而體疎孔融氣盛於爲筆禰衡思銳於爲文有偏美焉潘朂憑經以騁才故絶羣於錫命王朗發憤以託志亦致美於序銘然自卿淵巳前多俊才而不課學雄向巳後頗引書以助文此取與之大際其分不可亂者也魏文之才洋洋清綺舊談抑之謂去植千里然子建思捷而才儁詩麗而表逸子桓慮詳而力緩故不兢於先鳴而樂府清越典論辯要迭用短長亦無懵焉但俗情抑揚雷同一響遂令文帝以位尊减才思王以勢窘益價未爲篤論也仲宣溢才捷而能宻文多兼善辭少瑕累摘其詩賦則七子之冠冕乎琳瑀以符檄擅聲徐幹以賦論摽美劉楨情高以㑹采應瑒學優以得文路粹楊脩頗懷筆記之工丁儀邯鄲亦含論述之美有足筭焉劉邵趙都能攀於前脩何晏景福克光於後進休璉風情則百壹摽其志吉甫文理則臨丹戎其采稽康師心以遣論阮籍使氣以命詩殊聲而合響異翮而同飛張華短章奕奕淸暢其鷦鷯寓意卽韓非之說難也左思立才業深覃思盡銳於三都㧞萃於詠史無遺力矣潘岳敏給辭自和暢鍾美於西征賈餘於哀誄非自外也陸機才欲窺深辭務索廣故思能入巧而不制繁士龍朗陳以識檢亂故能布采鮮淨敏於短篇孫楚綴思毎直置以疎通摯虞述懷必循規以溫雅其品藻流别有條理焉傅玄篇章義多規鏡長虞筆奏世執剛中並杶幹之實才非羣華之韡蕚也成公子安選賦而時美夏侯孝若具體而皆㣲曹攄清靡於長篇季鷹辨切於短韻各其善也孟陽景福才綺而相埓可謂魯衛之政兄弟之文也劉琨雅壯而多風盧諶情發而理昭亦遇之於時勢也景純艶逸足冠中興郊賦旣穆穆以大觀仙詩亦飄飄而凌雲矣庾元規之表奏靡宻以閒暢溫太眞之筆記循理而清通亦筆端之良工也孫盛子實文勝爲史凖的所擬志乎典訓戸牗雖異而筆彩略同袁宏發軫以高驤故卓出而多偏孫綽規旋以矩歩故倫序而寡狀殷仲文之孤興謝叔源之閒情並解散辭體縹緲浮音雖滔滔風流而大澆文意宋代逸才辭翰鱗萃世近易明無勞甄序觀夫後漢才林可參西京晉世文苑足儷鄴都然而魏時話言必以元封爲稱首宋來美談亦以建安爲口實何也豈非崇文之盛世招才之嘉㑹哉嗟夫此古人所以貴乎時也贊曰才難然乎性各異禀一朝綜文千年凝錦餘采徘徊遺風藉甚無曰紛雜皎然可品知音第四十八知音其難哉音實難知知實難逢逢其知音千載其一乎夫古來知音多賤同而思古所謂日進前而不御遥聞聲而相思也昔儲說始出子虚初成秦皇漢武恨不同時旣同時矣則韓囚而馬輕豈不明鑒同時之賤哉至於班固傅毅文在伯仲而固嗤毅云下筆不能自休及陳思論才亦深排孔璋敬禮請潤色歎以爲美談季緒好詆訶方之於田巴意亦見矣故魏文稱文人相輕非虚談也至如君卿脣舌而謬欲論文乃稱史遷著書諮東方朔於是桓譚之徒相顧嗤笑彼實博徒輕言負誚况乎文士可妄談哉故鑒照洞明而貴古賤今者二主是也才實鴻懿而崇巳抑人班曹是也學不逮文而信僞迷眞者樓護是也醬瓿之議豈多歎哉夫麟鳯與麏雉懸絶珠玉與礫石超殊白日垂辭如鏡矣是以將閱文情先標六觀一觀位體二觀置辭三觀通變四觀竒正五觀事義六觀宫商斯術旣形則優劣見矣夫綴文者情動而辭發觀文者披文以入情㳂波討源雖幽必顯世遠莫見其靣覘文輒見其心豈成篇之足深患識照之目淺耳夫志在山水琴表其情况形之筆端理將焉匿故心之照理譬目之照形目瞭則形無不分心敏則理無不逹然而俗監之迷者深廢淺售此莊周所以笑折楊宋玉所以傷白雪也昔屈平有言文質疎内衆不知余之異采見異唯知音耳揚雄自稱心好沈博絶麗之文其事浮淺亦可知矣夫唯深識鑒奥必歡然內懌譬春臺之熈衆人樂餌之止過客蓋聞蘭爲國香服媚彌芬書亦國華翫澤方美知音君子其垂意焉贊曰洪鍾萬鈞䕫曠所定良書盈篋妙鑒廼訂流鄭滛人無或失聽獨有此律不謬蹊徑程噐第四十九周書論士方之梓材蓋貴噐用而兼文采也是以樸斵成而丹艧施垣墉立而雕朽附而近代詞人務華棄實故魏文以爲古今文人之類不護細行韋誕所評又歷詆羣才後人雷同混之一貫吁可悲矣略觀文士之疵相如竊妻而受金揚雄嗜酒而少筭敬通之不循廉隅杜篤之請求無厭班固謟竇以作威馬融黨梁而黷貨文舉傲誕以速誅正平狂憨以致戮仲宣輕脆以躁競孔璋惚恫以麤疎丁儀貪婪以乞貨路粹餔啜而無耻潘岳詭禱於愍懷陸機傾仄於賈郭傅玄剛隘而詈臺孫楚佷愎而訟府諸有此類並文士之瑕累文旣有之武亦宜然古之將相疵咎實多至如管仲之盗竊呉起之貪滛陳平之汚點綘灌之讒嫉㳂兹以下不可勝數孔光負衡據鼎而仄媚董賢况班馬之賤職潘岳之下位哉王戎開國上秩而鬻官囂俗况馬杜之磬懸丁路之貧薄哉然子夏無虧於名儒璿冲不塵乎竹林者名崇而譏减也若夫屈賈之忠貞鄒枚之機覺黃香之淳孝徐幹之沈黙豈曰文士必其玷歟蓋人禀五材修短殊用自非上哲難以求備然將相以位隆特逹文士以職卑多誚此江河所以騰湧㳙流所以寸析者也名之抑揚旣其然矣位之通塞亦有以焉蓋士之登庸以成務爲用魯之敬姜婦人之聰明耳然推其機綜以方治國安有大夫學文而不逹於政事哉彼楊馬之徒有文無質所以終乎下位也昔庾元規才華清英勲庸有聲故文藝不稱若非台岳則正以文才也文武之術左右惟宜郤縠敦書故舉爲元帥豈以好文而不練武哉孫武兵經辭如珠玉豈以習武而不曉文也是以君子藏噐待時而動發揮事業固宜蓄素以剛中散悉以彪外楩柟其質豫章其幹摛文必在緯軍國負重必在任棟梁窮則獨善以垂文逹則奉時以騁績若此文人應梓材之士矣贊曰瞻彼前脩有懿文德聲昭楚南采動梁北雕而不噐貞幹誰則豈無華身亦有光國序志第五十文心者言爲文之用心也昔㳙子琴心王孫巧心心哉美矣夫故用之古來文章以雕縟成體豈效鄒奭之羣言雕龍也夫宇宙綿邈黎獻紛雜㧞萃出頴智術而已歲月飄忽性靈不居騰聲飛實制作而巳夫有肖貎天地禀性五行擬耳目於日月方聲氣於風雷其超出萬物亦已靈矣形同草木之脆名踰金石之堅是以君子處世樹德建言豈好辨哉不得巳也余生七齡乃夢彩雲若錦則攀而採之齒在踰立則常夢索源不述先哲之誥無益後生之慮蓋文心之作也本乎道師乎聖體乎經酌乎緯變乎騷文之樞紐云亦極矣若論文叙筆則品别區分原始以表時釋名以章義選文以定篇敷理以舉綂一篇以上綱領明矣至於剖情析采必籠圈條貫摛神性圖風勢以包㑹通以閱聲字崇替於時序襃貶於才略怡暢於知音耿介於程噐長懷序志以馭羣篇下篇以下毛目顯矣位理定名彰乎大易之數其爲文用四十九篇而巳夫銓序一文爲易彌綸羣言爲難雖復輕採毛髪深極骨髓或有曲意宻源似近而逺辭所不載亦不可勝數及其品列成文有同乎舊談者非雷同也勢自不可異也有異乎前論者非苟異也理自不可同也同之與異不屑古今擘肌分理唯務折衷按轡文雅之場環絡藻繪之府亦幾乎備矣但言不盡意前聖所難識在瓶管何能規短茫茫徃代旣沈余聞渺渺來世諒塵彼觀也贊曰生也有涯無涯惟智逐物實難慿性良易傲岸泉石咀嚼文義文果載心余心有寄太學生錢日省校文心雕龍卷之十
