body:
  text: 文心雕龍巻八梁劉勰撰比興第三十六詩文𢎞奥包韞六義毛公述傳獨標興體豈不以風通而賦同比顯而興隠哉故比者附也興者起也附理者切類以指事起情者依㣲以擬議起情故興體以立附理故比例以生比則畜憤以斥言興則環譬以記諷盖随時之義不一故詩人之志有二也觀夫興之託諭婉而成章稱名也小取類也大闗雎有别故后妃方徳尸鳩貞一故夫人象義義取其貞無従扵夷禽徳貴其别不嫌扵鷙鳥明而未融故發注而後見也且何謂為比盖寫物以附意颺言以切事者也故金錫以喻明徳珪璋以譬秀民螟蛉以類敎誨蜩螗以寫號呼澣衣以擬心憂巻席以方志固凡斯切象皆比義也至如麻衣如雪兩驂如舞若斯之類皆比類者也楚襄信䜛而三閭忠烈依詩製騷諷兼比興炎漢雖盛而辭人夸毗詩刺道䘮故興義銷亾扵是賦頌先鳴故比體雲構紛紜雜遝信舊章矣夫比之為義取類不常或喻扵聲或方扵貌或擬扵心或譬扵事宋玉髙唐云纎條悲鳴聲似竽籟此比聲之類也枚乗莬園云焱焱紛紛若塵埃之間白雲此則比貌之類也賈生鵩賦云禍之與福何異糺纆此以物比理者也王襃洞簫云優柔温潤如慈父之畜子也此以聲比心者也馬融長笛云繁縟絡繹范蔡之説也此以響比辯者也張衡南都云起鄭舞蠒曵緒此以容比物者也若斯之類辭賦所先日用乎比月㤀乎興習小而棄大所以文謝扵周人也至扵揚班之倫曹劉以下圖狀山川影冩雲物莫不纎綜比義以敷其華驚聽囘視資此效績又安仁螢賦云流金在沙季鷹雜詩云青條若總翠皆其義者也故比類雖繁以切至為貴若刻鵠類鶩則無所取焉賛曰詩人比興觸物圎覽物雖胡越合則肝膽擬容取心斷辭必敢攢雜詠歌如川之渙夸飾第三十七夫形而上者謂之道形而下者謂之器神道難摹精言不能追其極形器易寫壮辭可得喻其真才非短長理自難易耳故自天地以降豫入聲貌文辭所被夸飾恒存雖詩書雅言風格訓世事必宜廣文亦過焉是以言峻則嵩髙極天論狭則河不容舠說多則子孫千億稱少則民靡孑遺襄陵舉㴞天之目倒戈立漂杵之論辭雖已甚其義無害也且夫鴞音之醜豈有泮林而變好荼味之苦寧以周原而成飴並意深褒讃故義成矯飾大聖所録以垂憲章孟軻所云説詩者不以文害辭不以辭害意也自宋玉景差夸飾始盛相如憑風詭濫愈甚故上林之舘奔星與宛虹入軒從禽之盛飛廉與鷦鷯俱獲及揚雄甘泉酌其餘波語瓌竒則假珍扵玉樹言峻極則顚墜扵鬼神至東都之比目西京之海若驗理則理無不驗窮飾則飾猶未窮矣又子雲校獵鞭宓妃以饟屈原張衡羽獵困𤣥㝠扵朔野孌彼洛神既非㒺兩惟此水師亦非魑魅而虚用濫形不其踈乎此欲夸其威而飾其事義睽刺也至如氣貌山海體勢宫殿嵯峨掲業熠燿焜煌之状光采煒煒而欲然聲貌岌岌其将動矣莫不因夸以成状沿飾而得竒也扵是後進之才奨氣挟聲軒翥而欲奮飛騰躑而羞跼歩辭入煒煜春藻不能程其艶言在萎絶寒谷未足成其凋談歡則字與笑並論慼則聲共泣偕信可以發藴而飛滯披瞽而駭聾矣然飾窮其要則心聲鋒起夸過其理則名實兩乖若能酌詩書之曠㫖剪揚馬之甚泰使夸而有節飾而不誣亦可謂之懿也賛曰夸飾在用文豈循檢言必鵬運氣靡鴻漸倒海探珠傾崑取琰曠而不溢奢而無玷事類第三十八事類者盖文章之外據事以類義援古以證今者也昔文王繇易剖判爻位既濟九三逺引髙宗之伐明夷六五近書箕子之貞斯略舉人事以徴義者也至若𦙍征羲和陳正典之訓盤庚誥民叙遲任之言此全引成辭以明理者也然則明理引乎成辭徴義舉乎人事迺聖賢之鴻謨經籍之通矩也大畜之象君子以多識前言往行亦有包扵文矣觀夫屈宋屬篇號依詩人雖引古事而莫取舊辭惟賈誼鵩賦始用鶡冠之說相如上林撮引李斯之書此萬分之一㑹也及揚雄百官箴頗酌扵詩書劉歆遂初賦歴叙扵紀傳漸漸綜採矣至扵崔班張蔡遂捃摭經史華實布濩因書立功皆後人之範式也夫薑桂同地辛在本性文章由學能在天資才自内發學以外成有學飽而才餒有才富而學貧學貧者迍邅扵事義才餒者劬勞扵辭情此内外之殊分也是以屬意立文心與筆謀才為盟主學為輔佐主佐合徳文采必覇才學褊狭雖美少功夫以子雲之才而自奏不學及觀書石室乃成鴻采表裡相資古今一也故魏武稱張子之文為拙然學問膚淺所見不博専拾掇崔杜小文所作不可悉難難便不知所出斯則寡聞之病也夫經典沈深載籍浩瀚實群言之奥區而才思之神皋也揚班以下莫不取資任力耕耨縦意漁獵操刀能割必裂膏腴是以将贍才力務在博見狐腋非一皮能温雞蹠必數千而飽矣是以綜學在博取事貴約校練務精捃理湏覈衆美輻輳表裏發揮劉劭趙都賦云公子之客叱勁楚令歃盟管庫𨽻臣呵强秦使鼓缶用事如斯可謂理得而義要矣故事得其要雖小成績譬寸轄制輪尺樞運闗也或㣲言美事置於閒散是綴金翠於足脛靚粉黛扵胷臆也凡用舊合機不啻自其口出引事乖謬雖千載而為瑕陳思群才之英也報孔璋書云葛天氏之樂千人唱萬人和聴者因以蔑韶夏矣此引事之實謬也按葛天之歌唱和三人而已相如上林云奏陶唐之舞聴葛天之歌千人唱萬人和唱和千萬人乃相如接人然而濫侈葛天推三成萬者信賦妄書致斯謬也陸機園葵詩云庇足同一智生理合異端夫葵能衛足事譏鮑荘葛藟庇根辭自樂豫若譬葛為葵則引事為謬若謂庇勝衛則改事失真斯又不精之患夫以子建明練士衡沉宻而不免扵謬曹仁之謬髙唐又曷足以嘲哉夫山朩為良匠所度經書為文士所擇木美而定扵斧斤事美而制扵刀筆研思之士無慙匠石矣賛曰經籍深富辭理遐亘皜如江海鬱若崑鄧文梓共採瓊珠交贈用人若已古来無懵練字第三十九夫文象列而結繩移鳥跡明而書契作斯乃言語之體貌而文章之宅宇也蒼頡造之鬼哭粟飛黄帝用之官治民察先王聲敎書必同文輶軒之使紀言殊俗所以一字體總異音周禮保章氏掌敎六書秦㓕舊章以吏為師及李斯刪籀而秦篆興程邈造𨽻而古文廢漢初草律明著厥法太史學童教試六體又吏民上書字謬輙劾是以馬字缺畫而石建懼死雖云性慎亦時重文也至孝武之世則相如譔篇及宣成二帝徴集小學張敞以正讀傳業揚雄以竒字纂訓並貫練雅頌總閱音義鴻筆之徒莫不洞曉且多賦京苑假借形聲是以前漢小學率多瑋字非獨制異乃共曉難也暨乎後漢小學轉踈複文隠訓臧否大半及魏代綴藻則字有常檢追觀漢作翻成阻奥故陳思稱楊馬之作趣幽㫖深讀者非師傳不能析其辭非博學不能綜其理豈直才懸抑亦字隠自晉来用字率從簡易時並習易人誰取難今一字詭異則羣句震驚三人弗識則将成字妖矣後世所同曉者雖難斯易時所共廢雖易斯難趣舍之間不可不察夫爾雅者孔徒之所纂而詩書之襟帶也蒼頡者李斯之所輯而鳥籀之遺體也雅以淵源誥訓頡以苑囿竒文異體相資如左右肩股該舊而知新亦可以屬文若夫義訓古今興廢殊用字形單複妍蚩異體心既託聲扵言言亦寄形扵字諷誦則績在宫商臨文則能歸字形矣是以綴字屬篇必湏練擇一避詭異二省聫邊三權重出四調單複詭異者字體瓌怪者也曹攄詩稱豈不願斯逰􅄶心惡􅀈呶兩字詭異大疵美篇况乃過此其可觀乎聨邊者半字同文者也狀貌山川古今咸用施扵常文則齟齬為瑕如不獲免可至三接三接之外其字林乎重出者同字相犯者也詩騷適㑹而近世忌同若兩字俱要則寧在相犯故善為文者富扵萬篇貧扵一字一字非少相避為難也單複者字形肥瘠者也瘠字累句則纎踈而行劣肥字積文則黯黕而篇闇善酌字者叄伍單複磊落如珠矣凡此四條雖文不必有而體例不無若值而莫悟則非精觧至扵經典隠曖方冊紛綸簡蠧帛裂三寫易字或以音訛或以文變子思弟子於穆不祀者音訛之異也晉之史記三豖渡河文變之謬也尚書大傳有别風淮雨帝王世紀云列風淫雨别列淮淫字似潜移淫列義當而不竒淮别理乖而新異傅毅制誄巳用淮雨固知愛竒之心古今一也史之闕文聖人所慎若依義棄竒則可與正文字矣賛曰篆𨽻相鎔蒼雅品訓古今殊跡妍蚩異分字靡異流文阻難運聲畫昭精墨采騰奮隠秀第四十夫心術之動逺矣文情之變深矣源奥而派生根盛而穎峻是以文之英蕤有秀有隠隠也者文外之重㫖者也秀也者篇中之獨拔者也隠以複意為工秀以卓絶為巧斯乃舊章之懿績才情之嘉㑹也夫隠之為體義生文外祕響傍通伏采潜發譬爻象之變互體川瀆之韞珠玉也故互體變爻而化成四象珠玉潜水而瀾表方圓始正而末竒内明而外潤使翫之者無窮味之者不厭矣彼波起辭間是謂之秀纎手麗音宛乎逸態若逺山之浮烟靄孌女之靚容華然煙靄天成不勞扵粧㸃容華格定無待扵裁鎔深淺而各竒􅀈纎而俱妙若揮之則有餘而攬之則不足矣夫立意之士務欲造竒每馳心扵𤣥黙之表工辭之人必欲臻美恒溺思扵佳麗之鄉嘔心吐膽不足語窮煅嵗煉年奚能喻苦故能藏穎詞間昏迷扵庸目露鋒文外驚絶乎妙心使醖藉者蓄隠而意愉英銳者抱秀而心恱譬諸裁雲製霞不讓乎天工斵卉刻葩有同乎神匠矣若篇中乏隠等宿儒之無學或一叩而語窮句間鮮秀如巨室之少珍若百詰而色沮斯並不足扵才思而亦有媿於文辭矣将欲徴隠聊可指篇古詩之離别樂府之長城詞怨㫖深而復兼乎比興陳思之黄雀公幹之青松格剛才勁而並長扵諷諭叔夜之闕二字嗣宗之闕二字境𤣥思澹而獨得乎優閑士衡之闕二字彭澤之闕二字心宻語澄而俱適乎壮采如欲辨秀亦惟摘句常恐秋節至凉颷奪炎熱意悽而詞婉此匹婦之無聊也臨河濯長纓念子悵悠悠志髙而言壮此丈夫之不遂也東西安所之徘徊以旁皇心孤而情懼此閨房之悲極也朔風動秋草邊馬有歸心氣寒而事傷此覊旅之怨曲也凡文集勝篇不盈十一篇章秀句裁可百二並思合而自逢非硏慮之所求也或有晦塞為深雖奥非隠雕削取巧雖美非秀矣故自然㑹妙譬卉朩之耀英華潤色取美譬繒帛之染朱緑朱緑染繒深而繁鮮英華曜樹淺而煒煜秀句所以照文苑盖以此也賛曰深文隠蔚餘味曲包辭生互體有似變爻言之秀矣萬慮一交動心驚耳逸響笙匏文心雕龍巻八
