  text: 勰撰其書原
  hash: sha256:4341289ff473360bbc9c512c87c03a8795c5d1a718b54f67065f6cfbeefa64a2
body:
  text: 道以下二十五篇論文章體製神思以下二十四篇論文章工拙合序志一篇為五十篇據序志篇稱上篇以下下篇以上本止二巻然隋志已作十巻盖後人所分又據其篇中所言此書實成于齊代此本署梁通事舎人劉勰撰亦後人追題也是書自至正乙未刻于嘉禾至明𢎞治嘉靖萬厯間凡經五刻其隠秀一篇皆有缺文明末常熟錢功甫稱得阮華山宋槧本鈔補四百餘字然其書晚出别無顯證其詞亦頗不類如嘔心吐膽似摭李賀小傳語鍜嵗煉年似摭六一詩話論周朴語稱班姫為匹婦亦似摭鍾嶸詩品語皆有可疑况至正去宋未逺不應宋本已無一存三百年後乃為明人所得又考永樂大典所載舊本闕文亦同其時宋本如林更不應内府所藏無一完刻阮所稱殆亦影撰何焯等誤信之也至字句舛訛自楊慎朱謀㙔以下遞有校正而亦不免於妄改如哀弔篇賦憲之諡句皆云賦憲當作議徳盖以賦形近議憲形近悳悳古徳字也然考王應麟玉海曰周書諡法惟三月既生魄周公旦太公望相嗣王發既賦憲受臚于物之野將𦵏乃制作諡文心雕龍云賦憲之諡出於此然則二字不誤古人已言以是例之其以意雌黄者多矣乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀文心雕龍原序文心雕龍凡十巻合篇終序志一篇為五十篇梁通事舎人劉勰彦和所作也勰東莞人自言嘗夜夢執丹漆之器随仲尼而南行窹而思敷讃聖㫖莫若注經而馬鄭諸儒𢎞之巳精就有深觧未足立家惟文章之用有禆經典於是搦筆和墨論著古今文體以成此書出示沈約約大重之謂其深得文理常陳之几案今讀其文出入六經貫穿百氏逺搜荒古之世近窮㝢内之事精推顥穹之㣲粗及塵礫之細陳明王之禮樂述大聖之道徳蔚如也至其陽秋先後作家衮鉞區分瑕瑜不掩百秊斷案莫之異同非慱學雄辯深識遐究烏能及兹若夫論著為文之義敶古繹今别裁分體如方圓之規矩聲音之律吕雖使班馬長雲並列將彬彬與揖共升㳺夏之堂矣論者以六朝齊梁而下佛學昌熾為文多工纎巧駢驪氣亦衰靡概以律勰豈通論哉方今海内文教盛隆操觚之士争崇古雅獨是書時罕印本好古者思欲致之恒病購求之難吾邑汪子仁卿慱文談藝喜而校刻之嗚呼此刻既行世有休文寧無同賞音者吾知雋永之餘固不必鐫肝刻肺抽黄對白而於文也亦思過半矣時嘉靖庚子六月既望書於葵栢山齋新安石巖方元禎欽定四庫全書文心雕龍巻一梁劉勰撰原道第一文之為徳也大矣與天地並生者何哉夫𤣥黄色雜方圓體分日月疊璧以垂麗天之象山川煥綺以鋪理地之形此盖道之文也仰觀吐曜俯察含章髙卑定位故兩儀既生矣惟人參之性靈所鍾是謂三才為五行之秀人實天地之心生心生而言立言立而文明自然之道也傍及萬品動植皆文龍鳯以藻繪呈瑞虎豹以炳蔚凝姿雲霞雕色有踰畫工之妙草朩賁華無待錦匠之竒夫豈外飾盖自然耳至於林籟結響調如竽瑟泉石激韻和若球鍠故形立則章成矣聲發則文生矣夫以無識之物欝然有彩有心之器其無文歟人文之元肇自太極幽讃神明易象惟先庖犧畫其始仲尼翼其終而乾坤兩位獨制文言言之文也天地之心哉若廼河圖孕乎八卦洛書韞乎九疇玉版金鏤之實丹文緑牒之華誰其尸之亦神理而已自鳥跡代繩文字始炳炎曍遺事紀在三墳而年世𣺌邈聲采靡追唐虞文章則煥乎始盛元首載歌既發吟詠之志益稷陳謀亦垂敷奏之風夏后氏興業峻鴻績九序惟歌勲徳彌縟逮及商周文勝其質雅頌所被英華日新文王患憂繇辭炳曜符采􅃨隱精義堅深重以公旦多材振其徽烈剬詩緝頌斧藻羣言至夫子繼聖獨秀前哲鎔鈞六經必金聲而玉振雕琢情性組織辭令朩鐸啓而千里應席珍流而萬世響寫天地之輝光曉生民之耳目矣爰自風姓暨於孔氏𤣥聖創典素王述訓莫不原道心以敷章研神理而設教取象乎河洛問數乎蓍龜觀天文以極變察人文以成化然後能經緯區宇彌綸彞憲發輝事業彪炳辭義故知道㳂聖以垂文聖因文而明道旁通而無涯日用而不匱易曰鼔天下之動存乎辭辭之所以能鼔天下者廼道之文也賛曰道心惟㣲神理設教光采𤣥聖炳燿仁孝龍圖獻體龜書呈貎天文斯觀民胥以俲徴聖第二夫作者曰聖述者曰明陶鑄性情功在上哲夫子文章可得而聞則聖人之情見乎文辭矣先王聖化布在方册夫子風采溢於格言是以逺稱唐世則煥乎為盛近褒周代則郁哉可從此政化貴文之徴也鄭伯入陳以立辭為功宋置折爼以多文舉禮此事蹟貴文之徴也褒美子産則云言以足志文以足言泛論君子則云情欲信辭欲巧此脩身貴文之徴也然則志足而言文情信而辭巧廼含章之玉牒秉文之金科矣夫鑒周日月妙極機神文成規矩思合符契或簡言以達㫖或博文以該情或明理以立體或隠義以蔵用故春秋一字以褒貶喪服舉輕以包重此簡言以達㫖也邠詩聯章以積句儒行縟說以繁辭此博文以該情也書契斷决以象夬文章昭晰以象離此明理以立體也四象精義以曲隠五例㣲辭以婉晦此隠義以蔵用也故知繁略殊形隠顯異術抑引隨時變通㑹適徴之周孔則文有師矣是以子政論文必徵於聖稚圭勸學必宗於經易稱辨物正言斷辭則備書云辭尚體要弗惟好異故知正言所以立辯體要所以成辭辭成無好異之尤辯立有斷辭之義雖精義曲隠無傷其正言㣲辭婉晦不害其體要體要與㣲辭偕通正言共精義並用聖人之文章亦可見也顔闔以為仲尼飾羽而畫徒事華辭雖欲訾聖弗可得已然則聖文之雅麗固衘華而佩實者也天道難聞猶或鑽仰文章可見胡寧勿思若徴聖立言則文其庶矣賛曰妙極生知睿哲惟宰精理為文秀氣成采鑒懸日月辭富山海百齡影徂千載心在宗經第三三極彞訓其書言經經也者恒久之至道不刋之鴻教也故象天地效鬼神參物序制人紀洞性靈之奥區極文章之骨髓者也皇世三墳帝代五典重以八索申以九丘歳厯綿曖條流紛糅自夫子刋述而大寳咸耀於是易張十翼書標七觀詩列四始禮正五經春秋五例義既極乎性情辭亦匠於文理故能開學養正昭明有融然而道心惟㣲聖謨卓絶墻宇重峻而吐納自深譬萬鈞之洪鍾無錚錚之細響矣夫易惟談天入神致用故繫稱㫖逺辭文言中事隠韋編三絶固哲人之驪淵也書實記言而詁訓茫昧通乎爾雅則文章曉然故子夏歎書昭昭若日月之明離離如星辰之行言昭灼也詩主言志詁訓同書摛風裁興藻辭譎喻温柔在誦故最附深𠂻矣禮以立體據事剬範章條纎曲一字見義五石六鷁以詳略成文雉門兩觀以先後顯㫖其婉章志晦諒以䆳矣尚書則覽文如詭而尋理即暢春秋則觀辭立曉而訪義方隐此聖人之殊致表裏之異體者也至根柢槃深枝葉峻茂辭約而㫖豐事近而喻逺是以往者雖舊餘味日新後進追取而非曉前脩文用而未先可謂泰山徧雨河潤千里者也故論說辭序則易統其首詔策章奏則書發其源賦頌謌讚則詩立其本銘誄箴祝則禮總其端紀傳銘檄則春秋為根並窮髙以樹表極逺以啟疆所以百家騰躍終入環内者也若禀經以製式酌雅以富言是仰山而鑄銅煑海而為鹽也故文能宗經體有六義一則情深而不詭二則風清而不雜三則事信而不誕四則義直而不回五則體約而不蕪六則文麗而不淫楊子比雕玉以作器謂五經之含文也夫文以行立行以文傳四教所先符采相濟勵徳樹聲莫不師聖而建言脩辭鮮克宗經是以楚艷漢侈流弊不還正末歸本不其懿歟賛曰三極彞道訓深稽古致化歸一分教斯五性靈鎔匠文章奥府淵哉鑠乎羣言之祖正緯第四夫神道闡幽天命㣲顯馬龍出而大易興神龜見而洪範燿故繫辭稱河出圖洛出書聖人則之斯之謂也但世夐文隠好生矯誕真雖存矣偽亦憑焉夫六經彪炳而緯候稠疊孝論昭晳而鉤䜟葳㽔按經驗緯其偽有四盖緯之成經其猶織綜絲麻不雜布帛乃成今經正緯竒倍擿千里其偽一矣經顯聖訓也緯隠神教也聖訓宜廣神教宜約而今緯多於經神理更繁其偽二矣有命自天廼稱符䜟而八十一篇皆託於孔子則是堯造緑圖昌制丹書其偽三矣商周以前圖録頻見春秋之末羣經方備先緯後經體乖織綜其偽四矣偽既倍摘則義異自明經足訓矣緯何豫焉原夫圖籙之見廼昊天休命事以瑞聖義非配經故河不出圖夫子有歎如或可造無勞喟然昔康王河圖陳於東序故知前世符命歴代寳傳仲尼所撰序録而已於是伎數之士附以詭術或說隂陽或序災異若鳥鳴似語蟲葉成字篇條滋蔓必假孔氏通儒討覈謂起哀平東序祕寳朱紫亂矣至於光武之世篤信斯術風化所靡學者比肩沛獻集緯以通經曹襃撰䜟以定禮乖道謬典亦已甚矣是以桓譚疾其虛偽尹敏戯其深瑕張衡發其僻謬荀恱明其詭誕四賢博練論之精矣若乃羲農軒皥之源山瀆鍾律之要白魚赤烏之符黄金紫玉之瑞事豐竒偉辭富膏腴無益經典而有助文章是以後来辭人採摭英華平子恐其迷學奏令禁絶仲豫惜其雜真未許煨燔前代配經故詳論焉賛曰榮河温洛是孕圖緯神寳藏用理隠文貴世厯二漢朱紫騰沸芟夷譎詭糅其雕蔚辯騷第五自風雅寢聲莫或抽緒竒文欝起其離騷哉固已軒翥詩人之後奮飛辭家之前豈去聖之未逺而楚人之多才乎昔漢武愛騷而淮南作傳以為國風好色而不滛小雅怨誹而不亂若離騷者可謂兼之蟬蛻穢濁之中浮游塵埃之外㬭然湼而不緇雖與日月爭光可也班固以為露才揚已忿懟沉江羿澆二姚與左氏不合崑崙懸圃非經義所載然其文辭麗雅為詞賦之宗雖非明哲可謂妙才王逸以為詩人提耳屈原婉順離騷之文依經立義駟虬乗翳則時乗六龍崑崙流沙則禹貢敷土名儒辭賦莫不擬其儀表所謂金相玉質百世無匹者也及漢宣嗟歎以為皆合經術揚雄諷味亦言體同詩雅四家舉以方經而孟堅謂不合傳褒貶任聲抑揚過實可謂鑒而弗精翫而未覈者也將覈其論必徴言焉故其陳堯舜之耿介稱湯武之祗敬典誥之體也譏桀紂之猖披傷羿澆之顛隕規諷之㫖也虬龍以喻君子雲蜺以譬讒邪比興之義也每一顧而淹涕歎君門之九重忠怨之辭也觀兹四事同於風雅者也至於託雲龍說迂怪豐隆求宓妃鴆鳥媒娀女詭異之辭也康回傾地夷羿彃日朩天九首土伯三目譎怪之談也依彭咸之遺則從子胥以自適狷狹之志也士女雜座亂而不分指以為樂娱酒不廢沉􅊺日夜舉以為懽荒滛之意也摘此四事異乎經典者也故論其典誥則如彼語其夸誕則如此固知楚辭者體慢於三代而風雅於戰國乃雅頌之博徒而詞賦之英傑也觀其骨鯁所樹肌膚所附雖取鎔經意亦自鑄偉辭故騷經九章朗麗以哀志九歌九辯綺靡以傷情逺遊天問瓌詭而惠巧招魂招隠耀艶而深華卜居摽放言之致漁父寄獨徃之才故能氣徃轢古辭來切今驚采絶艶難與並能矣自九懐以下遽躡其跡而屈宋逸歩莫之能追故其叙情怨則欝伊而易感述離居則愴怏而難懐論山水則循聲而得貎言節候則披文而見時是以枚賈追風以入麗馬楊㳂波而得竒其衣被詞人非一代也故才髙者菀其鴻裁中巧者獵其艶辭吟諷者衘其山川童䝉者拾其香草若能憑軾以倚雅頌懸轡以馭楚篇酌竒而不失其真翫華而不墜其實則顧盻可以驅辭力欬唾可以窮文致亦不復乞靈於長卿假寵於子淵矣賛曰不有屈原豈見離騷驚才風逸壯志烟髙山川無極情理實勞金相玉式艷溢錙毫文心雕龍巻一
