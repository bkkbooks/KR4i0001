front:
  text: 文心雕龍卷之四
  hash: sha256:efbdaf6f0ede94b202f8859f6173c723f1337c9068712f4f4ed8ec7ddd43d0e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0001_SBCK_004-1a}
body:
  text: 梁通事舍人東莞劉勰撰史傳第十六開闢草昧歳紀綿邈居今識古其載籍乎軒轅之世史有蒼頡主文之識其來久矣曲禮曰史載筆左右使之記巳者左史記事者右史記言者言經則尚書事經則春秋唐虞流于典謨商夏被于誥誓洎周命惟新姬公定法紬三正以班曆貫四時以聯事諸侯建􅀖各有國史彰善癉惡樹之風聲自平王微弱政不及雅憲章散紊彞倫攸斁夫子閔王道之缺傷斯文之墜静居以歎鳯臨衢而泣麟於是就大師以正雅頌因魯史以修春秋舉得失以表黜陟徵存亡以摽勸戒襃見一字貴踰軒冕貶在片言誅深斧􅃏然睿㫖存亡幽隱經文婉約丘明同時實得微言乃原始要終創爲傳體傳者轉也轉受經㫖以授其後實聖文之羽翮記籍之冠冕也至從橫之世史職猶存秦并七王而戰國有䇿蓋錄而弗敘故節簡而爲名也漢㓕羸項武功積年陸賈稽古作楚漢春秋爰及太史談世惟執簡子長繼至甄序帝勣比堯稱典則位雜中賢法孔題經則文非元聖故取式呂覽通號曰紀紀綱之號亦宏稱也故本紀以述皇王列傳以總侯伯八書以鋪政體十表以譜年爵雖殊古式而得事序焉爾其實錄無隱之㫖博雅弘辨之才愛奇反經之尤條例踳落之失叔皮論之詳矣及班固述漢因循前業觀司馬遷之辭思實過半其十志該富讚序弘麗儒雅彬彬信有遺味至於宗經矩聖之典端緒豐贍之功遺親攘美之罪徵賄鬻筆之愆公理辨之究矣觀夫左氏綴事附經間出於文爲約而氏族難明及史遷各傳人始區詳而易覽述者宗焉及孝惠委機呂后攝政班史立紀並違經實何則庖犧以來未聞女帝者也漢運所値難爲後法牝雞無晨武王首誓婦無與國齊桓著盟宣后亂秦呂氏危漢豈唯政事難假亦名號宜愼矣張衡同史而或同遷固元年二后欲爲立紀謬亦甚矣尋子弘雖僞要當孝惠之嗣孺子誠微實繼平帝之體二子可紀何有於三后哉至于後漢紀傳發源東觀􅀽張所制偏駁不倫薛謝之作疎謬少信司馬彪之詳實華嶠之凖當則其冠也及魏代三雄記傳互出陽秋魏略之屬江表吳計先集太史之府欲其詳悉於體國必閱石室啓金匱抽裂帛檢殘竹欲其博練於稽古也是立義選言宜依經以樹則勸戒與奪必附聖以居宗然後銓評昭整苛濫不作矣然紀傳爲式編年綴事文非泛論按實而書歲遠則同異難宻事積則起訖易疎斯固總㑹之爲難也或有同歸一事而數人分功兩記則失於複重偏舉則病於不周此又銓配之未易也故張衡摘史班之舛濫傅玄譏後漢之尤煩皆此􅀋也若夫追述遠代代遠多僞公羊高云傳聞異辭荀况稱錄遠略近蓋文疑則闕貴信史也然俗皆愛奇莫顧實理傳聞而欲偉其事録遠而欲詳其跡於是棄同卽異穿鑿傍說舊史所無我書則傳此訛濫之本源而述遠之巨蠧也至於記編時同多詭雖定哀微辭而世情利害勲勞之家雖庸夫而盡飾迍敗之士雖令德而常􅅓理欲吹霜噴露寒暑筆端此入同時之枉可歎息者也欲述遠則誣矯如彼記近則囘邪如此析理居正唯素心乎若乃尊賢隱諱固尼父之聖㫖蓋纎瑕不能玷瑾瑜也姦慝懲戒實良史之􅀡筆農夫見莠其必鋤也若斯之科亦萬代一凖焉至於㝷繁領雜之術務信棄奇之要明白頭訖之序品酌事例之條曉其大綱則衆理可貫然史之爲任乃彌綸一代􅀒海内之責而贏是非之尤秉筆荷擔莫此之勞遷固通矣而歷詆後世若任情失正文其殆哉贊曰史肇軒黄體備周孔世歷斯編善惡偕總騰襃裁貶萬古䰟動辭宗丘明􅀡歸南董諸子第十七諸子者入道見志之書太上立德其次立言百姓之羣居苦紛雜而莫顯君子之處世疾名德之不章唯英才特逹則炳曜垂文騰其姓氏懸諸日月焉昔風后力牧伊尹咸其流也篇述者蓋上古遺語而戰代所記者也至鬻熊知道而文王諮詢餘文遺事錄爲鬻子子自肇始莫先於兹及伯陽識禮而仲尼訪問爰序道德以冠百氏然則鬻惟文友李實孔師聖賢並世而經子異流矣逮及七國力政俊乂蠭起孟軻膺儒以磬折莊周述道以翶翔墨翟執儉确之教尹文課名實之符野老治國於地利騶子養政於天文申啇刀鋸以制理􅀑谷脣吻以䇿勲尸狡兼總於雜術靑史曲綴以街談承流而枝附者不可勝筭並飛辨以馳術饜禄而餘榮矣曁于􅍊秦烈火􅀔炎崐岡而煙燎之毒不及諸子逮漢成普思子政讎校於是七略芬菲流鱗萃止殺靑所編百有八十餘家矣迄至魏􅀳作者間出讇言兼存璅語必錄􅀋聚而求亦充箱照軫矣然繁辭雖積而本體易總述道言治枝條五經其純粹者入矩踳駁者出規禮記月令取乎呂氏之紀三年問喪寫乎荀子之書此純粹之類也若乃湯之問􅁄云蚊睫有雷霆之聲惠施對梁王云蝸角有伏尸之戰列子有移山跨海之談淮南有傾天折地之說此踳駁之類也是以世疾諸混洞虚誕按歸藏之經大明迂怪乃稱羿斃十日姮娥奔月殷湯如兹况諸子乎至如啇韓六虱五蠧棄孝廢仁轅藥之禍非虚至也公孫之白馬􅀌犢辭巧理拙魏牟比之鴞鳥非妄貶也昔東平求諸子史記而漢朝不與蓋以史記多兵謀而諸子雜詭術也然洽聞之士宜撮綱要覽華而食實棄邪而採正極睇參差亦學家之壯觀也研夫孟荀所述理懿而辭雅管晏屬篇事覈而言練列御冦之書氣偉而采奇鄒子之說心奢而辭壯墨翟隨巢意顯而語質尸佼尉繚術通而文鈍鶡冠綿綿亟􅀤深言􅀑谷􅄅􅄅毎環其義情辨以澤文子擅其能辭約而精尹文得其要愼到折􅁡理之巧韓非著博喻之富呂氏鑒遠而體周淮南汎採而文麗斯則得百氏之華采而辭氣文之大略也若夫陸賈典語賈誼新書揚雄法言劉向說􅁐王符濳夫崔寔正論仲長昌言杜夷幽求咸叙經典或明政術雖摽論名歸乎諸子何者博明萬事爲子適辨一理爲論彼皆蔓延雜說故入諸子之流夫自六國以前去聖未遠故能越世高談自開戸牗兩漢以後體􅀔浸弱難明于坦途而􅀋多依採此逺近之漸變也嗟夫身與時舛志共道申摽心於萬古之上而送懷於于載之下金石靡矣聲其銷乎贊曰大夫處世懷實挺秀辨雕萬物智周宇宙立德何隱含道必授條流殊述若有區囿論說第十八聖世彞訓曰經述經敘理曰論論者倫也倫理有無聖意不墜昔仲尼微言門人追記故仰其經目稱爲論語蓋羣論立名始於兹矣自論語巳前經無論字六韜二論後人追題乎詳觀論體條流多品陳政則與議說合契釋經則與傳注參體辨史則與贊評齊行銓文則與敘引共紀故議者宜言說者說語傳者轉師注者主解贊者明意評者平理序者次事引者㣧辭八名區分一揆宗論論也者彌綸羣言而研一理者也是以莊周齊物以論爲名不韋春秋六論昭列至石渠論藝白虎通講聚述聖言通經論家之正體也及班彪王命嚴允三將敷述昭情善入史體魏之􅀄覇術兼名法傅碬王粲校練名理迄至正始務欲守文何晏之徒始盛玄論於是聃周當路與尼父爭􅂗矣詳觀蘭碩之才性仲宣之去代叔夜之辨聲太􅀄之本玄輔嗣之兩例平叔之二論並師心獨見鋒頴精宻蓋人倫之英也至如李康運命同論衡而過之陸機辨正效過秦而不及然其美矣次及宋代郭䝉銳思於機神之區夷甫裴頠交辨於有無之域並獨歩當時流聲後代然滯有者全繫於形用貴無者專守於寂寥徒銳偏解莫詣正理動極神源其般若之絶境乎逮江左羣談惟玄是務雖有日新而多抽前緒矣至如張衡譏世韻似排說孔融孝廉但談嘲戯曹植辨道體同書抄才不持論寧如其巳原夫論之爲體所以辨正然否窮有數追無形迹堅求通鈎深取極乃百慮之筌蹄萬事之權衡也故其義貴圓通辭忌枝碎必使心與理合彌縫莫見其􅂩辭共心宻敵人不知所乘斯其要也是以論如析薪貴能破理斤利者越理而橫斷辭辨者反義而取通覽文雖巧而檢跡如妄唯君子能通天下之志安可以曲論哉若夫注釋爲詞解散論體􅇎文雖異總㑹是同若秦君延之注堯典十餘萬字朱普之解尚書三十萬言所以通人惡煩差學章句若毛公之訓詩安國之傳書鄭君之釋禮王弼之解易要約明暢可謂式矣說者悅也言咨悅懌過悅必僞􅀃之善者伊尹以論味隆殷太公以辨釣興周及燭武行而紓鄭端木出而存魯亦其美也曁戰國爭雄辨士雲踊從橫參謀長短角􅀔轉丸騁其巧辭飛鉗伏其精術一人之辨重於九鼎之寳三寸之舌強於百萬之師六印磊落以佩五都隱賑而封至漢定秦楚辨士弭節酈君旣斃於齊鑊蒯子幾入乎漢鼎雖復陸賈籍甚張釋傅㑹杜欽文辨樓護脣舌頡頏萬乘之階抵嘘公􅀸之席並順風以託􅀔莫能逆波而泝洄矣夫說貴撫㑹㢮張相隨不專緩頰亦在刀筆范雎之言事李斯之止逐客並煩情入機動言中務雖批逆鱗而功成計合此上書之善說也至鄒陽之說呉梁喻巧而理至故雖危而無咎矣敬通鮑鄧事緩而文繁所以歷聘而罕過也凡論之樞要必使時利而義貞進有契於成務退無阻於榮身自非譎敵則唯忠與信披䏏膽以獻主飛文敏以濟辭此說之本也而陸氏􅀡稱說煒曄以譎誑何哉贊曰理形於言叙理成論詞深人天致遠方寸隂陽莫貳􅀑神靡遯說爾飛鉗呼吸沮勸詔䇿第十九皇帝御㝢其言也神淵嘿黼扆而響盈四表唯詔䇿乎昔軒轅唐虞同稱爲命命之爲義制性之本也其在三代事兼誥誓誓以訓戎誥以敷政命喻自天故授管錫㣧易之姤􅁚后以施命誥四方誥命動民若天下之有風矣降及七國並稱曰令命者使也秦并天下改命曰制漢􅀄定儀則則命有四品一曰䇿書二曰制書三曰詔書四曰戒勑勑戒州􅀖詔誥百官制施赦命䇿對王侯䇿者簡也制者裁也詔者告也勑者正也詩云畏此簡書易稱君子以制數度禮稱明君之詔書稱勑天之命並本經典以立名目逺詔近命習秦制也記稱絲綸所以應接羣后虞重納言周貴喉舌故兩漢詔誥職在尚書王言之大動入史䇿其出如綍不反若汗是以淮南有英才武帝使相如視草隴右多文士光武加意於書辭豈􅀡取美當時亦敬愼來葉矣觀文景以前詔體浮新武帝崇儒選言弘奥䇿對三王文同訓典觀戒淵雅埀範後代及制誥嚴􅂇卽云厭承明廬蓋寵才之恩也孝宣璽書責搏士陳遂亦故舊之厚也逮光武撥亂􅅏意斯文而造次喜怒時或偏濫詔賜鄧禹稱司徒爲堯勑責侯覇稱黃􅃏一下若斯之􅀋實乖憲章曁明帝崇學惟詔間出安和政㢮禮閣鮮才毎爲詔勑假手外請建安之末文理代興潘朂九錫典雅逸羣衞凱禪誥符命炳燿弗可加也自魏􅀳誥䇿職在中書劉放張華牙管斯任施命􅀤號洋洋盈耳魏文帝下詔辭義多偉至於作威作福其萬慮之一弊乎􅀳氏中興唯明帝崇才以温嶠文淸故中書自斯以後體慮風流矣夫王言崇祕大觀在上所以百辟其刑萬􅀖作孚故授官選賢則義炳重離之輝優文封䇿則氣含風􅀨之潤勑戒恒誥則筆吐星漢之華治戎爕伐則聲有洊雷之威靑灾肆赦則文有春露之滋明罰勑法則辭有秋霜之烈此詔䇿之大略也戒勑爲文實詔之切者周穆命鄧父受勑憲此其事也魏武稱作勑戒當指事而誥勿得依違曉治要矣及􅀳武勑戒備告百官勑都督以兵要戒州牧以董司警郡守以恤隱勒牙門以禦衛有訓典焉戒者愼也禹稱戒之用休君父至尊在三同極漢高祖之勑太子東方朔之戒子亦顧命之作也及馬援巳下各賂家戒班􅁎女戒足稱母師也教者效也言出而民效也契敷五教故王侯稱教昔鄭弘之守南陽條教爲後所述乃事緒明也孔融之守北海文教麗而罕於理乃治體乖也若諸􅁑孔明之詳約􅁃雅恭之明斷並理得而辭中辭之善也自教以下則又有命詩云有命在天明爲重也周禮曰師氏詔王爲輕命今詔重而命輕者古今之變也贊曰皇王施令寅嚴宗誥我有絲言兆民尹好輝音峻舉鴻風遠蹈騰義飛辭煥其大號檄移第二十震雷始於曜電出師先乎威聲故觀電而懼雷壯聽聲而懼兵威兵先乎聲其來巳久昔有虞始戒於國夏后初誓於軍殷誓軍門之外周將交刃而誓之故知帝世戒兵三王誓師宣訓我衆未及敵人也至周穆西征祭公謀父稱古有威讓之令令有文告之辭卽檄之本源也及春秋征伐自諸侯出懼敵弗服故兵出湏名振此威風􅁀彼昏亂劉獻公之所謂告之以文辭董之以師武者也齊桓征楚告菁茅之闕􅀳厲伐秦責其郜之焚管仲呂相奉辭先路詳其意義卽今之檄文曁乎戰國始稱爲檄檄者皦也宣露於外皦然明白也張儀檄楚書以尺二明白之文或稱露布播諸視聽也夫兵以定亂莫敢自專天子親戎則稱龔行天罰諸侯御師則云肅將王誅故分閫推轂奉辭伐罪非唯致果爲毅亦且厲辭爲武使聲如衡風所繫氣似􅍴搶所掃奮其武怒總其罪人懲其惡稔之時顯其貫盈之數揺姦宄之膽訂信愼之心使百尺之衝摧折於咫書萬雉之城顚墜於一檄者也觀隗􅅝之檄亡新有其三逆文不雕飾而辭切事明隴右文士得檄之體矣陳琳之檄壯有骨鯁雖姦閹携養章宻太甚􅀤丘模金誣過其虚然抗辭書釁皦然露固矣敢指曹公之鋒幸哉免􅀽黨之戮也鍾㑹檄蜀徵驗甚明桓公檄胡觀釁尤切並壯筆也凡檄之大體或述此休明或敘彼苛虐指天時審人事筭強弱角權􅀔摽蓍􅀛於前驗懸鞶鑑於巳然雖本國信實參兵詐譎詭以馳㫖煒曄以騰說凡此衆條莫或違之者也故其植義颺辭務在剛健挿羽以示迅不可使辭緩露板以宣衆不可使義隱必事昭而理辨氣盛而辭斷此其要也若曲趣宻巧無所取才矣又州􅀖徵吏亦稱爲檄固明舉之義也移者易也移風易俗令徃而民隨者也相如之難蜀老文曉而喻博有移檄之骨焉及劉歆之移太常辭剛而義辨文移之首也陸機之移百官言約而事顯武移之要者也故檄移爲用事兼文武其在金革則逆黨用檄煩命資移所以洗濯民心堅用符契意用小異而體義大同與檄參伍故不重論也贊曰三驅弛剛九伐先話鞶鑑吉㐫著􅀛成敗推壓鯨鯢抵落蜂蠆移寳易俗草偃風邁鄕貢士陸光宅校文心雕龍卷之四
