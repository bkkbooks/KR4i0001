  text: 文心雕龍卷之二
  hash: sha256:6fb83c02c7fd1a1ba5408099af00b88a72f4cd62d69778e3fae3c0bd3fe473ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0001_SBCK_002-1a}
body:
  text: 梁通事舍人東莞劉勰撰明詩第六大舜云詩言志歌永言聖謀所析義已明矣是以在心爲志􅀤言爲詩舒文載實其在兹乎詩者持也持人情性三百之蔽義歸無邪持之爲訓有符焉􅈛人禀七情應物斯感感物吟志莫非自然昔􅁑天氏樂辭云玄鳥在曲黃帝雲門理不空綺至堯有大唐之歌舜造南風之詩觀其二文辭逹而巳及大禹成功九序惟歌太康敗德五子咸怨順美匡惡其來久矣自啇曁周雅頌圓備四始彪炳六義環深子夏監絢素之章子貢悟琢磨之句故啇賜二子可與言詩自王澤殄竭風人輟采春秋觀志諷誦舊章酬酢以爲賔榮吐納而成身文逮楚國諷怨則離騷爲刺秦皇㓕典亦造仙詩漢初四言韋孟首唱匡諫之義繼􅁤周人孝武愛文栢梁列韻嚴馬之徒屬辭無方至成啼品錄三百餘篇朝章國采亦云周備而辭人遺翰莫見五言所以李陵班婕妤見疑於後代也按召南行露始肇半章孺子滄浪亦有全曲暇豫優歌逺見春秋邪徑童謠近在成世閱時取證則五言久矣又古詩佳麗或稱枚叔其􅀌竹一篇則傅毅之詞比采而推兩漢之作乎觀其結體散文􅀡而不野婉轉附物怊悵切情實五言之冠冕也至於張衡怨篇清曲可味仙詩緩歌雅有新聲暨建安初五言騰踴文帝陳思縱轡以騁節王徐應劉望路而爭驅並憐風月狎池􅁐述恩榮叙酣宴慷􅁣以任氣磊落以使才造懷指事不求纎宻之巧驅辭逐貌唯取昭哲之能此其所同也乃正始明道詩雜仙心何晏之徒率多浮淺唯稽㫖清峻阮㫖遥深故能摽焉若乃應璩百一獨立不懼辭譎義貞亦魏之遺􅀡也􅀳世羣才稍入輕綺張潘左陸比肩詩衢采縟於正始力柔於建安或㭊文以爲妙或流靡以自妍此其大略也江左篇製溺乎玄風嗤笑狥務之志崇盛亡機之談袁孫巳下雖各有雕采而辭􅃐一揆莫與爭雄所以景純仙篇挺㧞而爲俊矣宋初文詠體有因革莊老告退而山水方滋儷采百字之偶爭價一句之奇情必極貌以寫物辭必窮力而追新此近世之所競也故鋪觀列代而情變之數可監撮舉同異而綱領之要可明矣若夫四言正體雅潤爲本五言流調淸麗居宗華實異用唯才所安故平子得其雅叔夜含其潤茂先凝其淸景陽振其麗兼善則子建仲宣偏美則太冲公幹然詩有恒裁思無定位隨性適分鮮能通圓若妙識所難其易也將至忽之爲易其難也方來至於三六雜言則自出篇什離合之發則明於圖䜟回文所興則道原爲始聯句共韻則栢梁餘製巨細或殊情理同致總歸詩囿故不繁云贊曰民生而志詠歌所含興發皇世風流二南神理共契政序相參英華彌縟萬代永耽樂府第七樂府者聲依永律和聲也鈞天九奏旣其上帝􅁑天八閱爰乃皇時自咸英以降亦無得而論矣至於塗山歌於候人始爲南音有娀謡乎飛燕始爲北聲夏甲歎於東陽東音以􅀤殷􅈊思于西河西音以興音聲推移亦不一槩矣及夫庶婦謳吟土風詩官採言樂育􅀍律志感絲篁氣變金石是以師曠覘風於盛衰季札鑒微於興廢精之至也夫樂本心術故響浹肌髓先王愼焉務塞滛濫敷訓胄子必歌九德故能情感七始化動八風自雅聲浸微溺音騰沸秦燔樂經漢初紹復制氏紀其鑑鏘叔孫定其容與於是武德興乎高祖四時廣於孝文雖摹韶夏而頗襲秦舊中和之響􅞔其不還曁武帝崇禮始立樂府總趙代之音撮齊楚之氣延年以曼聲協律朱馬以騷體製歌桂華雜曲麗而不經赤鴈羣篇靡而非典河間薦雅而罕御故汲黯致譏於天馬也至宣帝雅頌詩效鹿鳴邇及元成稍廣滛樂正音乖俗其難也如此曁後郊廟惟雜雅章辭雖典文而律非䕫曠至于魏之三祖氣爽才麗宰割辭調音靡節平觀其兆上衆引秋風列篇或述酣宴或傷覊戍志不出於滔蕩辭不離於哀思雖三調之正聲實韶夏之鄭曲也逮於􅀳世則傳玄暁音創定雅歌以詠祖宗張華新篇亦充庭萬然杜夔調律音奏舒雅荀最改懸聲節哀急故阮咸譏其離聲後人驗其銅尺和樂精妙固表裏而相資矣故知詩爲樂心聲爲樂體樂體在聲瞽師務調其噐樂心在詩君子宜正其文好樂無荒􅀳風所以稱逺伊其相謔鄭國所以云亡故知季札觀辭不􅀡聽聲而巳若夫􅃩歌婉孌怨志詄絶滛辭在曲正響焉生然俗聽飛馳職競新異雅詠溫㳟必欠伸魚睨竒辭切至則拊髀雀躍詩聲俱鄭自此階矣凡樂辭曰詩詩聲曰歌聲來被辭辭繁難節故陳思稱李延年閒於增損古辭多者則宜减之明貴約也觀高祖之詠大風孝武之歎來遲歌童被聲莫敢不協子建士衡咸有佳篇並無詔伶人故事謝絲管俗稱乖調蓋未思也至於斬伎鼓吹漢世鐃挽雖戎喪殊事而並總入樂府繆襲所致亦有可筭焉昔子政品文詩與歌别故略具樂篇以標區界贊曰八音摛文樹辭爲體謳吟垧野金石雲陛韶響難追鄭聲易啓豈惟觀樂於焉識禮銓賦第八詩有六義其二曰賦賦者鋪也鋪采摛文體物寫志也昔邵公稱公􅀸獻詩師箴賦傳云登高能賦可爲大夫詩序則同義傳說則異體總其歸塗實相枝幹劉向云明不歌而頌班固稱古詩之流也至如鄭莊之賦大隧士蔿之賦狐裘結言􅠊韻詞自巳作雖合賦體明而未融及靈均唱騷始廣聲貎然賦也者受命於詩人招字於楚辭也於是荀况禮智宋玉風鈞爰錫名號與詩畫境六義附庸蔚成大國遂客至以首引極貌以窮文斯蓋别詩之原始命賦之厥初也秦世不文頗有雜賦漢初辭人順流而作陸賈扣其端賈誼振其緒枚馬同其風王楊騁其􅀔臯翔巳下品物畢圖繁積於宣時校閱於成世進御之賦千有餘首討其源流信興楚而盛漢矣夫京殿􅁐獵述行序志並體國經野義尚光大旣履端於唱叙亦歸餘於總亂序以建言首引情本辭以理篇迭致文契按那之卒章閔言稱亂故知殷人輯頌楚人理賦斯並鴻裁之寰域雅文之樞轄也至於草區禽族鹿品雜􅀋則觸興致情因變取㑹擬諸形容則言務纎宻􅁚其物宜則理貴側附斯又小制之區畛竒巧之機要也觀夫荀結隱語事數自環宋􅀤巧談實始滛麗枚乘莵園舉要以㑹新相如上林繁􅀋以成艶賈誼鵩鳥致辨於情理子淵洞簫窮變於聲貌孟堅兩都朋約以雅贍張衡二京迅㧞以宏富子雲甘泉構深瑋之風延壽靈光合飛動之􅀔凡此十家並辭賦之流也及仲宣靡宻發端必遒偉長博通時逢壯采太冲安仁䇿勛於鴻規士衡子安底績於流制景純綺巧縟理有餘彦伯梗槩情韻不匱亦魏􅀳之賦首也原夫登高之㫖蓋覩物興情情以物興故義以明雅物以情觀故詞必巧麗麗詞雅義符采相勝如組織之品朱紫畫繪之著玄黃文雖新而有質色雖糅而有夲此立賦之大體也然逐末之儔蔑棄其本雖讀千賦愈惑體要遂使繁華損枝膏腴害骨無貴風􅁤莫益勸戒此楊子所以追悔雕蟲貽誚於霧縠者也贊曰賦自詩出分岐異􅂀寫物圖貌蔚似雕畫㭊滯必楊言庸無隘風歸麗則辭翦美稗頌讚第九四始之至頌居其極頌者容也所以美盛德而述形容也昔帝嚳之世咸墨爲頌以歌九韶自啇巳下文理允備夫化偃一國謂之風風正四方謂之雅容告神明謂之頌風雅序人事兼變正頌主告神義必純美魯人以公旦次編啇人以前王追錄斯乃宗廟之正歌非饗讌之常咏也時邁一篇周公所製哲人之頌規式存焉夫民各有心勿壅惟口􅀳興之稱原田魯民之刺裘鞸􅀡言不詠短辭以諷丘明子高並諜爲誦斯則野誦之變體浸被乎人事矣及三閭橘頌情采芬芳比􅀋寓意又覃及細物矣至於秦政刻文爰頌其德漢之惠景亦有述容㳂世並作相繼於時矣若夫子雲之表充國孟堅之序戴侯仲武之美顯宗史岑之述僖后或擬淸廟或範坰那雖深淺不同詳略各異其褒德顯容典章一也至於班傅之北征西逝變爲序引豈不褒過而謬體哉馬融之廣成上林雅而似賦何弄文而失質乎又崔瑗文學蔡邕樊渠並致美於序而簡約乎篇摯虞品藻頗爲精覈至云雜以風雅而不變㫖􅃐徒張虚論有似黃白之僞􅀃矣及魏􅀳辨頌鮮有出轍陳思所綴以皇子爲摽陸機積篇惟功臣最顯其褒貶雜居固末代之訛體也原夫頌惟典雅辭必清鑠敷寫似賦而不入華侈之區敬愼如銘而異乎規戒之域揄揚以􅀤藻汪洋以樹義唯纎曲巧致與情而變其大體所底如斯而巳讚者明也昔虞舜之祀樂正重讚蓋唱􅀤之辭也及益讚于禹伊陟贊于巫咸並颺言以明事嗟歎以助辭也故漢置鴻臚以唱拜爲讚卽古之遺語也至相如屬筆始讚荆軻及史班固書託贊褒貶約文以總錄頌體以論辭又紀傳侈評亦同其名而仲治流别謬稱爲述失之逺矣及景純注雅動植讚之義兼美惡亦猶頌之變耳然其爲義事生奬歎所以古來篇體促而不曠必結言於四字之句盤桓乎數韻之辭約舉以盡情昭灼以送文此其體也􅀤源雖逺而致用蓋寡大抵所歸其頌家之細條乎贊曰容體底頌勲業垂讚鏤影摛文聲理有爛年積逾逺音徽如旦降及品物炫辭作翫祝盟第十天地定位祀徧羣臣六宗旣禋三望咸秩甘雨和風是生􅁰稷兆民所仰美報興焉犧盛惟馨本於明德祝史陳信資乎文辭昔伊祈始蜡以祭八神其辭云土及其宅水歸其壑昆蟲無作草木歸其澤則上皇祝文愛在兹矣舜之祠田云荷此長耜耕彼南畒四海俱有利民之志頗形於言矣至於商履聖敬日躋玄牡告天以萬方罪巳卽郊禋之祠也素車禱旱以六事責躬則雩禜之文也及周之太祝掌六祀之辭是以庶物咸生陳於天地之郊旁作穆穆唱於迎日之拜夙興夜處言於附廟之祝多福無疆布於少牢之饋宜社􅀋禡莫不有文所以寅處於神袛嚴恭於宗廟也春秋巳下黷祀謟祭祀幣史辭靡神不至至於張老成室致善於歌哭之禱蒯聵臨戰􅀗佑於筋骨之請雖造次顚沛必於祝矣若夫楚辭招䰟可謂祝辭之組纚也漢之羣祀肅其㫖禮旣總碩儒之儀亦參方士之術所以祕祝移過異於成湯之心侲子􅇌疾同乎越巫之祝體失之漸也至如黃帝有祝邪之文東方朔有罵􅀑之書於是後之譴呪務於善罵唯陳思誥裁以正義矣若乃禮之祭祀事止告饗而中代祭文兼讚言行祭而兼讚蓋引神而作也又漢代山陵哀策流文周喪盛姬内史執策然則策本書贈因哀而爲文也是以義同於誄而文實告神誄首而哀末頌體而呪儀太史所作之讚因周之祝文也凡羣言􅀤華而降神實務修辭立誠在於無媿祈禱之式必誠以敬祭奠之楷宜㳟且哀此其大較也班固之祀濛山祈禱之誠敬也潘岳之祭􅁃婦奠祭之恭哀也舉彚而求昭然可鑒矣盟者明也騂毛白馬珠盤玉敦陳辭乎方明之下祝告於神明者也在昔三王詛盟不及時有要誓結言而退周衰屢盟以及要契始之以曹沫終之以毛遂及泰昭盟夷設黃龍之詛漢祖建侯定山河之誓然義存則克終道廢則渝始崇㬱在人呪何預焉若夫臧洪㰱辭氣截雲蜺劉琨錢誓精貫霏霜而無補於􅀳漢反爲􅄷讎故知信不由􅂨盟無益也夫盟之大體必序危機奬忠孝共存亡戮心力祈幽靈以取鑒指九天以爲正感激以立誠切至以敷辭此其所同也然非辭之難處辭爲難後之君子宜在殷鑒忠信可矣無恃神焉贊曰毖祀欽明祝史惟談立誠在肅修辭必甘季代彌飾絢言朱藍神之來格所貴無慙太學生程一枝校文心雕龍卷之二
