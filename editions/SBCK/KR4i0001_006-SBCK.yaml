front:
  text: 文心雕龍卷之六
  hash: sha256:0dbda7848032a07520ec58e19ee6555f284b44fe1d4a4d4aa3d39d4521cd7691
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0001_SBCK_006-1a}
body:
  text: 梁通事舍人東莞劉勰撰神思第二十六古人云形在江海之上心存魏闕之下神思之謂也文之思也其神遠矣故寂然凝慮思接千載悄焉動容視通萬里吟詠之間吐納珠玉之聲眉睫之前卷舒風雲之色其思理之致乎故思理爲妙神與物游神居􅅐臆而志氣統其關鍵物㳂耳目而辭令管其樞機樞機方通則物無隱貌關鍵將塞則神有遯心是以陶鈞文思貴在虚靜䟽瀹五藏澡雪精神積學以儲寳酌理以富才研閱以窮照馴致以繹辭然後使玄解之宰㝷聲律而定墨獨照之匠闚意􅁚而運斤此蓋馭文之首術謀篇之大端夫神思方運萬塗競萌規矩虚位刻鏤無形登山則情滿於山觀海則意溢於海我才之多少將與風雲而並驅矣方其搦翰氣倍辭前曁乎篇成半折心始何則意翻空而易奇言徵實而難巧也是以意授於思言授於意宻則無際疎則千里或理在方寸而求之域表或義在咫尺而思隔山河是以秉心飬術無務苦慮含章司契不必勞情也人之禀才遲速異分文之制體大小殊功相如含筆而腐毫揚雄輟翰而驚夢桓譚疾感於苦思王充氣竭於思慮張衡研京以十年左思練都以一紀雖有巨文亦思之緩也淮南崇朝而賦騷枚臯應詔而成賦子建援牘如口誦仲宣舉筆似㝛搆阮瑀據案而制書禰衡當食而草奏雖有短篇亦思之速也若夫駿發之士心總要術敏在慮前應機立斷覃思之人情饒岐路鑒在疑後研慮方定機敏故造次而成功慮疑故愈久而致績難易雖殊並資博練若學淺而空遲才疎而徒速以斯成噐未之前聞是以臨篇綴慮必有二患理鬱者若貧辭溺者傷亂然則博聞爲饋貧之糧貫一爲拯亂之藥博而能一亦有􅂇乎心力矣若情數詭雜體變遷貿拙辭或孕於巧義庸事或萌於新意視布於麻雖云未費杼軸獻功煥然乃珍至於思表纎㫖文外曲致言所不追筆固知止至精而後闡其妙至變而後通其數伊摯不能言鼎輪扁不能語斤其微矣乎贊曰神用􅁚通情變所孕物以貌求心以理應刻鏤聲律萌芽比興結慮司契垂帷制勝體性第二十七夫情動而言形理􅀤而文見蓋㳂隱以至顯因内而符外者也然才有庸儁氣有剛柔學有淺深習有雅鄭並情性所爍陶染所凝是以筆區雲譎文􅁐波詭者矣故辭理庸儁莫能翻其才風趣剛柔寜或改其氣事義淺深未聞乖其學體式雅鄭鮮有反其習各師成心其異如靣若總其歸塗則數窮八體一曰典雅二曰遠奥三曰精約四曰顯附五曰繁縟六曰壯麗七曰新奇八曰輕靡典雅者鎔式經誥方􅁤儒門者也遠奥者馥采典文經理玄宗者也精約者覈字省句剖析毫􅁵者也顯附者辭􅀡義暢切理厭心者也繁縟者博喻釀采煒燁枝􅂀者也壯麗者高論宏裁卓爍異采者也新奇者擯古競今危側趣詭者也輕靡者浮文弱植縹緲附俗者也故雅與奇反奥與顯殊繁與約舛壯與輕乖文辭根葉􅁐囿其中矣若夫八體屢遷功以學成才力居中肇自血氣氣以實志志以定言吐納英華莫非情性是以賈生俊􅀤故文㓗而體清長􅀸傲誕故理侈而辭溢子雲沉寂故志隱而味深子政簡易故趣昭而事博孟堅雅懿故裁宻而思靡平子淹通故慮周而藻宻仲宣躁銳故頴出而才果公幹氣􅄶故言壯而情駭嗣宗俶儻故響逸而調遠叔夜儁俠故興高而采烈安仁輕敏故鋒􅀤而韻流士衡矜重故情繁而辭隱觸􅀋以推表裏必符豈非自然之恒資才氣之大略哉夫才有天資學愼始習斵梓染絲功在初化噐成綵定難可翻移故童子雕琢必先雅製㳂根討葉思轉自圓八體雖殊㑹通合數得其環中則輻輳相成故宜摹體以定習因性以練才文之司南用此道也贊曰才性異區文體繁詭辭爲膚根志實骨髓雅麗黼黻滛巧朱紫習亦凝眞功㳂漸靡風骨第二十八詩總六義風冠其首斯乃化感之本源志氣之符契也是以怊悵述情必始乎風沉吟鋪辭莫先於骨故辭之待骨如體之樹骸情之含風猶形之包氣結言端􅀡則文骨成焉意氣駿爽則文風淸焉若豐藻克贍風骨不飛則振采失鮮􅀒聲無力是以綴慮裁篇務盈守氣剛健旣實輝光乃新其爲文用譬征鳥之使翼也故練於骨者析辭必精深乎風者述情必顯捶字堅而難移結響凝而不滯此風骨之力也若瘠義肥辭繁雜失統則無骨之徵也思不環周索課乏風則無風之驗也皆潘朂錫魏思摹經典羣才韜筆乃其骨髓峻也相如賦仙氣號凌雲蔚爲辭宗廼其風力遒也能鑒斯要可以定文兹術或違無務繁采故魏文稱文以氣爲主氣之清濁有體不可力强而致故其論孔融則云體氣高妙論徐幹則云時有濟氣論劉楨則云時有逸氣公幹亦云孔氏卓卓信含異氣筆墨之性殆不可勝並重氣之㫖也夫翬翟備色翾翥百歩肌豐而力沈也鷹隼乏采翰飛戾天骨勁而氣猛也文章才力有似於此若風骨乏采則鷙集翰林采乏風骨則雉竄文囿唯藻耀而高翔固文筆之鳴鳯也若夫鎔冶經典之範翔集子史之術洞曉情變曲昭文體然後能莩甲新意雕畫奇辭昭體故意新而不亂曉變故辭奇而不黷若骨采未圓風辭未練而跨略舊規馳􅕽新作雖􅀗巧意危敗亦多豈空結奇字紕繆而成輕矣周書云辭尚體要弗惟好異蓋防文濫也然文術多門各適所好明者弗授學者弗師於是習華隨侈流遁忘反若能􅃀乎正式使文明以健則風清骨峻篇體光華能研諸慮何遠之有哉贊曰情與氣偕辭共體並文明以健珪璋乃聘蔚彼風力嚴此骨鯁才鋒峻立符采克炳通變第二十九夫設文之體有常變文之數無方何以明其然耶凡詩賦書記名理相因此有常之體也文辭氣力通變則久此無方之數也名理有常體必資於故實通變無方數必酌於新聲故能騁無窮之路飲不竭之源然綆短者衘渇足疲者輟塗非文理之數盡乃通變之術疎耳故論文之方譬諸草木根幹麗士而同性􅆨味晞陽而異品矣是以九代詠歌志合文財黃歌斷竹質之至也唐歌在昔則廣於黃世虞歌􅀸雲則文於唐時夏歌雕墻縟於虞代商周篇什麗於夏年至於序志述時其揆一也暨楚之騷文矩式周人漢之賦頌影寫楚世魏之薦制顧慕漢風􅀳之辭章瞻望魏采􅃀而論之則黃唐淳而質虞夏質而辨商周麗而雅楚漢侈而艶魏􅀳淺而綺宋初訛而新從質及訛彌近彌澹何則競今疎古風味氣衰也今才頴之士刻意學文多略漢篇師範宋集雖古今備閱然近附而遠疎矣夫青生於藍綘生於蒨雖踰本色不能復化桓君山云予見新進麗文美而無採及見劉揚言辭常輙有得此其驗也故練青濯錦必歸藍蒨矯訛翻淺還宗經誥斯斟酌乎質文之間而隱括乎雅俗之際可與言通變矣夫誇張聲貌則漢初巳極自兹厥後循環相因雖軒翥出轍而終入籠内枚乘七􅀤云通望兮東海虹洞兮蒼天相如上林云視之無端察之無涯日出東沼月生西陂馬融廣成云天地虹洞因無端涯大明出東月生西陂揚雄校獵云出入日月天與地沓張衡西京云日月於是乎出入􅁚扶桑於􅂪汜此並廣寓極狀而五家如一諸如此􅀋莫不相循參伍因革通變之數也是以規略文綂宜宏大體先博覽以精閱總綱紀而攝契然後拓衢路置關鍵長轡遠馭從容按節慿情以㑹通􅀒氣以適變采如宛虹之􅁬鬐毛若長離之振翼廼頴脫之文矣若乃齷齪於偏解矜激乎一致此庭間之廻驟豈萬里之逸歩哉贊曰文律運周日新其業變則其久通則不乏乏趨時必果乘機無法望今制奇參古定法定􅀔第三十夫情致異區文變殊術莫不因情立體卽體成􅀔也􅀔者乘利而爲制也如機􅀤矢􅀡澗曲文回自然之􅃐也圓者規體其􅀔也自轉方者矩形其􅀔也自安文章體􅀔如斯而巳是以模經爲式者自入典雅之懿效驗命篇者必歸􅃩逸之華綜意淺切者􅀋乏醖藉㫁辭辨約者率乖繁縟譬激水不漪槁木無隂自然之􅀔也是以繪事圖色文辭盡情色糅而犬馬殊形情交而雅俗異􅀔鎔範所擬各有司匠雖無嚴郛難得踰越然淵乎文者並總羣􅀔奇正雖反必兼解以俱通剛柔雖殊必隨時而􅃴用若愛典而惡華則兼通之理偏似夏人爭􅃓矢執一不可以獨射也若雅鄭而共篇則總一之􅀔離是楚人鬻矛譽盾兩難得而俱售也是以括囊雜體切在銓别宮啇朱紫隨􅀔各配章表奏議則凖的乎雅頌賦頌歌詩則羽儀乎清麗符檄書移則楷式於明㫁史論序注則師範於覈要箴銘碑誄則體制於弘深連珠七辭則從事於巧􅃩此循體而成􅀔隨變而立功者也雖復契㑹相參節文互雜譬五色之錦各以本采爲地矣桓譚稱文家各有所慕或好浮華而不知實覈或美衆多而不見要約陳思亦云世之作者或好煩文博采深沉其㫖者或好離言辨白分毫析􅁵者所習不同所務各異言􅀔殊也劉楨云文之體指實強弱使其辭巳盡而􅀔有餘天下一人耳不可得也公幹所談頗亦兼氣然文之任􅀔􅀔有剛柔不必壯言慷􅁣乃稱􅀔也又陸雲自稱徃日論文先辭而後情尚􅀔而不取悅澤及張公論文則欲宗其言夫情固先辭勢實須澤可謂先迷後能從善矣自近代辭人率好詭巧原其爲體訛勢所變厭黷舊式故穿鑿取新察其訛意似難而實無他術也反正而巳故文反正爲之辭反正爲奇效奇之法必顚倒文向上字而抑下中辭而出外回互不常則新色耳夫通衢夷坦而多行捷徑者趨近故也正文明白而常務反言者適俗故也然宻㑹者以意新得巧苟異者以失體成怪舊練之才則執正以馭奇新學之銳則逐奇而失正勢流不反則文體遂􅁦秉兹情術可無思邪贊曰形生􅀔成始末相承湍廻似規矢激如澠因利騁節情采自凝狂轡學歩力心襄陵郡庠生董開大校文心雕龍卷之六
