body:
  text: 卷一原道第一文之為德也大矣與天地並生者何哉夫玄黃色雜方圓體分日月疊璧以垂麗天之象山川煥綺以鋪理地之形此蓋道之文也仰觀吐曜俯察含章高卑定位故兩儀既生矣惟人參之性靈所鍾是謂三才為五行之秀實天地之心心生而言立言立而文明自然之道也傍及萬品動植皆文龍鳳以藻繪呈瑞虎豹以炳蔚凝姿雲霞雕色有踰畫工之妙草木賁華無待錦匠之奇夫豈外飾蓋自然耳至於林籟結響調如竽瑟泉石激韻和若球鍠故形立則章成矣聲發則文生矣夫以無識之物鬱然有彩有心之器其無文歟人文之元肇自太極幽讚神明易象惟先庖犧畫其始仲尼翼其終而乾坤兩位獨制文言言之文也天地之心哉若迺河圖孕乎八卦洛書韞乎九疇玉版金鏤之實丹文綠牒之華誰其尸之亦神理而已自鳥迹代繩文字始炳炎皞遺事紀在三墳而年世渺邈聲采靡追唐虞文章則煥乎始盛元首載歌既發吟詠之志益稷陳謀亦垂敷奏之風夏后氏興業峻鴻績九序惟歌勳德彌縟逮及商周文勝其質雅頌所被英華日新文王患憂繇辭炳曜符采複隱精義堅深重以公旦多材振其徽烈剬詩緝頌斧藻群言至夫子繼聖獨秀前哲鎔鈞六經必金聲而玉振雕琢情性組織辭令木鐸啟而千里應席珍流而萬世響寫天地之輝光曉生民之耳目矣爰自風姓暨于孔氏玄聖創典素王述訓莫不原道心以敷章研神理而設教取象乎河洛問數乎蓍龜觀天文以極變察人文以成化然後能經緯區宇彌綸彝憲發揮事業彪炳辭義故知道沿聖以垂文聖因文而明道旁通而無涯日用而不匱易曰鼓天下之動者存乎辭辭之所以能鼓天下者迺道之文也贊曰道心惟微神理設教光采玄聖炳燿仁孝龍圖獻體龜書呈貌天文斯觀民胥以傚徵聖第二夫作者曰聖述者曰明陶鑄性情功在上哲夫子文章可得而聞則聖人之情見乎辭矣先王聲教布在方冊夫子風采溢于格言是以遠稱唐世則煥乎為盛近褒周代則郁哉可從此政化貴文之徵也鄭伯入陳以立辭為功宋置折俎以多文舉禮此事蹟貴文之徵也褒美子產則云言以足志文以足言泛論君子則云情欲信辭欲巧此修身貴文之徵也然則志足而言文情信而辭巧迺含章之玉牒秉文之金科矣夫鑒周日月妙極機神文成規矩思合符契或簡言以達旨或博文以該情或明理以立體或隱義以藏用故春秋一字以褒貶喪服舉輕以包重此簡言以達旨也邠詩聯章以積句儒行縟說以繁辭此博文以該情也書契斷決以象夬文章昭晣以効離此明理以立體也四象精義以曲隱五例微辭以婉晦此隱義以藏用也故知繁略殊形隱顯異術抑引隨時變通適會徵之周孔則文有師矣是以論文必徵於聖窺聖必宗於經易稱辨物正言斷辭則備書云辭尚體要不惟好異故知正言所以立辨體要所以成辭辭成無好異之尤辨立有斷辭之美雖精義曲隱無傷其正言微辭婉晦不害其體要體要與微辭偕通正言共精義並用聖人之文章亦可見也顏闔以為仲尼飾羽而畫徒事華辭雖欲訾聖弗可得已然則聖文之雅麗固銜華而佩實者也天道難聞猶或鑽仰文章可見胡寧勿思若徵聖立言則文其庶矣贊曰妙極生知睿哲惟宰精理為文秀氣成采鑒懸日月辭富山海百齡影徂千載心在宗經第三三極彝訓其書曰經經也者恆久之至道不刊之鴻教也故象天地效鬼神參物序制人紀洞性靈之奧區極文章之骨髓者也皇世三墳帝代五典重以八索申以九丘歲歷綿曖條流紛糅自夫子刪述而大寶咸耀於是易張十翼書標七觀詩列四始禮正五經春秋五例義既挻乎性情辭亦匠於文理故能開學養正昭明有融然而道心惟微聖謀卓絕墻宇重峻吐納自深譬萬鈞之洪鍾無錚錚之細響矣夫易惟談天入神致用故繫稱旨遠辭文言中事隱韋編三絕固哲人之驪淵也書實記言而詁訓茫昧通乎爾雅則文意曉然故子夏歎書昭昭若日月之代明離離如星辰之錯行言昭灼也詩主言志詁訓同書摛風裁興藻辭譎喻溫柔在誦敢最附深衷矣禮以立體據事剬範章條纖曲執而後顯採綴片言莫非寶也春秋辨理一字見義五石六鷁以詳略成文雉門兩觀以先後顯旨其婉章志晦諒以邃矣尚書則覽文如詭而尋理即暢春秋則觀辭立曉而訪義方隱此聖文之殊致表裏之異體者也至於根柢槃深枝葉峻茂辭約而旨豐事近而喻遠是以往者雖舊餘味日新後進追取而非晚前脩久用而未先可謂太山徧雨河潤千里者也故論說辭序則易統其首詔策章奏則書發其源賦頌謌讚則詩立其本銘誄箴祝則禮總其端紀傳盟檄則春秋為根並窮高以樹表極遠以啟疆所以百家騰躍終入環內者也若稟經以製式酌雅以富言是即山而鑄銅煮海而為鹽也故文能宗經體有六義一則情深而不詭二則風清而不雜三則事信而不誕四則義貞而不回五則體約而不蕪六則文麗而不淫楊子比雕玉以作器謂五經之含文也夫文以行立行以文傳四教所先符采相濟邁德樹聲莫不師聖而建言脩辭鮮克宗經是以楚艷漢侈流弊不還正末歸本不其懿歟贊曰三極彝道訓深稽古致化歸一分教斯五性靈鎔匠文章奧府淵哉鑠乎群言之祖正緯第四夫神道闡幽天命微顯馬龍出而大易興神龜見而洪範燿故繫辭稱河出圖洛出書聖人則之斯之謂也但世敻文隱好生矯誕真雖存矣偽亦憑焉夫六經彪炳而緯候稠疊孝論昭晢而鉤讖葳蕤按經驗緯其偽有四蓋緯之成經其猶織綜絲麻不雜布帛乃成今經正緯奇倍擿千里其偽一矣經顯聖訓也緯隱神教也聖訓宜廣神教宜約而今緯多於經神理更繁其偽二矣有命自天迺稱符讖而八十一篇皆託於孔子則是堯造綠圖昌制丹書其偽三矣商周以前圖錄頻見春秋之末群經方備先緯後經體乖織綜其偽四矣偽既倍摘則義異自明經足訓矣緯何豫焉原夫圖錄之見迺昊天休命事以瑞聖義非配經故河不出圖夫子有歎如或可造無勞喟然昔康王河圖陳於東序故知前世符命歷代寶傳仲尼所撰序錄而已於是伎數之士附以詭術或說陰陽或序災異若鳥鳴似語蟲葉成字篇條滋蔓必假孔氏通儒討覈謂偽起哀平東序祕寶朱紫亂矣至於光武之世篤信斯術風化所靡學者比肩沛獻集緯以通經曹褒撰讖以定禮乖道謬典亦已甚矣是以桓譚疾其虛偽尹敏戲其深瑕張衡發其僻謬荀悅明其詭誕四賢博練論之精矣若乃羲農軒皞之源山瀆鍾律之要白魚赤烏之符黃銀紫玉之瑞事豐奇偉辭富膏腴無益經典而有助文章是以後來辭人捃摭英華平子恐其迷學奏令禁絕仲豫惜其雜真未許煨燔前代配經故詳論焉贊曰榮河溫洛是孕圖緯神寶藏用理隱文貴世歷二漢朱紫騰沸芟夷譎詭採其雕蔚辯騷第五辯騷第五自風雅寢聲莫或抽緒奇文鬱起其離騷哉固已軒翥詩人之後奮飛辭家之前豈去聖之未遠而楚人之多才乎昔漢武愛騷而淮南作傳以為國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之蟬蛻穢濁之中浮游塵埃之外皭然涅而不緇雖與日月爭光可也班固以為露才揚己忿懟沉江羿澆二姚與左氏不合崑崙懸圃非經義所載然其文辭麗雅為詞賦之宗雖非明哲可謂妙才王逸以為詩人提耳屈原婉順離騷之文依經立義駟虬乘翳則時乘六龍崑崙流沙則禹貢敷土名儒辭賦莫不擬其儀表所謂金相玉質百世無匹者也及漢宣嗟歎以為皆合經術揚雄諷味亦言體同詩雅四家舉以方經而孟堅謂不合傳褒貶任聲抑揚過實可謂鑒而弗精翫而未覈者也將覈其論必徵言焉故其陳堯舜之耿介稱湯禹之祗敬典誥之體也譏桀紂之猖披傷羿澆之顛隕規諷之旨也虬龍以喻君子雲蜺以譬讒邪比興之義也每一顧而淹涕歎君門之九重忠怨之辭也觀茲四事同于風雅者也至於託雲龍說迂怪豐隆求宓妃鴆鳥媒娀女詭異之辭也康回傾地夷羿弊日木夫九首土伯三目譎怪之談也依彭咸之遺則從子胥以自適狷狹之志也士女雜座亂而不分指以為樂娛酒不廢沉湎日夜舉以為懽荒淫之意也摘此四事異乎經典者也故論其典誥則如彼語其夸誕則如此固知楚辭者體憲於三代而風雜於戰國乃雅頌之博徒而詞賦之英傑也觀其骨鯁所樹肌膚所附雖取鎔經旨亦自鑄偉辭故騷經九章朗麗以哀志九歌九辯綺靡以傷情遠遊天問瓌詭而惠巧招魂大招耀艷而深華卜居摽放言之致漁父寄獨往之才故能氣往轢古辭來切今驚采絕艷難與並能矣自九懷以下遽躡其跡而屈宋逸步莫之能追故其敘情怨則鬱伊而易感述離居則愴怏而難懷論山水則循聲而得貌言節候則披文而見時是以枚賈追風以入麗馬揚沿波而得奇其衣被詞人非一代也故才高者菀其鴻裁中巧者獵其艷辭吟諷者銜其山川童蒙者拾其香草若能憑軾以倚雅頌懸轡以馭楚篇酌奇而不失其真翫華而不墜其實則顧盼可以驅辭力欬唾可以窮文致亦不復乞靈於長卿假寵於子淵矣贊曰不有屈原豈見離騷驚才風逸壯志煙高山川無極情理實勞金相玉式艷逸錙毫
