body:
  text: 卷三銘針第十一昔帝軒刻輿几以弼違大禹勒筍簴而招諫成湯盤盂著日新之規武王戶席題必戒之訓周公慎言於金人仲尼革容於欹器則先聖鑒戒其來久矣故銘者名也觀器必也正名審用貴乎盛德蓋臧武仲之論銘也曰天子令德諸侯計功大夫稱伐夏鑄九牧之金鼎周勒肅慎之楛矢令德之事也呂望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勳於景鍾孔悝表勤於衛鼎稱伐之類也若乃飛廉有石槨之錫靈公有奪里之諡銘發幽石吁可怪矣趙靈勒跡於番吾秦昭刻博於華山夸誕示後吁可笑也詳觀衆例銘義見矣至於始皇勒嶽政暴而文澤亦有疏通之美焉若班固燕然之勒張昶華陰之碣序亦盛矣蔡雍銘思獨冠古今橋公之鉞吐納典謨朱穆之鼎全成碑文溺所長也至如敬通雜器準矱戒銘而事非其物繁略違中崔駰品物讚多戒少李尤積篇義儉辭碎蓍龜神物而居博奕之中衡斛嘉量而在臼杵之末曾名品之未暇何事理之能間哉魏文九寶器利辭鈍唯張載劍閣其才清采迅足駸駸後發前至勒銘岷漢得其宜矣針者針也所以攻疾防患喻針石也斯文之興盛於三代夏商二針餘句頗存及周之辛甲百官針闕唯虞針一篇體義備焉迄至春秋微而未絶故魏絳諷君於后羿楚子訓民於在勤戰代已來棄德務功銘辭代興針文委絶至揚雄稽古始範虞針作卿尹州牧草五篇及崔胡補綴總稱百官指事配位鞶鑑可徵信所謂追清風於前古攀辛甲於後代者也至於潘勗符節要而失淺溫嶠侍臣博而患繁王濟國子引廣事雜潘尼乘輿義正體蕪凡斯繼作鮮有克衷至於王朗雜針乃置巾履得其戒慎而失其所施觀其約文舉要憲章戒銘而水火井竈繁辭不已志有偏也夫針誦於官銘題於器名目雖異而警戒實同針全禦過故文質確切銘兼褒讚故體貴弘潤其取事也必核以辨其摛文也必簡而深此其大要也然矢言之道蓋闕庸器之制久淪所以針銘寡用罕施後代惟秉文君子宜酌其遠大焉贊曰銘實表器針惟德軌有佩于言無鑒于水秉茲貞厲警乎立履義典則弘文約為美誄碑第十二周世盛德有銘誄之文大夫之才臨喪能誄誄者纍也纍其德行旌之不朽也夏商已前其詳靡聞周雖有誄未被於士又賤不誄貴幼不誄長其在萬乘則稱天以誄之讀誄定諡其節文大矣自魯莊戰乘丘始及於士逮尼父之卒哀公作誄觀其憖遺之辭嗚呼之歎雖非睿作古式存焉至柳妻之誄惠子則辭哀而韻長矣暨乎漢世承流而作揚雄之誄元后文實煩穢沙麓撮其要而摯疑成篇安有纍德述尊而闊略四句乎杜篤之誄有譽前代吳誄雖工而他篇頗疏豈以見稱光武而改盻千金哉傅毅所制文體倫序孝山崔瑗辨潔相參觀其序事如傳辭靡律調固誄之才也潘嶽構意專師孝山巧於序悲易入新切所以隔代相望能徽厥聲者也至如崔駰誄趙劉陶誄黃並得憲章工在簡要陳思叨名而體實繁緩文皇誄末百言自陳其乖甚矣若夫殷臣詠湯追褒玄鳥之祚周史歌文上闡后稷之烈誄述祖宗蓋詩人之則也至於序述哀情則觸類而長傅毅之誄北海云白日幽光氛霧杳冥始序致感遂為後式景而效者彌取於功矣詳夫誄之為制蓋選言録行傳體而頌文榮始而哀終論其人也曖乎若可覿道其哀也悽焉如可傷此其旨也碑者埤也上古帝皇紀號封禪樹石埤嶽故曰碑也周穆紀跡于弇山之石亦碑之意也又宗廟有碑樹之兩楹事止麗牲未勒勳績而庸器漸闕故後代用碑以石代金同乎不朽自廟徂墳猶封墓也自後漢以來碑碣雲起才鋒所斷莫高蔡雍觀楊賜之碑骨鯁訓典陳郭二文句無擇言周胡衆碑莫非清允其敘事也該而要其綴采也雅而澤清詞轉而不窮巧義出而卓立察其為才自然而至矣孔融所創有摹伯喈張陳兩文辨給足采亦其亞也及孫綽為文志在於碑溫王郗庾辭多枝雜桓彝一篇最為辨裁矣夫屬碑之體資乎史才其序則傳其文則銘標序盛德必見清風之華昭紀鴻懿必見峻偉之烈此碑之制也夫碑實銘器銘實碑文因器立名事先於誄是以勒石讚勳者入銘之域樹碑述亡者同誄之區焉贊曰寫實追虛碑誄以立銘德纂行文采允集觀風似面聽辭如泣石墨鐫華頽影豈戢哀弔第十三賦憲之諡短折曰哀哀者依也悲實依心故曰哀也以辭遣哀蓋下流之悼故不在黃髮必施夭昏昔三良殉秦百夫莫贖事均夭橫黃鳥賦哀抑亦詩人之哀辭乎暨漢武封禪而霍嬗暴亡帝傷而作詩亦哀辭之類矣降及後漢汝陽王亡崔瑗哀辭始變前式然履突鬼門怪而不辭駕龍乘雲仙而不哀又卒章五言頗似歌謠亦倣佛乎漢武也至於蘇順張升並述哀文雖發其情華而未極其心實建安哀辭惟偉長差善行女一篇時有惻怛及潘嶽繼作實鍾其美觀其慮贍辭變情洞悲苦敘事如傳結言摹詩促節四言鮮有緩句故能義直而文婉體舊而趣新金鹿澤蘭莫之或繼也原夫哀辭大體情主於痛傷而辭窮乎愛惜幼未成德故譽止於察惠弱不勝務故悼加乎膚色隱心而結文則事愜觀文而屬心則體奢奢體為辭則雖麗不哀必使情往會悲文來引泣乃其貴耳弔者至也詩云神之弔矣言神至也君子令終定諡事極理哀故賓之慰主以至到為言也壓溺乖道所以不弔又宋水鄭火行人奉辭國災民亡故同弔也及晉築虒臺齊襲燕城史趙蘇秦翻賀為弔虐民搆敵亦亡之道凡斯之例弔之所設也或驕貴而殞身或狷忿以乖道或有志而無時或美才而兼纍追而慰之並名為弔自賈誼浮湘發憤弔屈體周而事核辭清而理哀蓋首出之作也及相如之弔二世全為賦體桓談以為其言惻愴讀者歎息及卒章要切斷而能悲也揚雄弔屈思積功寡意深反騷故辭韻沉膇班彪蔡雍並敏於致語然影附賈氏難為並驅耳胡阮之弔夷齊褒而無間仲宣所制譏呵實工然則胡阮嘉其清王子傷其隘各其志也禰衡之弔平子縟麗而輕清陸機之弔魏武序巧而文繁降斯以下未有可稱者矣夫弔雖古義而華辭未造華過韻緩則化而為賦固宜正義以繩理昭德而塞違割㭊褒貶哀而有正則無奪倫矣贊曰辭之所哀在彼弱弄苗而不秀自古斯慟雖有通才迷方失控千載可傷寓言以送雜文第十四智術之子博雅之人藻溢於辭辭盈乎氣苑囿文情故日新殊致宋玉含才頗亦負俗始造對問以申其志放懷寥廓氣實使之及枚乘摛艷首製七發腴辭雲搆夸麗風駭蓋七竅所發發乎嗜欲始邪末正所以戒膏粱之子也揚雄覃思文闊業深綜述碎文璅語肇為連珠珠連其辭雖小而明潤矣凡此三者文章之枝派暇豫之末造也自對問以後東方朔效而廣之名為客難託古慰志疏而有辨揚雄解嘲雜以諧謔回環自釋頗亦為工班固賓戲含懿采之華崔駰達旨吐典言之裁張衡應間密而兼雅崔實客譏整而微質蔡雍釋誨體奧而文炳景純客傲情見而采蔚雖迭相祖述然屬篇之高者也至於陳思客問辭高而理疏庾敳客咨意榮而文悴斯類甚衆無所取才矣原夫茲文之設乃發憤以表志身挫憑乎道勝時屯寄於情泰莫不淵嶽其心麟鳳其采此立體之大要也自七發以下作者繼踵觀枚氏首唱信獨拔而偉麗矣及傅毅七激會清要之工崔駰七依入博雅之巧張衡七辨結采綿靡崔瑗七厲植義純正陳思七啓取美於宏壯仲宣七釋致辨於事理自桓麟七說以下左思七諷以上枝附影從十有餘家或文麗而義暌或理粹而辭駁觀其大抵所歸莫不高談宮館壯語畋獵窮瓌奇之服饌極蠱媚之聲色甘意搖骨髓艷詞洞魂識雖始之以淫侈而終之以居正然諷一勸百勢不自反子雲所謂先騁鄭衛之聲曲終而奏雅者也唯七厲敘賢歸以儒道雖文非拔群而意實卓爾矣自連珠以下擬者間出杜篤賈逵之曹劉珍潘勖之輩欲穿明珠多貫魚目可謂壽陵匍匐非復邯鄲之步里醜捧心不關西施之嚬矣唯士衡運思理新文敏而裁章置句廣於舊篇豈慕朱仲四寸之璫乎夫文小易周思間可贍足使義明而辭淨事圓而音澤磊磊自轉可稱珠耳詳夫漢來雜文名號多品或典誥誓問或覽略篇章或曲操弄引或吟諷謠詠總括其名並歸雜文之區甄別其義各入討論之域類聚有貫故不曲述也贊曰偉矣前修學堅才飽負文餘力飛靡弄巧技辭攢映嘒若參昴慕嚬之心於焉祗攪諧讔第十五諧讔第十五芮良夫之詩云自有肺腸俾民卒狂夫心險如山口壅若川怨怒之情不一歡謔之言無方昔華元棄甲城者發睅目之謳臧紇喪師國人造侏儒之歌並嗤戲形貌內怨為俳也又蠶蟹鄙諺貍首淫哇苟可針戒載于禮典故知諧辭讔言亦無棄矣諧之言皆也辭淺會俗皆悅笑也昔齊威酣樂而淳于說甘酒楚襄宴集而宋玉賦好色意在微諷有足觀者及優旃之諷漆城優孟之諫葬馬並譎辭飾說抑止昏暴是以子長編史列傳滑稽以其辭雖傾回意歸義正也但本體不雅其流易弊於是東方枚皋餔糟啜醨無所匡正而詆嫚媟弄故其自稱為賦乃亦俳也見視如倡亦有悔矣至魏文因俳說以著笑書薛綜憑宴會而發嘲調雖抃笑衽席而無益時用矣然而懿文之士未免枉轡潘嶽醜婦之屬束晳賣餅之類尤而效之蓋以百數魏晉滑稽盛相驅扇遂乃應瑒之鼻方於盜削卵張華之形比乎握舂杵曾是莠言有虧德音豈非溺者之妄笑胥靡之狂歌歟讔者隱也遁辭以隱意譎譬以指事也昔還社求拯於楚師喻眢井而稱麥麴叔儀乞糧於魯人歌佩玉而呼庚癸伍舉刺荊王以大鳥齊客譏薛公以海魚莊姬託辭於龍尾臧文謬書於羊裘隱語之用被于紀傳大者興治濟身其次弼違曉惑蓋意生於權譎而事出於機急與夫諧辭可相表裏者也漢世隱書十有八篇歆固編文録之賦末昔楚莊齊威性好隱語至東方曼倩尤巧辭述但謬辭詆戲無益規補自魏代已來頗非俳優而君子嘲隱化為謎語謎也者回互其辭使昏迷也或體目文字或圖象品物纖巧以弄思淺察以衒辭義欲婉而正辭欲隱而顯荀卿蠶賦已兆其體至魏文陳思約而密之高貴鄉公博舉品物雖有小巧用乖遠大夫觀古之為隱理周要務豈為童稚之戲謔搏髀而抃笑哉然文辭之有諧隱譬九流之有小說蓋稗官所采以廣視聽若效而不已則髡袒而入室旃孟之石交乎贊曰古之嘲隱振危釋憊雖有絲麻無棄菅蒯會義適時頗益諷誡空戲滑稽德音大壞
